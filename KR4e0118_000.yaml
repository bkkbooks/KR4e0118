body:
  text: 石田詩選别集類五明提要臣等謹案石田詩選十卷明沈周撰周有石田雜記已著録此集不標體製不譜年月但分天文時令等三十一類蓋仿宋人分類杜詩之例據慈溪張鈇跋蓋其友光祿寺署丞華汝德所編也顧元慶夷白齋詩話載都穆學詩於周嘗作節婦詩有青燈淚眼枯句周以禮寡婦不夜哭議燈字未穩是周於詩律不為不細然周以畫名一代詩非其所留意又晚年畫境彌髙頽然天放方圓自造惟意所如詩亦揮灑淋漓自寫天趣蓋不以字句取工徒以棲心邱壑名利兩忘風月往還煙雲供飬其胸次本無塵纍故所作亦不雕不琢自然拔俗寄興於町畦之外可以意會而不可加之以繩削其於詩也亦可謂教外别傳矣都穆南濠詩話稱其詠錢詠門神詠簾詠混堂詠楊花詠落花諸聮皆未免索之於句下蓋穆於詩所得不深故所見止是也集前有吳寬序稱其詩餘發為圖繪妙逼古人核實而論周固以畫之餘事溢而為詩非以詩之餘事溢而為畫寬序其詩故主詩而賔畫耳又有李東陽後序東陽與周不相識時已為大學士與周勢分懸隔以吳寬嘗以寫本示之重其為人故越三十年後又補為作之然二序皆為全集而作華汝德刋此選本時仍而録之非序此本者也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
