body:
  text: 石田詩選巻二眀沈周撰山川園池附舟中望虞山與呉匏菴同賦三首虞山我隣境欲往路非遙比來無好抱風日虚春朝茲藉嘉友興理舟訪岧嶤漸喜蒼翠近豁眼嵐霏消上有古松杉落落旌幢標其下見行人徃來雜僧樵我坐意亦馳豈伺雙屐超何異謝康樂巫湖睡且遨登梁昭明讀書臺訪徐辰翁丹井逺秀目已週復騁登髙足青山不嫌人所取隨我欲巍巍古仙壇寂寂奠林麓七檜交雲霞靈颷散清馥崇臺轉磴道攀縁把傍竹同行玉堂彦髙詠應虚谷逍遙東山風已屏歌管俗申紙驚連章謬圖仍附軸聊以志傾賞流傳亦何卜或恐聞邦人有酒悔無逐畱連山中薄暮返棹遲遲二三客黙黙對層岑轉柁清川口忽然西日沉常時急歸路茲焉迂我心行行望不輟去逺思滋深所思何以冩丹青亦難任不如就明月彈我丘中琴過長蕩發迹過長蕩識此平生始春流方漫衍曠蕩彌十里老葑蔽層雲敷芽青擬擬正如一明鏡㿺蝕銅繡起西山欲臨照掩却螺髻美山亦拗怒去南走太湖涘羣勢湧疊浪争捷互排擠我恐先我去揮手喝止止湖山四面好轉側皆可喜此面正佳絶扁舟載西子芳洲有隙地肯賣脫紫綺移家非丹砂所好在山水溪上獨坐觀生吾自得飽飯荷農功盤石箕雙足清流影一翁松喬藤輔徳楓老葉還童好在尋詩地無人杖屨同漁村呉江本澤國漁户小成村楓葉紅秋屋蘆花白夜門都無三姓住漫可十家存熟酒呼兒女分魚喧弟昆不憂風雨横惟憚水衡煩鷗趂撑舟尾蟹行穿屋根怡然樂生聚業外復何言經尚湖望虞山日午放船湖上頭虞山隨船走不休髙雲仰見出翠璧飛影下接滄波流青林人家隱山麓鷄鳴犬吠聞中洲鸕鷀羣棲竹葉暗蜻蜓特立荷花秋蓮歌漁唱尚互答落景在樹猶堪遊小舟争渡各先去獨逆風波渾不憂宿白馬澗濕雲載春山晴秀悵莫逢朝來雙闥前頓失千巃嵸天地大藏疾何所不包容峯巒皆養晦草木未發䝉芙蓉不敢巧反樸鴻濛中老眚叵辨物存亡詰兒童晝夜不分明中恐移愚公又慮九疑縮萬里來相通争髙或不平出氣盪其胷水墨用吾事丹青莫為工大石狀望望秦餘杭首尾行不了大石突其凥翹然一拳撟山體厚藏骨吐秀此特表正類抱中嬰頭頂露於褓形大氣則散趣足在於小其深雖未即逺觀已自好頃來莫能窮繼至敢草草循墻道林麓記曲乃遺杳登登覺向峻漸漸駕木杪猊峯據門左呵禁口欲齩有磴沿百級有殿嵌山造並殿跨偃石懸身龍嫋矯行人自其下恍惚怖四爪轉髙蹐其背股慄身亦掉鎭腦結佛亭所仗力可擾四壁滿題句貴賤成雜掃同遊懲涉險旋踵促及早次尋巖間寮蜂房互窈窕縁勢盡西向局地窄接繚雲棧中貫穿所歴平地少山静日自長石瘠人亦槁坐僻覬居安傳竒被遊攪陽厓詫脣掀隂竇疑目窅虚含風飂飂濕暎雲稍稍衆縐不可熨亂舋龜拆兆層疊百寶合正紺或厠縹亘此金剛座千古不可剿危椒壓屋脊雷雨常怯倒草木亦作怪牢絡萬藤蔦蒼松長深根本矮枝節老斜見山桃花㣲紅暎叢篠草異傳多藥采掇未諳曉欲宿償三過衾裯悔忘抱既夕氣更佳延月象倍皎尚欠一踏雪意先有璚島情狀要細述言語未獲巧不期諸􅐑嵬拄腹早韞藁宛然紫芙蓉為我一手拗東坡昔袖去援例我非狡山僧苦著相便覺生煩惱移席茅山東頂徐永年避酒而去作歌嘲之自我來茅山春霧撥不開冥迷五日思困頓當面不見紫翠堆今朝喜有風汛掃兩目浩蕩天光囘秀峯戢戢各拱立伺我道左千㦸排蒼松為幄碧草薦窪石一一羅尊罍髙天廣野寄笑傲芙蓉對面勸我一吸三百盃徐卿不能有此量自椒而竄山之隈隔林大呼谷與應掉首竟去無徘徊却從地上舉手謝逺意若訴不得相追陪㑹難别易略不恤有樂弗取眞呉獃山禽衝客啄餘胔野花㸃席粘殘醅老兵既失老僧在且握石子為鬮猜醉來枕藉足力憊扶掖不起相催頽明朝爛漫别辦冶遊事青山在在似作遊人媒乆住山亦許不作謝令推慿我裁截筆作剪信我包括詩為胎請君急急還來㸔怪事金鼇左股昨夜安在哉雪中登虎山月色風光知幾到好竒今補雪中縁急排岩樹開髙閣生怕溪山又少年城郭萬家羣玉府塔簷千溜半空泉杳茶美酒殊酬酢似此登臨亦可傳雨中㸔山寄楊君謙㸔雨春山中晴日未可及巒華與嶺秀濯濯翠流汁水墨間罨畫屏風四圍立襍花逗餘紅雅與松共濕低雲滿窓户似愛幽者入我初作静觀併喜得静習紛紛冶遊子此景不足給有詩在此境佳句待人拾詩腸倘乾燥亦許借潤浥持之報楊子正可事屐笠水村圖魚荘蟹舎一叢叢湖上成村似畫中互渚斷沙橋自貫輕鷗逺水地俱空船迷楊栁人依緑燈隔蒹葭火暎紅全與吾家風致合草堂曾有此愚翁天平山天平合在名山志山下祠堂更有名何地定藏司馬史此胷誰負范公兵髙屏落日雲霞亂襍樹交花鳥雀争要上龍門發長嘯世人無耳著鸞聲光福羣山西奔駐湖尾通川夾山三十里川窮小濼開鏡光居民次水屋比比屋上有山屋下水開門波光眼如洗虎山橋畔晚市忙打鼔漁郎賣鮮鯉霜前橘柚萬苞黄雨後楊梅千樹紫山圍水抱開農桑樂土風光眞畫裏三年潢潦我無家恨不移書亦居此和張碧溪登寶峯韻二首樂事春來要不空直登峯頂路方窮青山始爾三人酒白髮泠然萬里風城郭週遭江勢轉鶯花爛漫物華同太平無象今成象好在詩篇杖屨中新醅拍拍玉光浮挈榼提壺判醉逰髙帽特尋芳樹掛清歌緩共晩雲流頻來信我何拘忌大勝為官待告休日日乘春知未足翠㣲還補菊花秋三宿虎丘松巢夕陽繫䌫有餘輝入寺登登曲徑微孤塔白雲平鳥背疎林黄葉暎僧衣臨池弔劒寒泉在捫石尋題古刻稀便欲留詩補三過三次有圖于此眼花燈影不成揮與沈工侍時暘登大潮山絶頂侍郎不到十年餘拉我松行喜並輿客子初疑穿虎豹僧伽髙住自鐘魚龍蛇起陸香山近鵰鶚摩天震澤虚把酒直從峯絶處眼空錯認是匡廬汎舟横大江汎舟横大江流止隨西東前頭望廣水後頭望連峯客程渺茫茫行雲無旋蹤霜露霑我衣覧鏡饒慽容約客山行先後相失春山同遊不同席却被青山笑相隔村蹊宛轉馬不進來者固遲歸亦急問人云去苦不逺如酌稍延當有及空亭鳥下小燕過秪見殘花與殘核手捫路竹漫刋詩將記後來君可識白雲酢汝一盃酒不問老兵何得失山行雲壑風泉處處宜詩囊酒榼大家嬉人來人徃春無主日短日長天有時墮胾林亭㸔螘競插花山轎愛蜂隨野僧未識登臨樂靜自關門笑客癡楚江秋曉巻三首天連湘漢水悠悠水色微茫接素秋殘月已沈三國恨亂雲初散九疑愁南方流落身將老西候蕭條客倦逰欲采蘋花恨無伴美人迢逓隔滄洲葭菼蒼蒼白露時蕭條江色帶微暉平沙鴈逐寒潮起野樹鴉隨亂葉飛漸見九溪如練净尚憐三戸似星稀不堪昨夜南逰客愁向西風憶受衣夢囘江上筭秋程水影迢迢積漸明落木西風連鄂渚亂山髙浪隱湓城鐘邉野寺經僧起霜裡孤帆估客行徃事獨悲前席誤不從賈誼問蒼生自甲浦道太湖四十里見異香諸山喜而有作清苕達宜興道湖已成筭僕夫却告難風浪卒莫翫勸我陟山麓正爾免憂患彼此有得失我臆殊未斷譬山行見湖昏昏秪浩瀚何如行湖中坐見山秀爛僕尚清决筮得需利在彖毅然促飛櫓猛進不復懦探穴有虎子履險獲竒觀出浦即㑹勝列障擁一岸遙思攬呉香妄意覔仙幔羣聳西若監巨浸東罔畔天謂湖太淫設此似按攤雲濤日衝撞石趾力抵扞輸贏各無能兩壘對楚漢我行鋒鏑間便以老命判山疑相慰藉逐逐笑供玩始有舟楫虞盡被山破散山亦有情狀要我綺語讃氣聚勢則附形散脈復貫逺近相衍迤中自存博換雖靜有動機萬態紛變亂虬龍徐蜿蜒獅猊悍奔竄夷突各不一小大略相半正展芙蓉屏横亘蒼玉案晴縠縐日光莫熨錦繡段金庭與玉柱逺弄波影燦歴眼四十程續續青不斷平生詫傳聞信美非謾讕修辭聊梗槩歸憶庶可按岳麓秋清為西涯李閣老題蕩摩雲漢覺喬然形勢雄㸔岳勢連赤帝奠靈天立極紫陽宏道地生賢人凌灝氣攀珠斗峯落清湘見玉蓮上相舊遊今不忘冩懐還復事圖傳天柱晴雲仝前一柱巍巍萬象超切台接斗見岧嶤命惟說用金為礪天許姚擎玉作標森列宸楓均湛露夤縁野竹上青霄文章變化成何似更倚雲霞㸔冩描黄山遊巻為篁墪程宫詹題黄山巍峩四萬尺摩天戛日髙莫敵天下之人皆識名土著之人遊未極篁墪先生二十年亦自今茲方决策沈沈冬雨作泥淖日日需晴蠟雙屐天將試人故作沮拂面猶嫌雪飄白先生一意牢不破十客追隨三不逸到山浮雲為開路石立偉夫厓左逆梁飛危甃虹不収樹翳古湫龍所宅湯泉觱沸幽广下熱酒不須敲火石境深漸覺與世逺下界便從風雨隔諸峯六六互出没目抉雲蹤寄髙歴容成浮丘合居此呼之不出聞笙笛祥符小憩僅四詩天待先生儘蒼壁不應止此便返駕請啓一行多後役作圖何事到野人耳聴安能當目擊長安在西但西笑是邪非邪聊水墨更是髙篇不容和茍能掛一還漏百宛陵妙語括嵩勝亦與歐公曠遊席歐公不有宛陵無紙尾但留三歎息暮春登虎丘獨信㣲吟人不知山花滿地悔來遲乆搘緑樹隂中杖仰辨丹崖缺處詩日有閒縁逰始勝老無健步出非宜一廻到此一廻少怕近清泉見鬢絲汛罨畫溪長溪碧衍玉光净樹夾兩崕俱倒映羣峯樹杪髻螺出一一隨行似相媵小舟貼水天上坐了見鬚眉落秋鏡溪當比我懐尚澄地固不凡遊亦勝舷歌偶爾及滄浪野鳥忽飛魚忽泳中流手洗白磁􅘑一勺分清空百病喜聞秋潦轉澄瑩健在能尋不妨更遊張公洞并引𢎞治己未之三月余來宜興客呉君大本所二十一日大本倡曰張洞果老修眞處古幅地之列吾邦之仙域也必啓君一遊余笑曰業已訂之矣於是理舟載酒從洑溪而南歴罨畫溪迤邐四十餘里始舎舟陸行望西南諸山髙下層疊叢然莫知所謂洞處詰之樵人指盂山曰此中是已其山於羣山最下而小計其髙不過二十仭心甚易之豈靈區異壤能結乎是哉冉冉曲經田塍間三里許乃抵已暮亟由林麓左行拆而北二百步路次臨一穴甚深晦其脣有雜樹蔽虧人謂此洞之天窓也轉及山椒則洞口在焉呀然向西北且隘有石衡亘于上如門楣然入必俯首上摩小方有刻未暇讀門側置片石楸紋縱横云為仙枰疑好事者設之自茲從石級下度載上載下﨑嶇甚疲於老足因小憩旁石瞰下㝠㝠時嵐氣滃浡如水涵于中不可儗步隱隱惟見石臺耳暝色漸翳迨無所覩乃下山議宿道士張碧溪林館規以明日補其未足之遊夜二鼓雨作簷聲浪浪悵然謂必敗乃事矣黎明天就霽即蹶起厭浥行濕莽中喜劇興熱却掖猛進冉冉焉足若虚躡洫洫焉身若淵墜愈下而境愈竒乃及臺而昨俯見天窓者今則仰視之日光下映四顧瞭然下多亂石傾亞有崩跌勢洞傳孫氏赤烏間霹靂所開天窓可想其迹也臺踞洞北趾崇丈餘南面而立則三面環見皆石壁壁拔地漸髙而偃如鵬翼鶱空燾下其中􅀈􅀈壁之理上下皆庚庚而横理中乳流萬株色如染靛巨者么者長者縮者銳者截然而平者菡萏者螺旋者參差不侔一一皆倒懸儼乎怒猊掀吻亷牙利齒欲噍而未合殊令人悚悚乳末餘膏溜地積為石􅀈數長軀離立兀兀色揉青緑可愛西壁下作大裂斜而衍幽而窅内多流石錯互初隨行小僮誤由洞口岐而入忽見蹣跚出于罅處衆訝曰何小子之佻達也東壁下一小洞厠門内有石窪滴水滿中又一洞正南壁中極黟黒云通半里許余闖之寒氣淰淰襲人不可乆竚大本則挾童奴二三輩執炬踉蹡而入覺其挺詣之無難也非但不能抑不敢以老身試其不測惟盤桓臺下恣得俯仰之觀嗟乎設者不自知其巧而使逰者知之知也有不能盡其知逰也亦有不易者焉余於宜興二過洞尚相昧今於一識迨老始獲之可信境於人間不多設逰於人生不能㡬遭因引酒獨酌心與境融樂與迹超洋洋乎欲參造物者逰謂可遺世而長存不知果翁之得果何如哉時大本自别洞出仍來候余歴言其中石牀石竈丹田之異旁之列洞不可殫記余曰毋多詫我我亦有神偕子徃矣大本請記而系以詩詩曰仙山不在髙靈區設中冓包蒙自太古霹靂始與牖闇然不耀地白日已通晝遂䙝世逰人我及千載後登頓入地中足與石角鬬飛厓臨紫雲既掀勢還覆仰面欲成壓山鬼自司救元氣不蒸雨五色變乳溜支本萬不齊纂纂簮筍瘦又如人披腹呈此琅玕秀旁扉表雲房曲密通欵竇跬步必容炬老膽怯且逗神仙未易求㝠探亦何遘矯手采瑤華和飲千日酬聊度三千年儗與石同夀溪上春日熈熈百鳥鳴東溪試步覺芒輕閒來閒徃曾無為時笑時歌自有情止水觸風微起縠過雲生雨略攙晴隣翁偶揖還相汛道是先生底獨行登金山龍宫湧出玉嶙峋乍眼來㸔極悚神滿地莫論無坐處東坡忽至佛印室中曰内翰何來此間無坐處中流眞見不羈人東坡蒜山詩云金山亦是不羈人墻低樹少多容月石瘦花慳晏得春舟楫一江名利路烟波誰謂不生塵史明古曾約同遊今已化去鬍翁乆憶金焦勝感慨來登獨老身生死隔塵空舊約江山如此欠斯人强留詩酒聊三日愁送鶯花又一春浩蕩烟波莽囘首漫將行樂與誰論和西厓李閣老韻留題金山儘有風波怯往還又因名勝使人攀天將白玉浮諸水誰以黄金姓此山欲就一竿漁浩蕩更慿雙足弄潺湲老僧莫作誰何問只借中泠洗醉顔妙髙臺望江一源萬里勢成三截地分明限北南長塹悠悠天所設奔流浩浩海相函獨憐擊楫存遺誓可笑投鞭是漫談頭白妙髙方縱目落霞孤鶩晩猶貪飲中冷泉此山有此泉他山無此泉泉名與山名並為天下傳山泉兩合徳珠璧輝江天宛在水中央天使塵土懸山本一江石泉井從石穿非鬼不可鑿人莫知其源黟深貫龍窟不溢亦不騫我乆負渇心始脩一啜縁慿䦨引小勺氷雪流荒咽載灌肝與肺化作清泠淵沁沁若沆瀣逐逐空腥膻至味謝茗荈亦不從烹煎謬哉康王谷欲勝宜未然未伺鴻漸知但飲必推先由我口舌譬亦獲參其𤣥世多未沾者茫茫尚垂涎滿注兩大罌載歸下江船搖光蕩江月汎影雲亦鮮分潤及鄉人七碗同通仙歸途欲登惠山時烟雨空濛衆有難色余獨奮徃惠山怪我昨徑去歸來欲登却作雨濕雲隔眼失髙翠掉頭不顧眞巢父願治笠屐徃慰謝衆慮霑濡吾莫沮我言惠不在天上行不畏難當至耳呼童挈榼客乃從一段竒蹤自伊始西湖山色竒空濛當與此山移此語光禄汝徳發舟自東川行行渺西鶩返照變湖色四浸映浮樹輕風汎廣水低昻浪相互亦復疎雨零頃耳遂澄霽延盃引叢語殊莫省修路遙睇君子居聊賦停雲句欲擷汀洲芳悵然無所遇和呉匏菴姚氏園池四絶宫庶才名天下知舊題留在此園池墨痕蠧盡重翻稿二十年來似夢時蚤起治園晩始歸黄昏蝙蝠滿堂飛人家夜例開門睡甚矣先生併去扉雨後春池漫石磯櫻桃梅子兩争肥東風試暖諸生假間就滄浪浣舊衣小小園池儘自清不曾誇大命新名㸔花㸔竹多佳客竹與追陪花送迎和匏菴觀治園和韻散直樂清燕緩帶行園中闢荒自伊始有力適我傭羣礫一何多瑣屑錯蒿蓬漸理塍與溝脈脈見泉踪作者茍不劃奚憂植難豐况喜臨皇畿春早氣自葱好鳥鳴樹顛東方至和風勿去觀小道治國将無同水悶破屋如舟只浮住茫茫魚鼈是比隣頻年大塊無乾土何處巢居著老身萬頃汞田春澇富數聲雷腹曉飡貧詩書不飽還堪遣開巻時時感昔人圖錢氏沁雪石亭前峙竒石兀可當一障沁此萬古雪亘地氣魄壯蒸雲勢欲軒得月神更王妙擬軼汍池潤未下雪浪刓鑿天借巧胷次見洞蕩孤立宜有隣雅許脩竹傍風雨不敢泐刻名乆無恙寶此一夔足磥砢不多尚貞徳允配主白衣可呼丈我見便欲拜良信米弗誑聊與貌髙古敢有愚公妄謝顧天祥送將樂石一拳竒骨勝仇池落眼眞㸔玉雪姿急埽秋軒容突兀更栽野竹與扶持已藏東海從深袖便捲滄波答小詩莫道空言尚加拜此懐還託米顛知雨後經西園小園西百步五畝未為慳得雨草皆滿無風花自閒儘清全頼水論足尚虧山樹藝有餘養其如丁者頑登牛頭峯和陳永之韻秋坐無所適牛峯期峻攀携手相魚貫極力凌孱顔東來望城郭北指鬱江關凉風振木末葉飄巾屨間俯見行旅人役役徃復還如我二三子逍遙意自閒其中有達徳髙誼薄雲山夜登千人石有序四月九日因徃西山薄暮不及行艤舟虚􅉌東趾月漸明遂登千人座徘徊緩步山空人静此景異常迺紀是作一山有此座勝處無勝此羣類盡磽出夷曠特如砥其脚插靈湫敷霞面深紫我謂瑪瑙坡但是名差美城中士與女數到不知㡬列酒即為席歌舞日諠市今我作夜遊千載當隗始澄懐示清逸瓶罍眞足恥亦莫費秉燭步月良可喜月皎光潑地措足畏踏水所廣無百步旋遶千步起一步照一影千影千人比一我欲該千其意亦妄矣譬佛現千界出自一毫耳及愛林木杪玲瓏殿閣倚僧窓或暎紅總在蛛網裏閴閴萬響㓕獨度跫然履恐有竊觀人明朝以僊擬因楊君謙見和復和一首狹逕穿山腹盤盤雄歴此吳王三千劒意以是為砥鐵髓積廣面歲乆色尚紫石槩竒窽竅此以平為美坐閱今古人當不知千㡬集坐畢一時僔僔嫌如市况乃實不及千名何以始凖彼釋氏誕萬億未為恥俗驚少攝多走觀信而喜我登紀夜吟其面月如水楊子時莫偕清篇觸倡起歴歴到以意不遊與遊比語語盡括石石舉在詩矣使石尚化玉倐忽鬼入耳玩之靈光生戛之雅音倚氣復蒸春雲詩又在石裏瑟縮愧我辭荆棘礙步履自笑邯鄲人胡為强追擬君謙又和復答子才五色石補天曾以此餘才散為詩或突或如砥今賦千人坐秀句尚紅紫誰謂丈人醜貴有㓜婦美一篇似難又連篇不覺㡬謂即事深刻打搨滿城市先時漫無文增重信伊始我如呼風鴟悲鳴自堪恥子如希有鳥九萬借風喜上掣層霄雲下掠滄溟水餘力播此石久静當􅀈起㸃頭有公案悟詩與禪比不然只冥頑一石而已矣我言子無答一言而已耳尚容答千人琅玕雜然倚還招舊時月總照新象裏我復就盤陀箕踞脱雙履咏言証千人使石無妄擬載和答諸友我閱丘中石􅀢屭特見此天不生亷隅蕩矣若加砥但嫌色相在雨洗常出紫坦坦宜坐人喻千溢其美未如清凉達所容不拘㡬可拔豈萬年菱谿笑穿市夫差墓其側恃固乃經始小類莫試劒脆裂傍可恥夜夜曬明月玩弄少客喜我來發豪吟鶴磵應流水初慿石乘興亦半因月起百年擇一勝頗與赤璧比有石無此月其遊亦漫矣有月更有石有詩兼稱耳下里和者多聲韻妙依倚胷中各磊隗争出言句裏何當拉諸君我亦補芒履明年待中秋石逰更堪擬月夕汲虎丘第三泉煑茶坐松下清啜夜扣僧房覔磵腴山童道我吝村沽未傳盧氏煎茶法先執蘇公調水符石鼎沸風憐碧縐磁甌盛月㸔金鋪細吟滿啜長松下若使無詩味亦枯和馬抑之大小干山歌韻大干山小干山宛如両玉浮湖間却疑子産不受棄於水古人髙誼今者行何難山亦有何欲誰與名之干有干於世則有欲磵愧林慚當厚顔君不見寢丘之後有妬谷避惡之人居亦棄又不見廣州之間有貪泉好亷之人飲所忌我為别立名寄示雙嶙峋大谷大玉小小玉洗爾慚愧開精神老夫十年枵腹水没稻朝惟嚥日莫飱霞與雲平生餓死事極小俛眉承睫何為人莫釐登髙巻己亥秋文明府天爵訪王翰林濟之同登莫釐之峯二公各有記予不能同遊不知其為勝兹强作圖與詩聊復爾耳洞庭雨山浮具區金庭玉柱僊所都翰林王君列僊儒住隔萬頃玻璃湖洪濤巨浪相吞屠我欲從之老命虞海東文侯眼孔大視之不與㘭堂殊眼中之人不可呼翩然往就喬之鳬文侯文侯實尹呉所治百里山水俱山靈河伯受約束疑為後擁仍前驅髙登莫釐盡竒觀云古未始今當無白波青嶂坐可挹紅粧細馬來敢汙兩人傲睨萬象表但恐笑語天人狙揮毫撫景間盃酌作文競與山描摹湖山洵美我未識翻意斯文相厚誣縁文作畫强鄙夫正如擿埴求其途茫茫意㑹復有詠長安西笑何其迂有生不遊山亦誚手搔白髪吁嗟乎寄題金山金山名天下名大山則小我在童丱時其名已自曉願登盖有待待待首空皓屢扣土著人掛漏麄可道所亘百畝石江心泊浮島山中無空處皆以殿閣遶及參能賦者語莫盡其巧我托耳為登聊且厭悵懊譬如山墮夢其境皆夢造夢覺費追隨所得未了了有路縣不逺有身無大擾從地借健步從天借不老便須逰一年冩此平生抱病中懐西山兀兀安衰疾重簾竹下房日因忙者短夜為老人長薦粥脩蔬品抄書􅀈藥方西山行樂地螯酒付誰狂拂水崖只有㸔山是勝縁青鞋布襪且輕便天収雨脚賖今日我趂花時遣老年絶壁雲扶將墮石豁崖風勒下奔泉此來不憤空歸去旋搆新篇揀竹鐫過湖村㡬家成聚落鷄犬夕陽時人影臨流揖帆梢拂樹移積禾髙屋脊落葉厚茆茨隣並尤淳厚常通無有私城中夜歸塵累茫茫有鬱襟思鄉就晩發城隂潮來頓長溝渠量船過平穿市井心僕子促程雙奮櫓人家臨水亂鳴砧柴門髙想慈親倚新月疎星恐夜深崔氏水南小隱一家縣水嬾通橋寂寂寥寥逺市朝寸地有生耕子姓索居無類畫漁樵晩波埀栁供魚貫春雨髙梧養鳯條莫謂温生同住此不因車馬趂人招江山勝覧滿地桑蓬屬少年出門自賦逺遊篇匡廬眞面開屏玉嵩華僊踪倚嶽蓮野市誰家濯春酒隣船何處訪秋弦老予牖下今頭白司馬山川是夢縁三月九日舟泊虞山下見逰人續續于椒麓間可愛而賦霽色澄虞山正與遊人偶一年無多月春三及秋九勿厭傾郭人隨俗悦親友春風若招邀是處閙花栁林華競妍新無復有惡醜間見叢緑中逺暎紅裙婦休云惱山谷㸃綴亦可取摳趨識壯歩屢頓驗皓首下上相追擕從髙引衣手尚有㪚逸流列石自爼豆老夫目中盡未在逐逐走况當氣力衰孤坐還可酒雲山雲是青山舊鉛粉一翻粧㸃一翻新鬢邉白髪偏無賴㸃著都成老醜人丹陽道中抖擻山邉水際身廿年重踏舊京塵依依殘夢丹陽月兀兀輕車白髪人諒自去來無箇事趂他花栁未分春關津莫作誰何問詩酒承平一老民錢士𢎞阻遊虞山我懸虞山當一舎曾㡬尋山止其下見山便怪老足困劍門拂水心空掛諸君生長為山隣終日熟逰非曰乍今朝懊惱有長篇頗被春泥妨不借儘自空濛雨亦竒抱衾况宿林廬夜開門㸃火照芙蓉濕翠還堪酒中㵼湖上雜言縱目極遐曠水嬉湖中央青山載白波上下相低昻俯首愛雲霞零亂隨蘭槳悠悠遡空冥忽忽超景光宛宛漢臯女落鴈懸㣲茫可望不可即相思如水長題沈履徳逰湖雜詠巻朝㸔湖船出暮㸔湖船還逰人趂日不用揀雨晴雪月何曾間舉頭看山低頭飲唱謌小女桃華顔青山亦來照湖水一鏡暎入千螺鬟便可斗酒詩百篇更選絶壁鑱其頑青山萬古湖萬古歲月但與逰人慳昨日逰湖人今日埋青山青山與湖同玩世儘把少年勾引老者删君不見白樂天蘇子瞻云公不能再為湖山起虗名空掛湖山間我當把湖釀酒日日醉豈被紅塵白髪相欺謾再至虎丘松巢主僧索畫用空谷山居韻世諦紛紛擾擾間松巢來詰老僧閒愛山已結峯頭屋借畫仍㸔屋裏山池影心空和月見巖扉客去倩雲關新茶新笋都叨却香積誰云染指還夜行村路中用程篁墩虎丘韻躑躅經墟復歴丘晝時不走夜時逰泥塗我有多岐歎江海誰閒野渡舟著力自家須杖舄發明何許借膏油從知世路不易涉只好歸眠舊草樓紫雲洞天地不秘寶芙蓉擘空青借問此何居仙人敞雲扃翩然招玉童導我探窅㝠髙歌振逸響側足履落星下有古靈湫天光泛清泠酌之不可死閱世齊冥靈石田詩選巻二
