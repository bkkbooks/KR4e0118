body:
  text: 石田詩選巻六明沈周撰忠孝節義附唐琦琦紹興衛士也髙宗南渡海金琶八追至紹興李鄴為守以城降方與琶八並馬行琦從後持一大甓祝曰願天一擊殺兩賊甓中馬不利被執罵賊不絶口琶八謂曰汝欲何以死曰我願以布裹灌油焚燒三日示媿降賊之臣也卒焚之其意恐琶八追及髙宗欲以緩其程也鄉人異而立廟長簷街國朝贈將軍祀之越人能言其事因賦此一甓真如博浪鎚事機不偶亦空施降城未分身無用罵賊猶知舌可為膏火願延三日死海天能信六龍之長簷街上春秋祀李鄴魂應媿此祠孝詩六章為顔季栗賦歸骨季栗函母骨歸自鳯翔負而陸行懐而江行卒全首丘之義作歸骨操荷之跋之函歴阻脩懐之渉之函經横流生死肉骨兮天既罔求俾我首丘兮豈天固酬惟山有狐惟水有龍實能侮骨其割為朋雖朋其割終不我離㣲母之靈兒曷能為迎養季栗既迎父歸養至視溺清濁以度飲食而慮致疾也作迎養操父還兒迎叶越彼西疆既達我宇其喜洋洋亦酌我酒其樂融融惟天之徳維家之慶叶惟溲之濁我心惟惕惟溲之湜我心惟懌彼胡然哉孔系于疾爰度爰徴爰修飲食以夕以日我心弗忒哀殞季栗以父疾卒哀慟五日夜遂亦不起蓋孝之過厚者也作哀殞操嗟嗟違和考實遘痾嗟嗟痾沈䀌傷我心鬼神其知兮祈以身代惟考生兮我亦奚愛考無辠兮惄卬實延顧兮致殁愴卬特全茫茫昧昧而理胡然嗚呼恫瘝兮五内分裂匪欲自傷兮哀至莫節魂漂漂兮上升氣溘溘兮隨絶顔氏婦節孝巻人生苦是從軍行致之死地而復生何况婦人處閨閣不知關西多少程相從翁姑萬里去性命自擬鴻毛輕風原霜磧莽何所嘷狼哮虎心魂驚新婦不敢嗟嫠􅑱手扶病姑兼兩嬰中途姑病不復起一身無蔕猶漂萍歸来函骨尋舊路有眼茫茫渾似盲嗚呼顔家新婦命薄苦如此只樂節孝傳其名崔孝婦孝婦視姑疾轉革心徬徨潜以肉代藥誓為續命湯存姑若無已剸刀若無傷臠落痛不入人知云未嘗皇天助肉神一啖姑下牀子澂哭其創掩口使勿揚汝揚義則過違教理非當肢體具父母克全孝之常此蓋迫不忍事出倉卒腸復有窆親地既為豪所攘歸璧須大力婦人本何遑拔我金雀釵脱我眀珠璫别壤吉可買抱骨改其蔵憤懣終莫釋悒悒致殂亡豹斃尚還文麝死可留香孝婦雖已矣令名身後光周節婦孝感黄氏十九時歸周文璧氏二年文璧䘮弱惟一女恃有姑患痿痺其狀莫比儗有肢如無筋有骨如無髓在牀如空中有身如蛻委日夜但㝠㝠僅有息存爾聞聽與觸動稍及即厥死薦地方儗歩通問必附耳艱難食溲處不敢託諸婢百藥無一效百累叢一已黄氏心煩惱惛惛不知處東家優婆夷憐憫為黄語汝姑溺苦海汝知故何以愆業如丘山宿世所積累須皈大勢力南海有大士解難說真言功徳莫思議但要深心持日日要如是一言一拜叩億又八千數在佛雖有程敬愛無庸紀功深果報近何患患不起黄氏聞是言煩惱生歡喜歸室便置像恭敬為拜禮沐浴體投地心觀口娓娓亦不知其終亦不知其始亦不知其寒亦不知其暑閱日千八百歴年數得五俄夢見一姥前黄行迤邐心謂是現化稱名畧不顧極力欲追即歩歩懸尺只逕入一區廬闔户若相拒欵叩發號泣其户豁然啓菩薩示妙相金光爍瞻睹頭上珠瓔珞晃晃復蕋蕋蓮目垂慈光宣言啟玉齒黄氏前諦聼合掌作長跪云汝依吾道悉知悉見已慈悲為我愿豈無嘱付汝循功加精進九日一扶倚七九扶以行前及我處所覺来汗淋淋其言尚在耳悟佛為衆生方便指門户信心愈堅牢額破吻俱腐臨日試小掖筋骨覺可舉屡試屡無難還能歩移跬彳亍詣像前奠香致情㫖其炷從空躍踰梁而直下乃著於本人正中頂𩕄裏其聲若驚霆其勢若擊杵身心發震竦百苦悉皆去如風捲天雲不復剰粗滓如春活枯草如氷化為水親黨盡来觀讃歎世無此姑謝新婦力脱我出死簿新婦答何功菩薩威力故此事聞其甥王綸能覼縷韋虚氣治痿若或有仙技黄氏孝治痿專以誠為主格物與布氣非誠莫相與孝有致乆旱孝有致水鯉事本出非常未可論常理我特書其孝勃蹊用為砥至今崑山人大書播邑史石節婦吕家有小姑許嫁石家郎石家罹法網合族無留行叶里豪復求婚趂此事更張慇懃媒氏蜜為口不知小姑鐵作腸誓云生死石家婦有脚不踏他人堂皇天后土憫節義石郎不乆仍還鄉流蘓嫋嫋開洞房春風吹入雙鴛鴦百年伉儷只三月眀鏡忽破無完光拔我黄金釵脫我眀珠璫東市買棺斂西山買髙岡土中先鑿合歡穴怨骨待共他年藏此身已死心未亡身上不著新衣裳有身苦無兒女託養老来依諸弟傍只今含笑入地下七十八年雙鬢蒼君不見松枯尚有節蘭槁還留香節婦之名不可泯當與萬世扶綱常貞節為朱孺人題松溪之松貞不變松溪之水清不汚松貞水清鍾節婦節婦有家溪上住及笄婉孌女于朱松上女蘿期永附四七之年分死生女蘿㷀㷀松忽仆三雛眇矣提抱間今各嶄然能幹蠱晨舂夜織三十年白髪毿毿照荆布少時望老不易到見苦歴勞安末路譬拔金釵投火中火盡爛然金若故燒香暗告泉下人白日知心已無負顔烈婦俞氏義事顔春吳庠生娶俞氏頗渉獵書史有婦道春患瘵不起呼囑好事舅姑養子女言切而再婦曰一言當終身服行何俟再四乃潜握剪以利鋒剚于左目流血滿地絶而復甦春責曰何乃如此曰示君信也春遂卒因咏其事一首翦鋒刔落玉精神要使亡夫識念真判死不教留好眼示生無復見他人波翻銀海傷珠顆血迸金支破月輪表向胥門舊懸處配成忠義激風塵烈婦吟湓瀆西滸薛媛卲婦邵吏坐法逮者如虎逮恱薛嫵佻語肆侮薛醜其語身雉經誓不辱夫以死眀黄犀辟塵塵不生白玉絶玷玷不成嗚呼荒塚乆欲平後人立石題烈名烈女死篇周家女子李家婦未嫁夫家但相許正如一樹未開花分眀自有春為主李郎病瘵兩年强說道今年畨上牀聞来人語多不的口又藏羞難問娘只對寒燈淚如霰為重為輕果誰見此身空負嫁夫名此眼何曽辯郎面阿娘背語泣堂前忖是郎邉凶信傳烈婦重義輕一死貞女安心無二天通身示孝衣裳白長練髙經繡房夕在世鴛鴦不得雙同到黄泉願成匹烈女生篇阿娘心悸夜不眠起来顧女如雉懸肉寒氣絶强求艾引息㣲㣲吹碧烟奪鬼為人天假手天亦憐渠能過厚怕教此義世無知不使其人世無有夫妻未媾本何私分在名存白日知何如死向白日下千載分眀心不欺今載聊因阿娘活枯木暫回根已撥將心化石立郎塋表是郎妻刻妾名葉婦髙節詩節婦鄒氏年二十三甫歸官橋葉氏子芸僅五十五日芸卒節婦誓死不出房限不與人見其姑謂曰柰火盗疾病何節婦乃約云云後疾草囑曰吾寢生處以安死必殯此不可容弔者入如生之不接見男子以畢我始終之志言訖而殁享年六十有四余髙其行度越常流逺矣次第其言以著于篇云葉家夫郎鄒家婦百年同生誓同死五十五日天奪之一箇孤鸞失其侣腹中顧後無男女手中托生有機杼短檠長夜不敢哭白日深沉閉房户老姑謂婦嵗月長新婦告姑聼我語我身聊奉姑同居我心已與夫同土青天雖髙所不欺白髮固逺要自取憂勤患難以靜制禮義廉耻在剛主火来脇房我不動委身一焚火莫苦盗來敲門我不驚先身一刎盗何侮病來容藥不見毉有臂可斫診不許事雖未及慮早及口既能言身有處世當可重儗金玉家不可少比稷黍臨終一著猶可竦笑謂家中諸嫗姆老身幸享六十餘數盡年窮理宜去紛紛身後惜事亂從此治時先囑汝房前指限喻如山自我入来無出武房中處乆於我殯魂識依依得其所生前忌接男子面死魄毋令弔人覩人間嫠寡堪作别始末髙眀越今古朝廷未聞鄉且頌完徳更宜加藻斧何人有力達太史何人有力達公府嗚呼節婦今㝠㝠其身可腐名弗腐贈韓珍恩以生骨肉義以生撫育韓珍本異姓恩與義兩足心肝蓄義血甫有數十斛義氣溢皮毛馨馥及衣服主父病京邸危命一線屬千里獨奮徃倂日走匍匐藥物無能為事亟刲股肉股亦割義刃無懾亦無慉雖然不救死揆意義亦篤君臣亦義合徃徃逆亂伏珍乎可珍哉揺毫吾特録咏費彦傑還釵事淮安新城下交易利所在徃来十萬人財貨溢閭闠道上或有遺一錢尚爾愛老叟費彦傑早行足有礙俯拾黄金釵耀目口發喟乃詰旁居人經此何淑艾衆云未始見見秖有輿載恐是帷中脱去此尚未邁費追逾阡陌氣喘力良憊止輿問何失曽莫有所㣻輿女驚其言撫䯰乃覺謮搴帷出粉黛便即就地拜還釵叟疾走更莫延少話女却叩姓里答云不足芥無姓住亦逺欲知將奚待我亦弗汝詢彼此付曖昧此事常有聞但慮斯言躗偶與叟相接詢之乃至再叟笑云雖有宜還無可怪嗚呼古人事喜見行今輩揆今實為竒蜀日犬乃吠在叟似非難在衆則難逮義利寓人情要之得其裁吾詩為叟發庶亦存俗戒蜀國宋承奉好義歌君不見簮折尚有慽缶破還失聲可棄復何惜奈有不忍情蜀之内相宋公者儒服聊借貂璫榮翻編展巻日不輟談仁說義口似天河傾前年搆江橋長虹跨彩成雙清今年結净居樂哉斯丘手自營費金萬餘極宏麗空墳一箇身長生國初宋學士華國文之精蠶叢生流死且寓山水嚙塚見者驚今之内相古王叵感此惻怛思遷更撤我闕居為彼佳城萬金之重忍一擲折簮破缶無其輕割愛以酬義千人萬人無此能割財以徇義千里萬里流其名来者有濟行人讃歎橋上行逝者有恵枯骨負荷於𡨕㝠何公慷慨乃如此其徳好藉詩書成可笑士良以書禁人讀欲使耳目塗聰眀嗚呼以公視仇仇乃詐以仇視公公乃誠義商行商程無山川逐利是所征商車無嵗月徇義豈其情程君倜儻懐乆矣客遼城前年聘少房鎰金酬娉婷娉婷來歸際掩面淚縱横謂翁坐逮賕鬻夫未能盈失身馴及妾包羞履君庭彦寛未畢說毅遣誡亟行人妻我可奪人急我可乗酬金弗汝責毁券迹亦平既以贖伉儷復以贖笞搒父子與夫婦載造遂歡迎義利在天地有若水火爭達人識所嚮遐邇騰芳聲我聞詰彦寛輾爾無答譍徐云勿多揚我初不為名我即低頭拜古誼重光榮讃言欲勸薄拙斐惟勉成常熟張修譔孫女許人為妾楊大尹眀父改妻先賢言氏之子因賦芳蘭阽糞壤貞女議少房為計墮媒舌父母惑如簧女子何所知衷心不分眀令尹㢘非偶喟為先徳傷割俸資返聘乃幣乃篚筐改求大賢後言氏得秀郎貞女與秀郎既婚復有將此事若天斡鬼神與之襄令尹通神眀義氣扶綱常摘珠出泥塗炯然開夜光拭璧從埃壒煥爾昭天章富鄭自范擇言子思激昻結草報治命翰譔當不忘我特歌尹徳詞短意則長烈婦殺虎圖誰謂繞指柔能化百鍊鋼誰謂婦女柔殺虎如刲羊有女如䑕恐其虎况能殺虎非不祥脫夫之命豈例此當熊之勇同肝腸尋常鍼線倦紫鳯卒與虎力争其強虎時顧得不顧失婦心顧存不顧亡手中有刀愛作刀以義淬之無敢當天寒月黒星有光虎血塗地葭蒼蒼人生有行無棗陽楊氏義塾老重諸孫教還推與衆同就於家有塾顧自我求蒙買讀書金白供炊廪粟紅四方皆競利此地有文翁分得義莊送李中舎貞伯還朝君不見范公嗜義如飲食范公庇族如羽翼親疎百口百不憂養生送死皆公力公存公亡猶一日有田供需惠無極伐石紀事莊上頭大書特書髙十尺李君車馬有行色下馬讀碑三歎息若見甘棠思召伯若對澧流思禹蹟李君亦豈尋常人身小才大氣正直博學强記無與敵平歩便當超九棘十年小心職文墨階次悠悠鬢将白故園已築梅花莊此意含仁我先識嗚呼范公之後多閒田願君買接東西陌鎭南世節行為黔國公賦黔公坐鎮封内清黔公卧治封外平碧雞金馬作門㦸復有滇池供洗兵黄牛平把寳刀換春山来勸諸夷耕諸夷愛戴非一日子孫孫子知生成雕題花脚最難服今日推公無孔眀憶昔先公遇髙帝鼾睡龍懐天不驚印如金斗酬百伐帯誓黄河申載盟桓桓祖武㸔公繩天南别隠一長城金湯雖固尚在法恩信相孚何待征古稱僕射如弟兄軍中笑歌髀肉生國公自進瑪瑙觥醉後還賡出塞行費元詩義事乆不見將謂民風漓有此費元者秦人何可欺嗟嗟逆旅鄰平昔昧所知瘐死憐頃暫給饘活其饑傍窺妄譏議將利室中姿鄰後願奴報夫婦自同来元曰非奴利茍利非我為掉頭畧不顧天地知吾私至此嫌猜盡君子未嘗移所薄既云厚厚者宜過之兄氏没永平訃達肝腸摧哀痛出天性殞絶豈自期或謂不可訓若撻䦧牆兒斯人今已矣其骨當為芝其魄當為雲祥瑞昭眀時况是有賢嗣天報信不差尚有千載後名從青竹垂二姬晚色寒香二姬名也吾友張芳洲無子末聘之者方洲過世服除其長女劉夫人俾諸妾尚絲麻結心獨畧二姬曰汝少年嵗月悠長當有别處二姬曰蒙先主公取憐日乆雖死不足報况有他意哉遂焚香告天大慟二人互相落髮以表其志因賦此以旌之色香寒晚總非宜豈是蟠桃結子時種樹園林春寂寂惜花窻户雨絲絲鬢雲截誓生同落心石存恩死不移兩結青青百年信九京當與主人知荆花春意為彭昉寅之賦我寫彭家荆不寫田家樹彭家兄弟無異言不似田家初有異兄弟原從一氣生荆亦同根復同祗花不亂開則聚枝不亂大小附葉不亂上下蔽風吹枝葉動月出形影具有兄弟應求之義次第之序人謂彭家有此兄弟和我謂非此而能致老夫見其祖子孫和順孝友迨三世無乃氣體之孚以和召和曽不戾彭家此樹未必有我今寫此尚與存勸勵嘗見他家真有荆樹下䦧牆兼紾臂饒他漫有好荆樹不如好兄弟有好兄弟荆亦貴無好兄弟賤與凡木類我寫不寫樹寫其兄弟心之懿兄弟和在心音聲容色愉而憙不和名不祥家不利我雖為君寫萬樹不若自裁一樹方寸地閒適睡起自遣書枕悠悠自小康何須斷送脚塵忙屛心雲氣山開畫樹裏簷聲雨滿堂名利可憐雞有肋神仙秖累䑕拖腸時時具酒招鄰曲閒與桑麻較短長覺老脘膈生痰謝酒觴菜羮麥飯且家常山追舊眺今成懶事喜新聞背已忘春水試竿漁檻净午風丸藥鳥窻凉秖須如此成消遣種種塵縁與老妨窻下獨坐漸覺年捱七十傍聰明視舊已茫茫有生但恐違温飽凡事無能與短長食力田園聊任拙離羣城郭少知忙新糊窻紙添虚白尚把殘書趂日光病起筋力遲遲百嬾成關門只好謝逢迎老空求舊無同輩拙不宜時讓後生乆坐衣裳知晚露獨眠衾枕厭秋更秖餘曝背兼捫虱黄草簷頭覺稱情試筆老大為生未有涯浮雲流水淡於懐小垂舞袖人嫌拙寡出言辭我自佳月下古編開棐几雨中髙竹映茅齋無心苦算閒時日任爾新蓂緑滿堦睡起欲晴不晴雲閣雨欲落未落日掛山道人睡起思如水閒倚長松數鶴還晚歩西林聊獨歩樹樹已棲鴉童笈歸村校漁船聚酒家玉痕雲映月紅纈水眀霞此景偏留戀衰年類日斜早興清霜被羣葉青黄紛委地病肌粟朝寒烘背俟陽氣深坐聊展巻眊矂怯細字嵗月逓吾老不謂易以至盛衰理自然㣲吟不成嘅晩坐春殘尚絮袍林屋氣蕭騷白日若不夜人生亦太勞泥花方失勢雨筍漫争髙小酌仍觀物新醅惬老饕擬一日復一日一日復一日一朝復一朝青春不用推白髮不待招漸見襁者大還催老輩凋借問學仙侣此關果誰超神仙本㝠冥其言亦寥寥獨有姬孔業天地同遙遙晏起水漫湖田雨漫邨家貧只好不開門詩書衣食外無徳天地君親中是恩馬失未須論得失楚存何可卜亡存百千世故都休問且把心耕教子孫晚出過隣家小酌兩旬方一出門外事紛拏魚促春波淺鳥争林日斜老夫傾竹葉稚子捉楊花小坐聊乗興猶堪感物華紀夢隠居逺住海邉州山水清標接夢遊酒醉又移花下席書多别起竹間樓兒郎習字陟釐紙童子供茶秘色甌起擁黄紬尋幻境一痕斜月小窻秋憨憨憨憨無復老人懐春日烘門晏始開遊衍太平初試杖安排樂事數拈盃世情花黨富家發公道燕均貧户来識字不多强不識小篇聊與物追陪貧富吟貧富限世分髙下莫均一富者詫潤屋餘潤及銘筆貧非止赤身躶死至無堲茍云可操致智士豈無術㝠然觀無物二者何得失閒居殘書滿屋迹堪埋俯仰寧求與世諧貧賤自安愚者分毁譽何撓老年懐小篇鉛槧時時課糲飯􅐽羮日日齋外慕素空塵夢絶庭前似厭有髙槐慶夀生辰附玉洞仙桃夀傅宫詹曰川傅説本是天上星攝行相事奉青駕老成端諒帝所選韋賢李勣徳不亞譬為舟楫濟川用譬為繩墨梓乃架表儀鶴苑統仙班秖講麟經曠清假左氏文章費紙傳温公肖貌令人畫洞天開府住有家度索蟠桃覔無價記栽日月降甫申㸔到雲霞接嵩華三千結實嵗何長萬核裹泥生不罷其人如玉壽如桃八百老彭何足詫趙惟章夀詩葛天之世此心藏萬事熈熈不著忙鄉認當時非姓鄭人疑叔度誤呼黄詩供賓客三千竹衣䕃兒孫八百桑宅相愛談吾耳熟固知賢者夀能長盧以和生同嵗月日時與君一嵗月時日亦相因何止同丁卯休論雌甲辰偶然逢此數勉矣各為人落魄乾坤内吾生豈患貧六旬自咏自是田間快活民太平生長六經旬不憂天下無今日但願朝廷用好人有萬巻書貧富貴仗三盃酒老精神山花笑我頭俱白頭白簮花也當春夀表兄金懐用七十筋骸可與少年争七十長鬍白未成鄉裏燕毛多讓席族中雁行盡呼兄魚蝦細水烟蒲瀼鳥雀深叢雪竹浜樂此閒居儘資夀燒丹辟穀見誰生六十一自夀重逢丁未開新甲過六十年増一年夀是倘来那必得人於末節要求全占鳩挾婦傷今日亡室同月日生羨鶴添孫欠此縁時未得孫萬事莫論吾母健進將春酒北堂前生辰今朝六十八歴嵗知既夥青春不還人七十近在左流光迅晝夜忽忽迸石火我與石火争寄活真螟蜾但願無疢疾詩骨瘦亦可浮雲載富貴過眼頥不朶先人有薄田數口頗纒裹關門事清咏天地自容我生朝自遣門前客到鶴先鳴灑掃茅堂作送迎座舉龍鍾先有我鄉尋儕輩漸無兄眀年七十將来夀今日三盃見在生一幅布巾藤作杖倩誰林下晝閒行寫菊夀王學士濟之尊翁八十我寫東籬第一枝長生豈止紙為期年年上夀百年計日日㸔花九日時還喜帶金同晚色不妨鬚玉照寒姿莫釐亦是登髙處未必齊山許有詩生朝茲辰始度世眇然畱我形良荷生育徳允含天地靈寓品幸稱男耘耔充園丁衣裳賁其裸嵗月假以齡駸駸及朽腐草木自林坰隙光感多閱傾水莫返瓶承流且云邁數止我自寧生日小酌今晨感我生襁褓迨衰老嵗月倐徃来七十何草草譬初同此日天下生不少善惡與昏智貴賤及夀夭各各不可齊鵬鷃皆自好但恥老醜人多為後生藐我母自愛我諭事且訖了兒女自愛我勸我飯加飽朋友自愛我把酒頌且禱我生已萬幸際茲世有道拙廢固無用農圃亦可保盃酌雖寡嗜些少慰懐抱偃息間行游隨意弄花鳥樂哉天地間偷生亦為巧分得清白遺後夀曹時中憲副東家歸人買田地西家歸人置歌妓先生亦是歸來人完名怕著黄金累教兒但守舊茅堂鬼瞰不能低可住先生髙夀却瞰人東田不存西妓去七十喜言五首自知蒲栁望秋零意外驚延七十星膝下還為小頑子籍中已是空閒丁先人蠧巻箱藤白老母魚羮釣竹青儘把餘生享天福亦無慙媿到山靈萬萬人中數我零為農亦是一微星衣裳無補吾眀主天地徒存此老丁濶水游魚尾不赤絶雲髙鳥影俱青笑㸔拜極癡兒女已到希年尚乞靈七十迴来秋葉零後憐歴嵗已晨星不才儘自慚諸已識字聊堪破一丁心事浩隨雲共白鬢毛難學草回青湖田繞舎粗饘粥雞骨豐凶屢托靈眼識茫茫齒髮零種田還欲候穰星百年云倘行猶未七十為稀幸已丁待月露生秋袷紫仰天風卸暑巾青時修静觀心齋裏應物虚眀自覺靈七十稀年又九零敢慿虚妄更推星身軀薄劣無壬甲詩草蘩蕪合丙丁饌品乆空魚白白葷柈尚詫韭青青因多歴世多知事非為谿翁性有靈生辰野叟堂堂七十一乾坤坐閱老頑身美人座上笑白髮白髮鏡中催美人且就月庚尋活子莫慿年甲筭生辰丹丘好在吾家裏滿眼生涯滿抱春庚申十一月二十一日生朝作七十四年剛送過今年添作五年來從前饒算没一馬向後猜􅍐知㡬枚菜子筋骸强可舞吳兒心性老仍呆人家有地皆桑苧我獨貪香却種梅夀萱為邵國賢賦誰家無萱草誰家無老母堂前無孝子萱草亦空有邵家碧玉根孝感生不苟開花作婉容順葉承左右愁非備養具不足充體口邵子所以種渉孝豈敢後聊寓盆缶春志自超盆缶干禄以代養早已登州守官大功名大封榮日加厚腰帶映金葩首翟照春酒如何母不樂樂則自宜夀人生養至此孝果在萱否夀趙與哲七十隠徳堪尊齒亦尊一家風物自桃源鞠躬禮度强筋力隨口詩書善話言郡裏歌鍾大賔席人間玉雪舊王孫七旬黒髮期黄髮兀兀靈光㸔獨存畫松夀大司馬三原王公尚書府中松十抱直氣貞心不知老關中土厚根柢壯十年間生地之寳上叅雲漢不屈身世間草木斯為表用之擎天天乆恃用之柱國國永保伐柯擊姦擬顧笏摘葉指佞比堯草朝廷何可一日無百不為多一非少凌霜傲雪古色存蒼蒼直與秋天杳孔眀廟前有老栢此物亦自因人好大觀直謂古今同時固難同貴同道金花玉苓仙所食只在長生不在飽須公采啖三萬斛四海蒼生期夀考壽張黄門靜之千篇詩是紀年籌小算方經六十秋舊接夔龍侍香案新移雞犬别方洲大觀滄海難為水老望瑶京更起樓夀祝如岡錯璋字寄君一笑海東頭雙夀為錢時用賦嚴算方周甲慈籌稍一先嵗年成上下天地與因縁春酒百花下南山雙闥前兒郎新舉子父母老神仙題松夀崔望宗髙松環翠堂前物材比楩楠夀比椿雲蓋今㸔樹成日雪頭還在手栽人新苞擘玉收蒼子靈柢蒸霞驗伏神我祝長生寫生去墨花吹雨硯池春生日漫言㓜時慕八十妄念笑荒唐八十思㓜時過事驚渺茫事過三萬日人如傀儡忙忙忙到衰老傀儡是末場謬以百年算畸日苦不長雖有六千日長短未可量使長莫如前使短亦不妨固非罹夭閡白髮映黄腸生順與没寜大觀理之常今日喜飲酒樂極發悲傷盗跖不在夀顔淵千載光夀亦何足重所耻無流芳耻貧無潤身不耻食糟糠耻賤無克家詩書在猶亡腐草舉末熖螺田懐餘香含靈參天地息存還自强夀華光禄七十夀躋七十古云希七十生男更曰竒天自安排還有數仁能昭報豈無時蟠桃仙種遲宜子椿樹靈根老又枝八袠山翁把春酒當筵兼咏弄璋詩紫芝白石夀韓户書地貞知石賦天瑞信芝生大補媧五色駢開漢九莖鮮霞擁華蓋龎氣結元精磨軋存金礪晶和象紫瓊商顔歌燁爛砥柱㸔崢嶸敢比魏公徳還期夀作朋壽張碧漢六十先生雪鬍面如玉公輔隠然觀器局丈夫出處自有數功名未在三千牘柰何駿骨老兀硉相者茫茫惟舉肉先生掀髯發大笑誓弗回頭顧場屋江湖滿地氣豪傑浮雲萬里空雙目本色風流賀季真著家詞賦張平叔吳山越水行有窩爛醉何妨倚絲竹只今仕路成市道黄金不多不推轂先生此夢已脱枕蹇驢破帽曽不辱有時讀書至無逸何乃咄咄憂不足此心自許天地知萬事奚慿鬼神卜今年換甲迨六十教我畫松須屈曲靈根乆世非脆物抑鬱風雲見畸獨我知造化有深意信與之夀吝之禄一千斯年抱貞固犧尊青黄彼菑木㑹晤雨夜宿吳匏菴宅雨中客舎苦局促故人招我有尺牘書云竹居可閒坐烹茶剪韭亦不俗得書徑徃興亦豪何慮衝泥汚雙足開門山林在城市濕緑如雲亞羣竹主人罄折故意深道慰契濶須信宿榻上為我設衾枕堂中為我羅酒肉我時肺病已絶飲强舉一觴連五六長談細辨困僕夫燈影簷花亂書屋羨君有弟雅誼同山水光眀信珠玉故事方思衛八家還咏逍遙堂後木人生良㑹豈易易他日如今又難卜繆圖菲語何足記雪泥聊耳知鴻鵠天全徐先生夜過成化七年暑夜天全徐先生過雙娥僧寓小酌踏月歌邢惇夫黄知命夜歸詩因賦此索先生畱題法雲夜歸黄仲達騎驢髙歌仰眀月天風獵獵吹白袍履常殿後走不迭撰杖負囊無乃媟過市小兒笑口咽何物老子作怪遊俗夫豈爾須仙列李圖邢詩遂大傳邈五百年無四傑先生尋我興亦豪入更来敲僧户閉栖烏翻樹露滿葉長彗埽斗芒不折先生呼酒要排熱乃云秉燭古有説三花朗咏掛巾篇故事不妨吾載設髙致風流自斗山一遊一嬉知不屑先生於此如有言當與雙峯共磨滅無錫沈宗貴存耕翁之仲子自弱冠侍翁至余家余年十三見先父以詩畫贈存耕經四十九年尚存宗貴所觀感而賦此少别老逢情更真中經四十九年春青山昨日先君迹白髮而今我輩人世數交遊詩作證話生感慨酒淹廵旁觀莫怪多畱戀求舊原非一面新與客夜坐兩年方始一相逢偶集飛鴻雪後踪清話更添新繾綣老身全比舊龍鍾弱雲㺯月㣲分影細草關春暗轉容不復事盃成兀對薫爐頻喚小奚供喜程元道見過客子到門西日沈情縁一見一迴深逼除嵗月悤悤語逺市盤飱草草心積竹叢寒魚合澤墮樵風急鳥争林白頭與世殊疎濶特地因君理舊琴與客夜酌次韻髙臺添燭漏初長一握歡聲哄夜堂入座眀河斜轉影隔雲殘月淡容光如詩不就君當罸願酒無多我恐狂非但同年更同道白頭生長尚同鄉史眀古見訪春来開門見新燕故人春来亦相見燕子不肯嫌貧家破屋還勞故人睠燒燈屋下照白鬍髙談雄辨如壯夫且言老境知己少感慨滿懐人事殊常當有酒開口笑君來我徃亦須要願從君言不敢違肯作西飛伯勞東飛燕燕王汝和水月軒青子緑隂還可嬉酒盃無地不相宜夕陽翻席到人面逺水搖山隔目皮今日直須終一日暫時何卜有他時世間樂事尋常得但惜人生多别離勸性甫飲用韻喜君飲酒量不慳百壺五斗曽無艱鬢毛苦短日月老人生自忙天地閒紅花的皪雨脚後白鷗浩蕩江光間眀朝又擬常熟去典盡春衫方始還㑹施知州煥伯河洛頻年勞宦迹歸雲倦鳥是休時行藏有道無違易康濟存心更事醫青草耰鋤問農圃白頭盃酒話親知何妨日日相追逐百嵗人生㑹有期謁謙齋少師潭潭府第倚山城故舊何須俟价行閽吏未知窮措大相公自識老門生飡柈夾供叢談乆鈴閣添香燕坐清頭白歸来濟時了義田還復課兒耕李司成至詩書禮樂賢關長貧賤農桑老境人乆荷清篇留巻軸又驚髙誼動車輪梅花歡喜當簷笑栁色殷勤滿眼春雞黍不嫌隨草具斯文一味覺情真喜蘇文輝見過杪嵗風日寒臨門訝髙駕晦迹乆不出詣舎此云乍稜層見詩骨孤瘦立秋華筋力駕年紀手䇿不少借升堂載拜健歡覯饒言話性真具淳朴慮靜得閒暇安然丘壑姿可使觀者化盃酒亦畧飲深坐且清夜人生屬長離大半付悲詫雖獲少聚首未足為慰藉我生尚碌碌世諦未由謝何能傳隠訣低頭事耕稼花朝雨中與王汝和小聚與君將短髮慚媿栁條春白日急換嵗黄金忙殺人漸憐知已少獨覺老懐真把酒不在醉㸔花聊此晨喜張碧溪至重子杖藜非厭貧秋林紅葉頗如春交游未必在盃酒正是老年無故人喜許國用探疾至藥爐烟暝膈生痰怪是新春百不堪樂事惜從多病誤老懐喜與舊人談臨牀細酌更延五繫岸孤舟日轉三雪裏梅花殊未發此情亦似為君含國用持前作至復用韻坐深頻滌唾壺痰老態人前覺不堪靜觀欲從僧去學新聞還待客来談雲凉桐肄髙尋墨雨沃蕉苖長四三今夕喜君申舊好小窻燈影酒中含碧溪見和亦答一首髯翁能飲老無痰風度詞華種種堪青紫盡推儕輩拾桑麻聊就野農談濁醪累舉觴成十拙韻連篇和及三此巻一時千載事後人重展笑應含過華光禄適出乃返後遇途半叙話夜深余以丹毒思歸遂解䌫而東留此以謝失告之過風雨登臺值兩山相逢復喜半途間得追笑語非虚約更攬髭髯訝老顔水宿極憐舟並住宵征無那病思還圖書有日酬清賞莫謂浮生無一閒題山家璧舊過山家今莫記屋頭髙䕃發新楠三年眼見樹如此雙鬢情知老不堪欵有盃盤及奴輩話因門户恤丁男病餘未似前能酒亦為殷勤入半酣次匏菴雨中留宿野水浮雲蕩夕光仙舟兩宿古溪傍清篇感舊頻翻韻濁酒謀隣載過牆燭跋不知春夜乆雨聲如為故人長衛家剪韭今傳美他日寜無有竹莊走筆留客谿上不礙路谿水如招人好友南海来談笑氣若春我具一尊酒宿昔可以論况逢中秋月成我兩嘉賓雖有東轅車我欲方其輪願因長相留離别勿復言十一月十七日盛仲規迺子乾旋見過一冬不作寒陽氣殊泮渙昨夜病枕中朔風驚耳觀瑟縮朝怕起髙日照海岸枯林尚砉砉喧噪鴉鵲亂門前報剥啄有客立凍鸛且云宵征苦逆楫宿途半扶憊出慰謝鬱抱從笑散復云鈍舟者家君庸自訕此行亦小鈍父子當併案君父有不鈍文筆捷飛翰子宜捷其㨗未許仍鈍貫捷鈍姑置之釃酒促燒炭與客夜話老年多病只關門始為尋醫偶出村春過寂憐花致事雨来忙見草承恩故人落落星催曉舊話淹淹月報昏酒盞莫教辭瀲灧客舟猶喜一壺存夜酌與浦三正姚一丞沈二璞沈三觀大聨句親朋坐多違偶合歡拍塞正詩懲夙盟寒夜感衆誼息丞修辭擬藻摛操毫學蓍扐周求應尚同聲擇知貴合徳璞逓簡戒羞承記燭期短刻觀大錙銖罔乞鄰纎芥必出臆正聨成凖纆糾句拆肖𤓰副丞例在賞速成罸難恕遲得周口吐畧腐陳意命隨曲直璞或逞覺軒軒㦯屈耻黙黙觀大爭竒驗所豪角勝見乃力正不絶亘韓師若畫創孟織丞何髙不欲躋無古弗祈即周從容三達尊姢媚兩絶色璞淡誇揖讓潜贍要排拶軾觀大蓬閬萬水縣崤函一丸敕正穿鑿惜混沌惝恍覿鬼䰥丞浩蕩掀鵬天奰屭壓鼇極周幽脩盼谿梅蹇澁歴蹊棘璞窮抽無餘思瑣拾有遺憶觀大㸃指互咄吁支頥相臬兀正設醴初假鈎流盃反因勒丞大都飲文字政不在酒食周尚雅髠何呶辭淫完太嗇璞畱連鵲番枝展轉雞振翼觀大㸑慢罏爝消埶困研漿踣正衣絮凍逼薄漏水風咽濇丞汚筵墮衰燼躪地響殘核周啟户霜月正掛樹河漢仄璞㑹晤亦尋常風流惟此特觀大留蘇安道東湖雨晴春水生美人載酒湖中行茅堂剪我三夜燭論文說劍言縱横桃花楊栁渥春雨今朝撥棹東湖去呼兒釃酒緩歸心春亦未歸君且住支硎山麓逢楊君謙林谿相值夕陽邉迹似無官意有仙髙笠冒雲宜我畫小詞磨石信僧鐫山逢佳處肩隨轎眼落閒時袖出編隨後擔夫亦殊俗花筐酒榼兩頭縣十二月四日入郭小舟逼坐五客徐舜樂出吳太史所和東坡先生清虚堂詩一韻三篇末章有及余者時天作小雪亦即興奉同一首長河水落浮淺沙舟小客衆蜂喧衙江天翳眼雲作色薄有雪意飄㣲花老夫抱病乆不出嵗莫瑟縮難辭家荒郊寒風吹濕葦落雁接翅隨翻鴉前林枯條頗封白的歴還疑梅著葩蓬窻欲賞苦乏酒覔火未便仍無茶舟人却信我固吝婦翁枉事倫何撾詩喉無柰渇少潤秖累短髮空搔爬清虚髙韻不可借聊且試筆開煩嗟匏翁三篇况在側宛宛玉氣生髙霞留金仲和脱葉莫能綴折竹不能連流光背人去一去亦復然釀酒豈無米種米豈無田豈有八十母兒可離膝前膝前亦頃暫老者不少年襄陽雖云樂扶母難登船㐮陽銅鞮歌白日花滿煙思家總多夢母不在枕邉勸君母子勿相失看取牀頭子母錢與史西村相值途次遂同載寒雲連雁古長洲萍梗㣲踪此水頭幸爾相逢風雨裏他人無限徃来舟逺遊不盡江湖話多病還驚霜露秋一見一迴成一笑老懐離思總悠悠穀旦喜朱性甫至城裏髙官儘有衙迂舟却到野人家偶談山水悲筋力因怪兒童忽嵗華白髮知春不如草青燈隨眼漫生花遣懐慰客非無酒罍耻還當一載賖載會浦東白八年初得載經過喜滿雲蘿入笑歌老盡鬚顔畧相似記来年嵗乆應訛西風蔀屋蕭蕭葉落日蘋江渺渺波雖是病懐須强酒人生良會苦無多與狄天章夜話短棘長荆古道荒時風霎雨世情凉酒盃對面常肝膽緩急從人卒在亡腐䑕與他饑醜得癡蟬招彼黠徒忙約君且卧茆簷下九仭髙雲看鳯凰雨中會子暘李太常仍同赴謝氏席萍逢吳越水偶耳合清縁發興欺沾雨因逢數曠年木蘭同小泛櫻筍轉髙筵去倦不告别歸程殊怏然會吳獻臣兵備兼謝惠詩野老本孤陋於公荷特憐出門今偶耳傾蓋昨同然風雨酬一話詩書當十年永懐非日月髙誼薄雲天俯仰少知己遭逢誠勝縁枉推慚極口汎愛悚髙篇貌瘠道腴内官㢘徳儉先鵬圖協公薦馬走願私鞭文武無愆用崇卑各適權東吳卿月轉南徼使星躔道路瞻風節山川照雪鋋府尊嚴武位幕集杜陵賢懐逺人何邇均仁俗不偏明良惞盛遇衰颯舞林泉黄克明使雲南還夜話軺車萬里使星孤故國重逢已白鬚濁酒臨燈共風雨新詩滿眼見江湖數車薏苡如珠否長柄壺盧有子無劉道真問陸士衡曰卿自東吳来有長柄壺盧帶種来否問俗論心言不盡鐘聲半夜喚啼烏侍家父世父與劉完菴西菴文會野寺清尊對鶴羣我来行酒聴論文門前歇馬依青栁池上開軒見白雲自喜獻之同禊事還慚阿買張吾軍醉扶老父還家去桑柘秋隂日未曛重逢謝將軍十年歸鬢雪紛紛桑影榆隂日半曛帥府别開新院落監門還識舊將軍行逢戰蟻臨階看坐愛歌鶯隔樹聞耻向太平憔悴盡英雄無地覔髙勛石田詩選巻六
