body:
  text: 石田詩選巻三明沈周撰居室亭館附移榻西軒舊榻處幽暗耽睡固有因移之置西軒軒製煥以新其地不函丈虛明易知晨東方動初陽流光先枕茵破我黑甜境夙興自然勤盥櫛能及時亦足勸奴人尚有清夜景月出簷之脣照書僅可讀老眼自不眞兹軒所助我遲暮生精神享此一息佳嗒然遺我身瀼西草堂堂在瀼西黄草茨吳鄉莫把蜀鄉疑地從杜甫名全借圖為盧鴻我不辭衣桁夕陽迷翡翠竹坪春水下鸕鷀百壺自醉蘇司業未解求人為酒資流波館為史徳徵賦罌湖南𣲖分兩濼翠阜浸波雙朶落沙鷗渚鷺雪㸃鏡楊栁芙蓉錦開幕水心有屋駕虛明柱挿玻瓈髙借脚上留客榻枕秋眠下許漁舟帶烟泊不須擇勝日移亭何數倚晴偏快閣無地樓臺笑語凉倒天星斗魚龍躍門前萬頃不入税寸金寸土卑城郭紅䦨我儗一臨流但怯鬚眉老非昨閒居顚毛脱盡野僧如世好都歸一嬾除欲博晏眠髙著枕圖便老眼大抄書屋須矮小茅須厚窻要清虚竹要疎心與陶翁有相得時歌吾亦愛吾廬湖南草堂為慈溪張廷儀賦清勝之居不可當詩書亦許帶農桑近家湖似君王賜買宅貲非録事將山有一屏華翡翠人無半唾辱滄浪開門儘得臨流興何待蘭亭始可觴灣東草堂為弟樸賦愛子别業灣之東去家僅在一里中蔽門遮屋樹未大矮簷但見麻芃芃頻年一意耽詩酒翻然改與耕夫偶赤脚饁飯走細塍戴笠牽牛映新栁時人喃喃譏子愚問翁儘有髙明居何致妻子嫌側陋何信兄弟專錙銖從人自説渠自好力田養親殊有道強於逺宦竊斗升手種長腰使親飽力田養親樂己多兄弟妻子如子何我與題詩解嘲罵門外雨來虹滿河莫氏夀樸堂莫家種樸堂之前人家與樹相為年拱宋抱元非一年皇明十圍猶鬱然望如車葢臨綺川張空黛色凌蒼烟危柯垂地雷雨妬斮皮露心螻螘穿屢逃兵火合靈怪曲赦樵斧誰夤縁雖然所托在竹地似此愛䕶寜非天天嘗戲赭不為病與家同衰即同盛侍郎狼狽以官敗大類犧尊災木性兒孫奕葉今森森立庭便欲空槐隂人於門第望喬木我羡根柢生詞林嗚呼此家此樹不易得李宿應須自封殖作圖還儗角弓篇放筆為君三歎息君子堂讌集分韻得上字髙堂俯闤闈所喜得虛敞門内除塵雜幽然山林想左右饒茂木朝禽度幽響雨至微風俱况時當長養朋從非一方各各慕義徃揖讓禮度周言談情慨慷主人金閨彦忘形尚吾黨探詩侑深酌請火繼嘉賞咏歌清化間允著太平象雖有東封書懐哉不須上登吕山吳氏池亭君家四山秀相傍亭館依山起池上畫棟飛雲天影虛日映櫺窻搖縠浪美人清歌行玉觴碧藻出魚風澹蕩鴐鵞鸂䳵似江湖花徑臨流紫絲障屋隂壘石更學山意未足眞翻假尚掌上芙蓉百疉青李怪牛竒知摒擋主人去後我却來物是人非激悲悵浮生嵗月耐有期富貴役心無盡藏老客重遊恐未縁惟儗緘書問無恙齋居燕坐齋居過雨净燕坐意良愜習習風吹襟引酒獨淺㰱勸飲何所有蕉袖舞長葉悦目何所有梔靨笑素頰妬幃了無禁得得自姫妾妄境一粲破眞樂從酒攝眞妄俱茫然且作莊生㗳題楊君謙南峯行窩逺結遊窩怕近城雲峯窈窕阻人行草堂一力資誰送榿木三年樹自成地吉不妨分佛界山空亦好發書聲無心富貴知楊素還恐驊騮入谷鳴登吳汝秀萬竹亭有山或無竹有竹或無主主家屋後山竹盛不可數布石接隂行初入問無虎髙躋漸窈窕早露滴冠屨深翠暎人面葉雲仰如宇長身森萬挺疎密各有序羣居愛不亂君子樂生聚林亭雅中搆落籜仍鄣蔀清歌激凉吹按節傍可拊想多逕造客題名刻旅旅筍富主食飫太瘦亦自取還能長詩腴彼此有損補十個笑市城寸寸黄金土此地多不賤一一容玉汝竹居宦迹殊汗漫有止必有竹作屋仍竹間麄庇却易足便似黄州樓明年恐南北君子固類聚離之便云俗凡人有此好其人亦如玉書來儌我圖漫筆冩秋緑恐無清氣骨顧為此君辱補屋篇先人有遺搆宇我逾百年壞久莫除雨沾濕牀頭編欲葺今頗喜賣菜得羡錢搆者良似易葺艱方惻然仍感寒薄士卓錐莫夤縁内省既自幸見獲受一㕓且免歌中露得魚敢忘筌守成固在人成人尚在天天成人弗脩得之復自捐老馬強為駒威後終怯鞭梯危自苴補惴惴求瓦全曝濕保後讀子孫惟勉旃宿劉邦彦竹東别墅乍認東莊路不眞有橋通市却無鄰山窮借看堂中画花盡來尋竹主人爛漫箋麻發新興留連櫻筍送殘春與君再見當經嵗分付清觴緩緩巡乾坤一草亭為狄天章賦少陵老子舊茨茅小著乾坤氣自豪作者有程吾耳耳視之如傳世勞勞圖書可託斯文在風雨無驚地位髙坐此笑歌三百嵗江山屏障一週遭留題蘇文輝隠居迢迢覔虚浦依依指青林拉柁沿洄流逾梁路轉深遙盼人家處雜户班溪潯地僻罕人事兒童窺客臨何須詰君居漫縁清誦尋深簷映疎竹垂簾晝隂隂斂書出肅我為喜卒莫任神通維云久覿面乃始今癯然何巉巖長裾配寛襟愔愔寡言辭志静知慮沉父子自家學禽魚同隠心鷄黍既云具薦醪復鳴琴欲别不忍即止宿抱裯衾碧梧蒼栝之軒吾寢之前有屋甚虚明屋下有一梧一栝並秀于庭因名之云吾軒陋無取頼有此嘉樹梧栝各一植當前鬱分布正比雙國士裒然在賔阼我是軒主人對越自朝莫讀書接葉下小酌亦可具徘徊弄華月凉影亂瑤璐疏繁來冷風拂亞濕清露始信昌黎公喜為五楸賦我初作軒時自以偃息故軒樹本無因偶合亦有數以樹名吾軒以物表所遇樹色如得意我亦成其趣栝古枝相摎偃蹇抱貞固梧身聳而拔未可限尺度遲彼鸞與鵠引子來相附時時掃螻蟻霜皮慮其螙但笑三千年羽化我當去我去空此軒當為誰所住軒亦空此樹當為誰所顧存亡俱冥冥天地聊一寓谿亭小景幽亭臨水稱冥棲蓼渚莎坪只尺迷山雨乍來茆溜細谿雲欲墮竹梢低簷頭故壘雌雄燕籬脚秋蟲子母雞此段風光小韋杜可能無我一青藜馬秋官課農山莊秋官薹笠事東菑雖愛清幽也似癡分肉戲專鄰叟社訟田閒剖野人詞竹枝雨暗蠨蛸戸豆葉風涼絡緯籬知遣牀頭三百甕醉中都賦勸農詩杏林書舍為戚宗式賦父設教子行醫設教開醫沸一堂君家父子為仁忙松梢露碧臨䆫硯杏樹華紅隔水莊買藥僮歸門夜月挾書生散路斜陽成才起死心相等用世誰如此計長浦東白詩樓只把清哦換白頭騷情選思入㝠搜樓居疑與仙人借詩巻當從天地留東海倚濤孤枕夜西山開雨㫁髭秋最憐老子興不淺崔顥時時接夢遊成趣亭舊聞淮上尚書府别作陶翁成趣園三匝菊松迂引逕兩交梧竹暗通門亭分啼鳥邊頭座人倒飛華裏許尊莫信平原誇冨貴只憑幽雅繼兒孫黄尚節静逸堂記得君家附郭居一堂幽處市聲虚緑隂日薄停琴坐白髮風凉帶雪梳蟢脚漫延䆫下酒燕泥時汚手中書長郎日以文為業潤筆青錢可饌魚澤居偶書比鄰星散絶經過四壁寒光渺渺波私畜牛羊芻牧少官倉䑕雀稻粱多西風布被耽朝卧殘月松窻衍夜哦不是老夫能遣撥出門一望奈愁何寰翠堂為韓鎭撫作韓侯京口髙作堂堂後萬石山低昂復有瀦水方鑿塘堂中動搖山水光金焦乃是天富貴巧手移入家中藏簾掀曉日見翡翠笙吹夜月來鸞皇芙蓉夾座酒滿觴宛如美人羅四傍韓侯關門醉十日只恐金焦復去江中央十八鄰比比托鄰並相好逾百年老少雖消息林廬無改遷辛亥壬子嵗潢潦割相連滔滔槩吳㑹墊彼公私田田中不生糓辟術無所傳嚼草草亦盡仰面呼髙天惟食累于世不如枝上蟬渾舍相抱哭淚行間饑涎日夜立水中濁浪排胸肩大兒換斗粟女小不論錢驅妻亦從人减口日茍延風雨尋塌屋各各易為船憂厄乆不解豈免疾疫纒死者隨河流沈骨魚龍淵生者乞四方所飽何處邊兩年非一日幾日艱一饘逐逐更逐逐去如飄葉然飄葉或回風故處還周旋一去叵測歸歸亦何為㕓鄉土及骨肉豈絶情愛牽厚地莫容居皇天不哀憐四郊類兵變蒼莽空人煙盗賊國有討此禍力難援州司曠恤典勢分與民縣告訴走無門何况病莫前老夫廪無米亦無廣厦千對眼不忍見衷膓惟火然便欲吐我哺納彼止一嚥衆口相嗷嗷欲足理莫全故好成乖隔載聚何因縁過友人澤居獨據澤中勝遶家金壁堆谿虚水照屋花近樹平臺倚杖鳥飛過開門月入來無鄰惱鵝鴨漁亦莫争隈喜桑氏兩通判致政為題杏花書屋圖舊有讀書處杏花深雨中人歸髮未白春好樹仍紅富貴浮生外弟兄吾道同門前千謝令屋下兩陶翁冬日過田家門枕碧流盡垂楊列岸齊樹中茅暎屋垣外菜分畦噪雀叢晴薄行人影潦谿犬聲吹暗竇牛迹匊隂蹊罄折懽迎客盤飱趣饌雞温言謝鄭重勤意效扶㩦設座蒲重薦防颸壁旋泥奔奔役鄰舍拜拜教孫兒滯飲容盃緩延留怕日低性情兼禮數眞至見天倪散木髙居圖贈吳元璧舊有茅堂依散木掛冠於此寄髙風鹿柴山水新圖裏蟻國功名昨夢中閉戸著書今日始拏舟問字逺人通黄州到了休重説桑梓斜陽看醉翁春水船軒名我愛君家春水船江湖已賦卜居篇不憑寸地可作屋儘住清谿無税錢凉月蕩人簷影下晩波跳夢枕屏前便從畫舫齋中看鸂鶒鸕鷀相對眠林堂雜詠再拜逢迎覺不便遲遲筋力且衰年林堂看雨開春酌午枕便風奪夜眠收蜜買茶供嵗計曬書烘畫合閒縁交遊徃徃通朝報榮辱升沈一惘然望洋亭為李知州賦海上髙城壓廣洋新亭東眺眼蒼茫白滔萬里登臨近青並三山指顧長嵗久魚龍扶地軸秋清鵰鶚送天光邦侯戾止威明肅約束陽侯不敢狂道傍酒館酒香觸路酒旗青去馬來車到此停信是利糟名粕釀行人醉煞不曾醒同心堂為瀆川王氏賦王氏諸郎有徳馨芝蘭玉樹倚春庭老偕鬢雪三人白食共炊烟五世青不聴婦言家免禍每書忍字座為銘何當把酒髙堂上為爾臨風詠鶺鴒廢宅行長洲苑外連雲宅青粉垍墻髙廿尺重樓㳫閣出參差栁絮中間影朱碧堂前暖霞封画䦨淵淵伐鼓催牡丹行人隔墻空嘆息富貴無縁容眼看主人但怕客不醉白日未昏教火繼歌童掲調塵墮梁舞女失釵金溜地豪華忌久復忌盈時革人亡一夢驚門前車馬野花盡地上牛羊無草生老奴髮秃􅀈雙足猶戀遺基葺茅屋半甌虀粥不療饑西風滿面吞聲哭送王理之赴孔林書新廟碑王子嗜字學闔户攻古籀曾莫求人知摸搨烏衫袖發緒到秦封探賾更周狩前年靈光菑再搆初觀復工訖乃紀載伐石獲良琇鉅公實脩辭摽美書豈後逺檄舉王子憲撫識不謬膏車未謀人逕作千里就聖徳無假託髙掲有永夀譬雖衮裳貴亦見附繪繡握筆敬在先書法要締究匪徒求嫵媚結體務莊厚老夫愛莫助贈言恃惟舊題王理之草心齋青青墳上草墳下母不起根秪母處生其心發子所子心所以發在母非黄土母徳如陽春恩大無可補永懐天地間不共草榮腐寺觀菴院附托嘉本初上人寄題靈谷寺帝闕東來靈谷寺箇中但少一尋師千行松下當容杖八徳泉頭尚欠詩今日林慙應屬我舊時墩姓又從誰輕縑淡墨追空影白髮眞遊未是遲太倉興福寺觀劉鸞塑觀音像古寺隂隂古佛棲壁中波浪海髙低花因觸喜偏饒笑鳥解尋聲亦亂啼化境慈悲千種相人間影響一鏝泥老僧香火如如地時眼來觀秪欲迷金山寺吉公房小酌常惜忙未到到來方悟閒過江如隔世入寺不知山風氣薄詩骨夕陽浮醉顔古人誇一宿三宿我才還宿吉公永安堂夜静懐澄復留一首清酣散江風展火對不寐澄懐入禪觀眞若超世諦自顧衰颯境掛住亦良計江山不厭客詩壁無曠地州人亦可脩舟楫日容易笑我雪鴻迹天地塹為寓趙民部夢麟王廷信符用愚諸公㩦酒㑹飲涵虛樓民部索詩遂有此作白髮蕭蕭始此來髙樓正倚夕陽臺䦨憑南面山都出梯到上頭江大開自媿衰翁落遲局未容民部不深盃若教却飲天應笑豪傑眼前安在哉聴松菴小酌喚雨林鳩且莫催聴松汲澗要徘徊已知壁畫成神物聊與菴僧慨刼灰雙鬢雪從忙裡出廿年人似夢中來欲歸未便忘情得更對青山酢一盃陪吳匏菴載遊瑞雲觀尋道士不遇和前題韻渺渺扁舟入浦雲琳宫一到愜前聞春泥夾道縈人迹野水交陂亂鴨羣洞裏朝元郭道士城中行樂鮑參軍相尋兩度俱相失石上留題漫有文别巖天道院琳館愜清賞樓居俯城隂髙竹間喬柯幽然自山林我本草澤士不諧市俗心能來弗縁招忽去亦莫尋翩翩拂雙袖孤雲渺秋岑支遁菴千載支郎此説經寒泉幽澗尚縱横鶯花浪示春聲色水月猶通佛性情嵌石半龕苔寄迹空庭一箇鶴留名許詢同化無同調只有溪山照眼青遊西菴尋僧雖愛茗盃清也要提㩦有酒罌野色迎人過橋去春風吹面傍花行般遊欲及牛羊晩喜悦還隨鳥雀晴白髮老翁身健在不憂無地度餘生買得城東廢尼地空閒佛地許儒居敢謂行窩且貯書老子不妨歌十畝小兒還可就三餘西隣機杼勤堪勸東圃耰鋤拙未疎更喜五溪環合處閉門花栁似村墟放生池上晩坐風來水面細細月下城角徐徐怪是放生池上有人臨晩罾魚留題拂水崖眞公房我家去烏目北鶩僅一餉嘗遊但東麓拂水渺在望衆口詫竒勝翹首作西悵兹來不忌雨晴意晩始放力奮興亦超履淖老追壯一登還一頓往往手却杖轉陟歴亂石嵌突踏雲浪豁崖中通泉欲堕風倒抗颯颯成萬沫仰噴下而上著面毛骨寒逺立未敢傍直訝功徳水泌沸金剛藏老僧瞰泉住相地風水當天設冠兹山邑人不我誑抱衾雖一宿言拙莫能狀乃知南山詩包括自有量重來何嵗月此亦還可訪過簡書記故寮一寮峯絶處一衲一吟身忽爾有生内寂然無此人風翻破經巻雲䕶舊牀茵只有青山在如如似佛眞暮投承天習静房與老僧夜酌復和清虚堂韻一首臨昏細雨如撒沙城中官府已散衙空林古寺葉滿地墻角僅見山茶花繫舟未穏促沽酒布帘尚曳河西家老僧開門振髙木宿鳥續續畨鴟鴉松寮竹榻古且静人影凌亂燈含葩殷勤小行頗展敬釃酒莫及先烹茶更添香炷侑清啜坐久不覺蒲牢撾三盃破凍聊爾耳俗慮脱臆如人爬浮生嵗月聚散過撫事感老徒興嗟凈方頻來亦夙契敢惜片語償煙霞遊髙道禪居山複岡廻静結廬林蹊生處我來初杖欺新緑苔痕裏屐踐殘紅雨迹餘酒榼臨春聊遣撥禪單消日自清虚壁塵怪是遊題滿教種芭蕉别倩書神樂觀留别祖席諸君雨歇南郊風物新神仙宫觀擁金銀青山一杖付歸客玉洞千花留故人犀首不勝無度酒滄浪應待逺遊塵扁舟東去須乘急還剰家園數日春題致道觀靈蹟二首蔵丹地底發金輝半夜通明識者稀坐久老師還急起畫符封井鴿先飛檜蛟欲走夜壇雷飛石驚門不敢開明日道人成一笑緑隂仍鎖舊樓臺遊妙明庵早霧未消迷過湖妙明春日步堪迂門懸㫁岸谿橋接水限比隣野寺孤侍者鳴琴動春鳥長年引席候風烏偶然此集眞鴻迹乘興還留水墨圖過休休庵市閭隘處有祗林怪是沿街客易尋枕聒鼔聲嫌縣近門垂簾子覺家深焙茶火暖香浮屋桁竹簷晴曉曬衾愛此老僧偏静得塵埃中養出塵心題僧壁二首塵喧俗閙漫悠悠把舌深蔵便罷休人以是非來問我一塲鶻突但搔頭把舌深蔵萬事休放開白眼看雲浮是非當面從人問斷不搖頭與㸃頭保叔傅公得余詩畫失去重補花宫寳塔映湖光題墨遊踪久已忘屈指豈勝年契濶感人何在畫存亡頭衰要雪消難得山缺教雲補不妨舊夢又將新夢接幾時風雨活松堂感宜興善權寺寥落有客新尋古洞回國山無處問茶杯僧煩籍役兼徒去虎熟禪堂引子來雨爛竹菇春委頓風驚松籜夜摧頽未應靈勝隨人往碧殿猶存火篆雷至保叔寺寶石岧嶤聳梵宫古城西畔亂山東熒熒髙葉丹林露嫋嫋遊絲翠壁風下界行人映松竹半空飛鳥拂簾櫳故鄉迢遞獨登塔烟水長洲一望中祠廟墳墓附留侯廟和韻博浪還非擊鹿秋先生空作聶生流天將小挫宏開業事到丕成細論讐羽翼四人歸妙算神仙一著是髙遊千年遺廟蘋花在日暮相思楚水頭謁退菴陳僉憲祠堂少從杖屨記遊行今拜祠堂慨死生忽見丹青開慘澹尚憐忠毅鬱峥嶸犯顔切切先知禍載籍堂堂後有名眞與吾鄉植標榜繼聲誰作鳳凰鳴聞邑中欲立周文襄公祠喜而賦此文襄化去我其魚滿地疲癃九死餘永某舊恩驕衆䑕宋公新術誑羣狙空聞廟貌圖君實又恐人言賦子虚願見丹青一揮淚更將遺愛壁間書杜東原先生入鄉賢祠節孝公然當祀典千年香火見斯人莫由貴子能為地却信窮儒自致身標榜令名賢者位追陪諸老徳之隣奉歌斐語林堂靖再拜祗迎颯有神郭璞墓氣散風衝豈可居先生埋骨理何如日中數莫逃兵解世上人猶信𦵏書漂石龍涎春霧後交沙鳥跡晩潮餘祗憐玉立三峯好浮弄江心月色虚古墓堂封千代失嵳峩髙樹平來草漫坡白馬蕭蕭行客路黄牛呃呃牧兒歌只今麗石文章少奈爾空山風雨多聞道昭陵亦如此傷情不必問誰何黄黄墳上草黄黄墳上草青青復回春草死有生日土中無起人人心期百年誰存百年身有酒且為樂我愛劉伯倫伯倫亦已矣無酒澆其墳祖墳栽樹徳丘松栢舊隂隂斤斧丁丁不滿林樹盡重栽亦容易不能栽得子孫心為錢世行副憲寫虞山先隴圖監憲臨行尚倚舟隴雲阡月要圖收一時縮地便行李千里忘家愜宦遊不待移書問封樹即教開巻見松楸清明官舍梨花酒水墨微蹤散逺憂理墳二首官竹園頭春日斜手開新土漸成窪觀生如寄誰非客視死為歸此是家白髮暫存知電露青山長卧有煙霞慰勞自假閒詩酒且弄年華與物華卜墳已喜傍雲厓未老先曾有此懐鶴表虚名待誰録狐丘宿約與妻偕百年齊裡參諸妄一鍤泥邊打早乖免向君王乞骸骨自山生長自山埋過荒隴醉言老子尋芳挑酒錢樂哉斯丘青嶂邊若教即死便埋我更是可生還聴天人間一日過一夢花下百壺酬百年尚將醉墨寄絶壁風雨不洗山蒼然紀姚給事歸𦵏惟昔永樂初皇帝治明堂取材蒼梧野在楩楠豫章督以給事臣若曰伯善行叶公素侃察聞百辟得激揚譬如公輸子材悉良不良此行固天簡公亦喜自當握節指八桂伐鼔官舲揚惟木彌萬山計材不計章昻霄及聳壑乃適於棟梁此處瘴癘地氣候日不常公病即不治骨肉懸江東叶無人事綏復其魂悵彷徨枯籐束木函一殯六十霜嗟嗟榛鶴輩祖死而後生叶但知彼有殯不知在何方坐輒向西南行亦西南望叶雖劇返𦵏心日月何茫茫無財亦無時猶盲者無相叶天實使湯公官廣得其詳書報在全州湘山寺之旁如因曼父母始知墓在防二子讀書畢哭踊如初䘮榛行不擇日即日裹餱糧鶴云兄當住小弟力頗強此櫬所不返不復載見兄叶出門當嚴冬雨雪滿大荒九溪多鼉鱷鼔濤播舟航五嶺饒虎豹磨牙引饑吭鶴行無恐怖孝至膽氣剛達彼全州境入寺悲荒凉宛然三門側有垤記其藏拜之號三遶聞者痛肝腸發幽升輀車奉還萬里鄉白骨猶載肉樂歸所自生叶藹藹桑梓里鬱鬱楸梧岡得從先人兆如齊返周𦵏叶况與元配合孤䳄成鴛鴦劒適合延平璧不滯咸陽劒璧不自能良藉人所將嗚呼二子者生死有耿光嗚呼二子者古義行于今叶嗚呼二子者頽俗亦可興叶虞山若增髙琴川若增長過席心齋道士墓丘墟寂寂臨川上桑海茫茫感蜕餘舊用闕盤靈霹靂新來劒地入耰鋤羽人欲化楓株老仙鶴無言石表虚我願追求金薤稿碧苔狼籍漫蟲書復劉龍洲墓龍洲先生非腐儒胷中義氣存壯圖重華請過補缺典一疏抗天肝膽麄中原䘮失國破碎終日憤懣夜起呼徃籌恢復詣公衮論矛聴盾事大殊芒鞋破襪世途澀蒯緱短劒秋風孤登髙聊且賦感慨江山故在英雄無權門欲招脚版硬顧逐詩朋兼酒徒尋常一飲空百壺賣文贖劵黄公罏酒豪欲便蹈東海故人留崑亦須臾玉山固是埋玉地嵗惟三百骨已枯三朝封樹載起廢人重風節非人驅嗚呼人重風節非人驅龍洲龍洲眞丈夫崖山大忠祠落日荒荒下大洋樓船載國此時亡君臣入海仍相合天地移風已失常黒霧不能迷死所白雲依舊是仙鄉二忠合作三忠祀添設文山一瓣香二公至此不能為力盡堂堂是死時一塊肉同今日䘮孤兒事屬老天知弱流萬里難容楫清酤三行欲動旗一殉毅然酬所養厓山堪壯不堪悲曹廷儀哭其師陳味芝墓方寸千里心三年存義䘮淮陽一掬淚不顧吳雲長此淚乆不落自子忽浪浪嗟哉彎弓輩掩面在道傍題孔太守髙州生祠碑有序孔公韶文孔子之後讀書有大節初知髙州時西廣賊擁衆萬餘近城而寨城嘗遭三掠已精壯皆從賊惟存老弱食且盡水又被賊窒其源不給民遑遑日待斃耳公度不可為告天曰某死城中不若死賊所茍一言可革其心則死而生也乃單騎徃喻賊賊駐城北山上望一騎至兵皆蜂集横殳露劒夾于路旁公獨行鋒刃間更無一從及抵賊寨以利害曉之賊皆感激仍具燕燕公不食遂以所掠校官生徒洎僧道男婦千餘人俾從而還約明日皆來歸果得七千人餘皆散去公復率兵邀其歸路既而亦納欵盡以恩信給之公兩廣之勣多所助焉民羸食闕官初到壁破城殘勢莫全獨馬蕭蕭戈㦸裏片言落落死生前身何我恤愁何賊事在人為幸在天衆叛盡歸非却敵功名不許子儀專謁夏忠靖周文襄新祠水利克脩財賦舉二公戮力惠吳民祀行今日欣成典愛寓斯邦合妥神肖貌堂堂快星鳳功名在在認麒麟山川悠乆貴同徳蕉荔殷勤系後人謁銀瓶聖女祠蘭槁花不活松拆枝亦傷阿女爺所生還有爺心腸爺亡女即死女死家亦亡銀瓶本完物隨女井中蔵井水夜夜飛虹光千年不沒銀瓶娘君不見趙家樓船海南破孤兒又向波中墮慶樂園太師本是椒房親竊弄何憂天子嗔喜把貳卿酬佞客怒張一網打宗臣臺喉給舌不敢劾桃李無言盡門客珠翠夫人雜内嬪烟花甲第齊宫掖轉服豪華一夢驚葡萄零落犬無聲也知竿首甘心死得與朝廷謝北兵經宋故宫松嶺行宫倚夕曛繁華丞相太平君江南喜有文侯命河北愁無靈武軍翠閣迥臨千澗月珠簾齊捲萬山雲笙歌如海春風裏五國城頭可得聞石田詩選巻三
