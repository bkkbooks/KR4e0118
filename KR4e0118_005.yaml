body:
  text: 石田詩選巻五明沈周撰古跡泊百花洲效岑參長濠春來水如油吳王昔日百花洲水流花謝三千秋古人行樂今人愁沈沈細雨停孤舟岸上人家燈滿樓紅簾火影照中流還聞吹簫樓上頭客夢不熟翻黄紬翻黄紬夜悠悠拂吳鈎賦逺遊和張光弼歌風臺韻大風起兮雲飛揚游子歸來尋故鄉鄉中父老認天子㑹酒擊筑歌慨慷載歌載舞未為央留之十日未為長暢然草木尚有感滿眼故舊情何當丈夫志已酬咸陽壯心何用泣數行四海一家何論沛猛徳何法守四方千秋萬嵗邈在後魂兮不歸天地荒髙臺已夷烟草黄樵童牧豎談漢王滄浪亭故址為僧所居一池風月十亭多費價其如四萬何今日滄浪休問主百年興廢本同波煎茶又勺吳僧鉢濯足空傳孺子歌只在城南自清徹車塵馬足有誰過鄭公釣臺徽之歙縣富登渡有巨石巍然臨湖鄭師山子美釣遊於此余􅖔宣廷心篆鄭公釣臺四字刻于石石上仍作亭扁仰止以重二公之髙風峻節因賦忠宣義死堂堂節死到師山義亦明家國兩人均患難干戈滿地正縱横聊因心畫通相感未必漁竿果可旌何處江湖無此碣幾人標榜有髙名龍跳舊刻還堪搨燕賀新亭又喜成岳勢不迷人仰徳石痕固在字含貞蕭蕭風雨鬼神泣洶洶波濤魚鱉驚一個聘君孤搆耳乾坤今許作雙清清風嶺干戈國之禍使妾骨肉殘翁姑與夫男狼虎併一飡妾恨不同死有身何用完有身色所累有色辱之端固知一死萬事畢死雖容易就死難長軍癡兒徒好色不知妾命死自􅍆言挑兵脇不足動俘婦雜守嚴如犴清風嶺白日寒陡崖深江妾命所安齧指出血寫石壁字字入石深若刋五十六字碼碯瘢丹丘怨血淚汎瀾千古萬古願不漫詩成一投死萬仭凡笯無計留青鸞區區眇婦人烈烈男子肝綱常一婦強千男偷生忍死皆達官偷生忍死皆達官血詩仰面不敢看登妙髙臺登臺見青草黙黙感今昔江山本舊觀形勝我新識江山不因臺流峙天自闢臺固為江山亦當為遊客徃來相無窮有得與不得坡老莫可呼舉酒酧江色登姑蘇臺把酒弔往迹茫茫幾鹿遊興亡兩國夢感慨一臺秋戰葉風仍亂争流江未休傾城美人事殘堞暮雲愁韓克瞻宿五國城因賦金根濡滯是何年寂寞荒城尚宛然來者無窮還逐鹿歸心不死定為鵑黄沙夜冷霜連草青海天低月墮烟孤客此時思往事一和錯盡自澶淵讀荆公争墩詩荒墩落日草蕭蕭公我相争已異朝黄土不知今古姓亦無百姓種青苗經趙松雪鷗波亭故址茫茫遺業海桑邊感慨因歌溪上篇公子不歸鷗自白庶人來住鳥仍𤣥蘼蕪細雨山連郭翡翠斜陽水滿川珍重圖書獨無恙淡烟疎蕋自千年經舊遊最無根柢是豪華陌暖風晴又别家種種傷心秋雨裏芙蓉只好不看花經陳永之分明經委巷不是昔来時賢者留相憶空家住又誰草蛩悲語在樹鵲故巢移仁義一如此令人心未夷宿南潯詢丘大祐張子静故居尚逺因作不見二豪誰與遊髯張入地伴長丘湖山洵美人何許生死難忘夢在舟詩塚莫尋青草宿釣磯依舊白蘋秋清苕百里將雙淚老眼西風獨横流重修醉翁亭丘亭兀兀倚殘碑風雨漫漫刻己夷天地無窮翁尚醉文章不朽石如斯滁山終古當増價太守而今復謂誰振靡扶衰論作者未應韓子獨稱師登鳳凰臺江上秋風吹鬢絲古臺又落我遊時六朝往事青山見四海閒人白鳥知詩巻也充行李貨布袍不直酒家資彈無長鋏懐無刺浩蕩髙歌歸去兮懐古讀漁父辭飲酒詩有感展書聊就紙䆫明楚晉亡機出一衡大厦隳頽何力起厲階層㳫幾時平靈均耿耿獨醒死陶令沈沈爛醉生千載文章共肝膽令人長嘆莫收聲讀吳越春秋春日寥寥雨又風小窻開巻兀衰翁斯文斧鉞興亡後故國醯鷄語話中臺越還聞走麋鹿墟吳眞見有梧桐更憐胥種皆從劒敵破謀亡一禍同鴻門宴莊劒擊伯劒翼一家兩人自相賊天當與賢勝人力劒生豈是屠龍客忙忙勞人三舉玦座上謀臣面無色謀臣計失失敵國敵縣虎口虎不食盃酒之間天解厄此機老增亦何識徒為豎兒滋歎息豎兒豎兒䇿不長富貴先思歸故鄉凶暴為徳凶暴亡至死不知仁義王灌夫使酒任俠復尚氣平生無俛顔貴戚相引重聲名概世間醉酒屢罵座陷胸若無難挺身執父仇疋馬突圍還豪猾傾潁中納貨相結歡終然使狂藥禍發致生殘不戒惡㫖説無術良可歎韓安世墮車蹇足𢎞畧濟忠厚智亦當世務片辭釋國嫌至誼藹如故相階屬甫陟奉引蹶而步何足以蹇人造物偶其數鍾離意不拜賜張恢贓珠清川弗納濁方枘不納圓簡珠雖云寶穢得名莫全臨恩所不拜戒飲懲盗泉志士無茍取炳然昭性天感張宏範逼文丞相招張世傑降螢爝安知日月光叛降可教正人當萬生萬死不忘宋一賊一仁何諱張大事未亡膏血在老夫堪哭淚洟長敵人那識文丞相鐵鑄南冠金玉相元祐黨人碑熙豐小人用壊政始介甫類從一何衆三朝養禍柢元祐用君子四海賀馬呂豁然破積晦有若日當午一日十二時午位僅一數十一非其位乃在小人所天意未厭禍善類終遭侮在睽同而異川朔失為迕其輩隨以動在咸象于股奸京柄崇寜首以故案舉深虞道復長籍黨表天下一鐫亦莫服鑿石竟何補邪正均一罰株連示淆蠱今於嵗月後是非目誰瞽譬瞻星與宿經緯森天紀不妨紊彗孛各自粲堪指君子猶元氣不能絶其緒但含消長機小人昩其㫖雖云詐力大欲絶亦繆矣十步有芳草十室有賢士若使朝廷無曷以維國是不以溷小人同事信難處其勢莫兩立傷夷至於此小人務闢釁君子務必沮柰何君子少莫勝小人侈恃勝初無人習惡後無主丁秦及賈韓馴至國遭擄一旦中原失小人實為估乃鑑殷之亡先聞九侯脯碑者本悲也我來手重撫馮道二首能臣五姓亦多忙旦暮朝廷傀儡塲儘有癡頑塞羞恥了無恩怨涉興亡送迎數數眞郵督侍從畨畨老楯郎莫怪不能知大義園册上秪農桑相公惟舊帝惟新歴享台垣冨貴春竟莫識為何老子終當書作某朝臣厓房戀戀輸蜂義梁壘依依愧燕仁功業不知何所有一編青竹漫遺塵讀漢髙紀書燒禮樂隨之熄長者還生傲慢風四海未嫌驕仲氏一羮還欲共而翁獨輸留皓鴻矰外莫怪韓彭狗鼎中天統特推三尺定敢於嬴項説英雄莫砟銅雀硯歌有序草䆫劉先生嘗賦銅雀硯歌有云呼兒開匣取長劒砟碎愼勿留其蹤讀之知先生疾操之心發之於言若是之烈也周懦夫不能不失聲於破缶故作詩解其怒而願有所存也拔劒砟瓦瓦碎何用砟碎於瞞莫為輕重不如掣取太史筆青竹中間削其統老瞞自欲瞞春秋公議所在人焉廋瓦痕雖留漢正朔心實無漢虚尊周願存此瓦長作硯猶因子墨黥瞞面漢賊明將漢法誅千載煙華漬深譴古云不以人廢言言如可存瓦可存識賊鑒亂於人羣瓦無可惡惡在人嗚呼莫將人瓦併案罪我為題詩救其碎題中興頌石刻後有册有册一尺畸啓閲重是磨崖碑平原太守氣骨壯殺賊餘力存毛錐千年白石耀深刻風雨不剥神扶持銅柱莫拔魑魅走鐵網欲破珊瑚搘快觀書法十數過馴讀其語増噫嘻君王愛色不愛國金錢買禍由洗兒長安洛陽要自陷法宫蜀棧誰安危嗣君雖然返舊物以得補失終磷緇此碑頌徳實掲過有家有國留箴規晴窻日搨不輟手來禽青李生蛛絲淵明采菊典午江山醉不攴先生歸去自嫌遲寄奴蔓草無容地慳剰黄花一雨籬子陵垂釣一出聊全故舊私急歸自信海鷗姿中間亦有君臣誼買菜侯生豈得知和陳惟夤先生姑蘇錢塘懐古韻開國樂湖山流觀起髙臺因有獻楣人木眚自兹來侈泰遂亡國捲地驚風埃孫勝有竒占揚風骨亦無他日秦餘杭三匝不可呼令人追往夢鳥雀悲煙蕪伯業不可乆闔閭行復墓世換悲樹葉人㓕驚草露吳越互興亡無足笑百步右姑蘓襄鄧固宜國李相言莫行偷安昩逺圖彈丸荆棘生北來勢受敵大江顧南横海氣薄宫闕燕幙傷故都正如當道蛇延頸待人屠一枝難茍安展轉南飛烏和計適召敵風塵入松關六龍一逋播王氣去不還惟餘岳墳樹枝葉無人攀右錢塘讀出師表兩篇忠告慨慷辭字字中間有涕洟天下二歸心屬舌隆中三顧道存伊老臣虚已六未解瞞子輸才十倍之謹論堂堂誠激烈孤忠痯痯力驅馳轉征南北思何逺愴及桓靈語更危開濟莫酬徒有䇿英雄先死却無時天荒大野星俄隕水嚙空江石不移不朽文章千載事後人能鑒乃能悲子陵獨釣圖二首霜落江清木葉空丹青有像是非中羊皮不恥見天子鳳徳何曾屬畫工千古超然此翁迹一衾聊耳故人風能來能去形骸外私莫容窺道自公一宵展足便江湖能去能容兩不孤天子教人知友道先生立節為貪夫釣絲裊裊其風在物色寥寥此貌無附義懐仁言已盡菜乎使者亦何愚陶朱公知子見苦惜家難贖死阿翁先見已如神曾家老母尤能事自信參兒不殺人和桑通判弔文文山六歌失火兩宫萬里塞雲黄三閩四廣天子忙孤忠老臣老不死膏血幾時湔國恥天髙欲訴衍六歌手把怨筆濡天河天河不乾怨長在朝廷凌遲家破碎老臣已死稿苴存金玉輝生舊墨痕鬱攸小兒那解事紙影雖空有文字傳人流世自千年擊劒重歌雙淚前時事丁未九月聞哀詔樂青安生今二紀號弓莫盡白頭悲帝鄉雲氣神仙逺地道春恩草木知裳繡不曾通藻迹野飡空自切芹私江山無改千秋物明命惟新又一時聞邸報白髮窮簷憂老農邊塵日日有驚烽諸公謀事誰房相今上籌邊似太宗萬里長城須法守一丸函谷豈泥封勞來逸待無餘説堅壁何妨數十重聞三原王公致政功烈堂堂六十年勞勞萋菲不妨賢至公何待嵗與月未定且由人勝天雲鳥青山形迹外風塵白璧笑談邊江湖雖逺憂仍近長對南薰憶五弦聞劉兵侍稱疾竟歸即枕初章便買船要歸竟自有歸縁誰知原憲曾無病我信張良豈在仙長徃莫維駒皎皎㝠飛不下鳳翩翩先生此去江湖大眞與鱸魚長價錢讀楊宫詹與屠太宰論事劄子闕氣則直讀之聲渢渢韓論及歐書異代而合蹤既可扶國是抑竭朋友忠百年無此言友道從而隆朝廷罰臺給株連班直空宰公乞攝曠奏上何匆匆畧弗涉救援於是涉迎逢急彼故緩此意外有牢籠人情鄙兹疏詆訕紛詾詾臺為風紀御給本絲綸總朝廷托耳目立法由祖宗官小係則大責重望乃崇愆忒以之律邪佞以之攻從則如水流不從如水壅士氣要在養養則其氣充折沮失謇諤使之抱喑聾天王本聖明宰公實股肱信之如蓍龜可以定吉凶慷慨能行義豈曰無優容難解者彭王喜怒注宸衷程罪終見釋鉞幸終弗庸公議皎如日曉及三尺童豈宰顧不諒而弗及童䝉朝廷行是罰名以懲不供因攝以寓援何不鑑觸龍乞漿或得酒求魚庶離鴻言患不至此何患聴弗聰所惜在諫垣兩挫一嵗中嵗來其娓娓履霜愴凌凍不可視朝廷長有拒諫風鳳鳥吝不鳴若鳴致時雍匪為羣諫地自樹弼亮功其日舉傳奉逮諫適相同奏名四十員珂馬耀長衝胥靡共趨走俛黙不敢顒觀者謂不祥道議起如蜂其責將誰歸未可謝匪躬當憫時不平亦可悲人窮不鳴豈瓦鷄不應豈木鐘豈待七年發救焚必征彸但恐緩不及激切有緘封令人思三原當此熱心胸陳乞惟恐後剴切期必從皎皎歌白駒一徃無留蹤江湖𣺌吾憂其言不可終附次韻詩屠滽予於𢎞治丙辰間承乏天曹夏四月十有三日科道官奉㫖俱下錦衣衛獄予聞之召四司詢科道得罪之由皆曰不知且言諸衙門所進民情封事既得㫖例捧到科交收今既下獄無人收領各官既不得領出於外又不可留宿於内聞先朝亦嘗有科道官下獄時請命中書等官攝其事予未暇答銓司具其事呈堂時日已至申乃急為轉達遂得俞㫖是夕臺部封事方得人收納次日予鄉姻宫詹楊公名守阯别號碧川今陞南京吏部尚書致仕致書於予大意言科道官下獄閤下即當抗疏請貸如何差官代其事予以不知科道官得罪之由難便請貸及臺部封事無人領收事不可緩之故答之次日蚤予鄉友掌科吕公名獻今任順天府尹下顧問予曰楊公昨有書與閤下否予曰有因誦彼此書中大意吕公曰楊公亦以此書送六科科中人皆疑之予笑而不答後與楊公徃還如舊者經十餘稔未嘗言及此事至今年秋予朝退還邸第忽有客以先生石田詩集與犬子徑者予偶抽一册目之遂見五言古風一首題曰讀楊宫詹與屠太宰論事劄驚曰異哉讀畢不覺大笑因次韻一章名曰解嘲云宦遊乆京國學通尤未通見惡必逺避見善常加恭石田乃隠者賦詩亦多工如何論朝政所論殊不公此劄實差謬何謂聲渢渢到處任播揚有類衡與縱碧川居論思如何不納忠致書戒老夫友道皆云隆追思昔年事大明麗長空堯舜喜復出萬幾任匆匆納諫眞如流明良喜相逢荆榛委籬落芝术收藥籠萬姓樂熙皥四方無鞠詾今上初出閤庶事元老總九卿集東閣講官索儒宗先求語言正更論徳學崇人各薦一二不稱交相攻老夫薦兩楊一即碧川一乃今元老石齋先生碧川川流壅為語帶鄉音不及問學充因之又復薦元老耳若聾欣然用石齋萬口稱股肱碧川已備知豈肯心懐凶同鄉又相親度量廓有容維時科道官有事忤宸衷一朝下縲絏難便責保庸天官入統五日保庸安有功也顛末尚未知焉敢干重瞳臺部上民事俞㫖俱已䝉日暮無人收厥職誰與供越例送臺部又恐觸衮龍天曹借中書攝事猶賔鴻此舉實舊規碧川豈不聰書來既善道如何報科中彼若擊巨石我猶履薄凍今復寄吳下大傷君子風碧川豈為此姻舊情雍雍意必有憸邪假此成已功抑恐入銓者邪正有不同或嫌不超擢或怨非要衝當時吕都諫氣節儕何顒亦嘗論此輩懐毒猶荓蜂其禍必在後亦或先其躬福善與禍滛循環兩無窮莫道此言虛應若豐山鐘雲衢漫委蛇何必好征彸馬周三十貴屢受漢室封崇卑各分定何必縈心胷石田若聞此其言未必從我欲到虎丘㩦酒追吟蹤願言保遐夀待我談始終右此和篇葢都憲屠老先生之所示喻者冲和沛博之文裕達含宏之度弗愠不知弗遷所怒藹然使人知長者之徳如此也周林野迂腐老昩時宜初目楊宫詹之劄子將謂其篤于友誼相資成善能警薄返漓於今之世又謬恃三百篇之㫖有懲有勸形于里巷而無責于是莽無顧忌循其辭而貫穿以韻然其間鑿枘齟齬而有得彼失此之譏愚何容度嗟夫侮嫂氏之毁撾婦翁之誣古猶不免都憲固自諒之矣但周於潞公之所分謗梁公之所為容焉者不能無愧耳敬跋簡後庸識其迹之始末云觀補官冠冕耀通衢羅綺照芳春珂馬等列侯洋洋意氣新觀者歎且信黄金能貴人黄金本假借觀人自失眞窮閭處約子讀書苦長勤書聲振悲風莫次甑中塵敝褐三十年一紱難賁身問子何事此好義已忘貧揀𤓰詞時提學公黜諸生貌寢者纍纍黄臺𤓰種者欲求售碌碌買食人擇美棄其陋大小各隨形偏正亦隨生滋味在其中包蔵那得明君不見賢妃臼頭女又不見賢相跛足子嗚呼貌取豈盡𤓰外陋安知中自美願華一臠請君嘗滋味分明為君死喜李貞菴致仕九鼎忙忙作人餌頭白眼花朝鼓裏先生有才足補衮有俸未足充妻子未衰告歸急於矢不謀朋友㫁諸己先生自是不覊人健鶻凌雲秋萬里君子難進退則易禮義堂堂盡終始太湖可釣亦君魚陽羡堪畊亦君米出兮處兮樂天私更有文章賁山水聞余司馬子俊罷撫邊干戈堆裏許抽身回首功名剰角巾北敵西羌無外顧青天白日有閒人尋猿棧道家鄉蜀走馬邊牆夢寐秦公築邊牆於榆林為功最著者歸興在詩詩在酒杜鵑啼破萬花春洪城竒遇林秋官待用張府歴兼素俱因言事被謫既而賜環先後同集張内翰元禎宅因而有作先後萍蓬迹洪城此夜盃星因賢者聚朋自逺方來返駕白駒谷集靈丹鳳臺文章留健羡千載識竒材盗發小竊雖饑寒巨猾實扇起十百相黨羣刀殳弄凶技前鄰遭砟關逼貨炙妻子後鄰發重隄進舟當門艤擔負亦公然罄室乃云止稍或有牴牾人戮廬亦燬無何閧西村旋復嘯東里通川及要路宵征絶行李檢刮空腰纒體至衣裘裭天寒氷載路溝壑何不委家家夜結束老少泣以俟一息茍奠安天明各相喜正念一井閈搔動乃如此江東連江湖固是盗所倚禁弛氣則張類滋勢難弭有官示以仁得録不之罪恕實長之道無乃延小美有聲自此輩識者謂辱已况彼有後言時哉好生理教虎不咥人所性安可使使譽出賢者天下知善士民以静為樂貿貿安生死雖然廢賙恤糠覈自甘㫖去蠧木欣榮除􅀈禾茂薿茍以刑不仁誅夘亦非是刑以齊亂民用之不得已如何輸租人米駮斃于箠海讐行海東衡沙浮半洋夾亘頗與崇明長魚鹽蘆葦貨攸聚利啓爭奪循為常中有兼并兩豪族施恃其勇董恃強強之無厭勇乃襲燔廬刮産威靡亢強銜所衂思報償舞波接戰成劉戕縣官移寇悚上吏林侯未然籌且量首先號召命不方老豪來歸訴讐敵不敢犯法畏有章區區螻蟻尚顧命拒死不免蹺螳螂雖云餘類擁其子跼蹐秪為讎家防傳訛乃煩兩重憲地隘豈足鵬軒昻魏公善鎭殊不忙陳公善料殊不揚臺按臬監來頡頏所在草木知風霜羣僚從事亦濟蹌如雲翕翕星煌煌于時曜武勢大張海日照雪明殳斨五牙艨艟具三百艤岸只待令乃翔諸公在撫不在勦不教而殺謂不祥縁情究迹有可恤馳文徃喻開倀倀開誠布公明而光援其所溺存其亡小大感泣皆奔降納兵納船恐弗遑纎飈不動海帖帖遊氛一捲天蒼蒼坑之則肆未免禍拯之且暇曾無傷天王聖明宰臣正今日詎曰無姚房土偶禍鍠鍠鳴鑼彭彭伐鼔復有旂葢亦有㦸斧精力駿奔無有老豎整整肅肅什什伍伍絳帕帓首花繒繳股中輿者神像之以土岌乎其冠被以繡組覡者前導跳梁盪舞亟進如驅遄止如阻云神案行于彼災户惟災之户鞠躬傴僂小心來迎翁前後姥家無大小一一拜俯擊牲化楮薦以醇醹祝神加饗稱我神主惟疾惟患我祐我祜覡迺執乩運曰神附擊案作聲覡曰神怒必汝不䖍不明告汝渾舍載拜極哀懇苦覡始作書曰有逋負設通夢寐或聆咒詛牛豕如干等以犬羜鵞鴨及鷄計當蓓蓰汝承其償其患良愈箕忽輟運少間復舉謂以汝故徃懇嶽府曲為之解斡生死簿覡之以下如狼如虎從翁臾姥不容有語指日令償令面神許翁姥跼蹐無以經紀質我青苖鬻我小女典我衣裳翦我機杼求我親戚貸我隣比是日之屇其輩來聚主張督責枚舉件數數無虧少物必豐美獻事甫成饕彼尊爼酒肉淋漓撑腸拄肚復有苞苴臠胾核糈此輩未出患者為鬼越明之日神復求祀即于東家其作如故哭者在西無警無悟嗤嗤之氓昩乎義理生死係命聴禀有數豈是土偶能奪能與今既無靈不察何俟噍噍羣小附土利已土豈有知羣小實使此事有類河伯取婦有豹為令悉投諸水吳俗火𦵏火𦵏壊吳俗沿愚罔知教體魄輕父母死即畀野燎何異炎人㱙亦類儀渠燒古斂以週身致慮防臭暴復棺益之槨厚土事窆燾區區人子敬鄭重寓私孝燕師慘掘焚齊人愾敵效子豈忍父母炮烙曾無覺曹侯憫其弊古訓不可弔闢園號漏澤叢瘞周四墺士庶尚有言地局寜盡窖其言聞之公擊節歎且笑吳愚不聰明耳目塗泥淖譬諸黔婁衾不足我奚校我為名教惜㰅埴聊盲𨗳虐死茍無親逆生馴亦要勿謂一爝微大惡由兹造乙丑六月聞哀詔有感八十衰黎死境臨來傳尺一痛難禁虞淵愴日江湖淚杞國傷天蟣蝨心負扆周公正思畫解民虞舜未亡琴白頭病枕茅茨下時夢新君在諒闇愚翁分與世縁疎國恤驚心泣且吁生長太平惟欠死老衰餘息尚何如不知伊傅誰調鼎欲夢羲皇我枕書終日無聊思理髮雪莖些少亦頻梳述懐病起試酌山尊得酒且髙歌百嵗流光已半過病眼看書眞處少老懐追事謬時多髮隨落葉驚西候門對清江惜逝波今古英雄同一盡浮生不飲復如何病中夜雨起坐藥盃香炷與温存養病功夫要閉門布被擁寒書作枕紙窻催曙水臨軒楓生赧色知霜辱蕉負爭心共雨喧物性人情静觀得得來還欲費吾言蚤起養拙藏衰結静窩是非如海隔雲蘿面前雪影流頭亂空裏蟲絲礙眼多病女從人家落魄老妻淹殯嵗蹉跎虚懐昨夜當秋雨惻惻蕭蕭兩奈何理詩草佚老餘生願失子末路悲不幸衰颯年數畸遭禍竒獨存朽無倚如木去旁枝剰此破門戸力憊歎叵持屑屑衣食計一一費心思思深氣血耗㾓痺引百肢多忘識慮淺耳瞶目兼眵一旦一身内有此衆病滋所苦不敢訴常畏老母知小孫蠢不學次兒誕而癡後事不足觀百憂無一怡吾性無妄好執善信不疑垂垂垂白鄉朝斯還夕斯髙髙㝠㝠者何物顧相欺似我未䝉祜及有菑害罹滚滚人海中黒白何可劙口亦不能問理亦不能推以死致度外且活是便宜今日盡今日明日豈可期亦復酌我酒亦復吟我詩我詩無好語稿苴從散遺兒在曾裒葺今紙著淚糜抱患天地間空言亦奚為思理衣七十餘年一老翁心情鶻突腦冬烘寒衣無婦無人補日日關窻怕北風七十餘年一老翁衣穿絮破不堪縫清霜滿地無區畫掃得蘆花莫禦冬脱齒行我齒食所系食以系我生齒脱寧不憂其系本非輕近來漸脱二脱者盡之萌既脱不復留留者亦難撑留如汎虚槎脱如鑿深坑編生如相輔豁一傍須崩生食原相資今作水火爭妨食生必妨死理端可明完業譬大族恃子在守成其子無錮心先蕩黄金籝屋售繼失居田鬻還絶耕溝瘠諒在眼身家同一傾觸類有攸感我賦脱齒行病懐二首衰遲宜静不冝譁事莫堪懐動歎嗟病遣稗書還藉眼老便錫粥又妨牙栽花賃地春無主斫竹開門月過家任是客來難強酒小陪清話一燒茶朱顔與白髮掩鏡兩茫茫天地大夢宅烟花一戲塲算忙閒固少併夜日還長吾酒吾詩在桑榆弄末光自述次人韻日髙屋瓦未消霜卧聴秋潮捲石塘九島迷行魚性樂一鞭威後馬蹄忙獨憐詩是吾家物但有竹為君子鄉闥外南山今好在時時飛影到清觴病懐膈痰漫漫似春潮伏枕旬餘氣未調老日易過如短晷病懐難遣厭長宵隔窻忽忽影度鳥鳴瓦蕭蕭風墮樵藥物尚功全斷酒庭柯髙掛舊山瓢病中白木匡牀草薦柔坐深無寐獨搔頭明河轉影天低樹清夜分更月過樓病骨瘦生先覺露老懐虚甚易驚秋七情莫與㣲軀妬生已知浮死識休舟中有感世縁一向只昏盲静裏觀心始自明得䘮有塵齊後㓕是非無種辯時生秋峯長嘯兼天迥月閣髙眠徹夢清老矣此身眞長物不知何地著虚名齒落七十三年與我存一時迸落豁開門車空已覺乗無物舌棘猶嫌剰有根顚倒自憐臨水漱含胡人笑漏風言數來滿口今餘幾軟粥香醪且瓦盆冩懐一首寄張碧溪䘮亡火盗嵗相兼鬢髮髠然瘦骨尖有命窮通天自定無憑禍福事難占閭閻茍活隨黄槁衾枕媮安且黑甜海上故人來慰藉不妨一月酒杯拈閒懐用郭天錫韻落魄青衫隨草色蕭條白髮遣年華徒勞夢寐費憂國錯認詩書能起家愚去刻舟忙覔劒饑來索飯誤炊沙人間亦自有樂地酒遶山巔與水涯早起偶書秋早耿不寐起眎天蒼凉鮮霞凝髙宇隨日賦采光露氣浮草木流潤及衣裳人事頗無接懐澄知慮忘睡起望七衰翁與嬾便眼昏秪好枕書眠算前去是荒唐日喜後來為受用年麄糲飯香蓴菜裏子孫計逺橘栽邊攴藤閒遶花蹊看蝶閙蜂争各要先簷間落葉擁髙秋謬使人推隠者流背有微暄念天子手無漫刺瀆諸侯老知絲竹殊堪頼逺為兒孫未免憂身後算應憂未了且來拂壁畫丹丘睡起小酌黄鸝啼夢粉墻東簾幕深沈日日風起喚酒盃尋一醉春愁打破落花中齒搖當唇一齒齲將脱根槎枒棘舌妨噍食致憂豈云些動搖苦浮危軼出奈參差疑口常沮枚比眼如礙沙山水失嘯歌日夕人歎嗟終知莫附斷且怪乆戀車憯憯滋流涎數數撫斷槎欲拔涉梭誚希生聞藥塗聊存徒為耳卒去何快邪大似狡酷吏作孽閙公衙還如敗劣子騖外莫安家但得噴一嚏迸落從谽谺嚼肉補空窾呼酒洗豁厓掀髯捫其餘幾輩棲殘鴉作詩尚有告伴老衍嵗華從邁勿以類留二學吕誇湖鄉堪養老鮮美多魚鰕田家詠乆矣居畎畝邈如遺世人地静習雖陋野意還自眞怡怡晨夕間言笑諧四鄰有作相告戒鳥鳴知及春犂鋤假筋力竭勞供有身身在勞何息顧莫養精神服氣能代粒希仙渺無津家業信難易樂以充堯民我畝蕪且瘠我隴磽不平發嵗奮乃功東作覬西成搰搰低白頭秉耒日經營税傭及時畢辛苦勤王程但餘秫一斛酒熟歡已盈醉引耕田謌不復忌髙聲願隨天風吹吹達九重城劉璋啓此調千載遺令名無酒山桃亂開紅欲然我宜賞之無酒錢十常九事意不愜百又五日春堪憐誰家竹葉賖爛醉滿眼花枝笑醒眠何消苦苦仰司業便可燒茶隨玉川老年三病轉費揩摩轉减光苦無障翳只荒荒俛眉作字仍虚畫觸鼻看書反差行葢幅絞綃花懵憧隔重雲母月微茫從前了了都休説青白甘輸與阮郎右眼花苦無聊頼坐新聾終日騰騰兀兀中著味笑堪陪座客劖分癡好作家翁跳江昨夜安秋枕墮葉明朝問朔風非是是非還自有我無聞聴便應空右耳聾風聾蟲攻兩禍端左車淰淰載梅酸舌都無恙先輸敝唇未云亡莫罪寒送藥親朋徒説効勸餐兒女不知難老年飲食非輕事义差今年醉牡丹右齒痛感興世路多屈曲拙夫從直行勉欲就此軌未忍枉平生不如且裹足静坐羣慮清莫顧蠻與觸了不知紛争莫辯夔與蚿多少亦自平持盃洗浮雲太虚極髙明病起病骨支笻却下堂瘦顔衰鬢入愁鄉黄鸎饒舌花饒笑一様春風有别腸冩懐荼毒何堪此老身哭兒哭母白頭人海枯兩眼惟乾血天䘮一家俱至親多病所需常乏藥殘生未了尚憂貧勞勞筋骨仍婚嫁獨對梅花愧世塵隣火幸不及殃城門失火夜深時萬幸先生不姓池舊屋尚存還納客殘書不燼可教兒行蔵在我焉無過善惡惟天自有知今日一盃須爛醉白頭俱是老便宜闕撥雨悶時海盗竊發乆雨我亦厭涔涔落不公下田何太濫東海更羣兇道路霑濡際干戈蹋茸中樓臺虚蜃氣波浪假鯨風老者見不忍髙天訴曷通掌盃雖撥悶抑鬱尚塡胷秋凉遣病淰淰新凉兩月秋病多猶自不梳頭饞奴客燕虚支酒嬾子書檠假惜油蟋蟀庭除朝露在蠨蛸窻户晩煙收近時江海惞平盗斗下芒星又可憂林居病懐老去不信老自然筋力疎忙縁一嬾送病髮十朝梳掃地風還葉開窻月曬書秋蟲不解静干聒夜凉初石田詩選巻五
