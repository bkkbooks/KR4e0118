body:
  text: 石田詩選卷八明沈周撰圖像屈原像逐迹遑遑楚水長重華雖逺未能忘魯無君子斯當取殷有仁人莫救亡魚腹何勝載憂怨鳯笯終不蔽文章忠貞那得消磨盡蘭芷千年只自芳題嚴子陵像聞道先生裹足時曽無一語答相知後來亦有同衾者再四能歌抱蔓詩題李太白像風骨神仙品文章浩宕人世間金鸑鷟天上玉麒麟江月狂歌夜宫花醉眼春獨輸蕭頴士不見永王璘題杜子美像滿地干戈草木秋漫將白髮染窮愁英雄感慨言空在家國艱難盜未收老淚邊頭哭堯舜此心裏許夢伊周草堂依舊成都是日暮門前江水流貧莫容身道自尊先生肝膽照乾坤淚因感事時時有詩不忘君首首存孔雀豈知牛有角杜鵑還識帝遺魂千年珍重丹青在大雅何從著讃言拜嶽武穆像松嶺離離草露多碧山髙廟獨嵳峩天如未喪無三字國自甘亡有一和宛宛丹青尚生氣潸潸哭泣付悲歌伍胥不合錢塘歿又見前朝起後波觀李貞伯小像浮生百年內誰能畢其期感彼先露人遺影及兹披浩浩儻宕懷炯炯玉雪姿宛宛若啓齒黯黯蔑言辭存歿各如夢卷之吁以悲自題小像七十四年我未識我丹青一面是否莫果傍觀曰真我隨可可以真生假唐臨橘顆以假即真物化蟲羸真假雜揉奚較瑣瑣但感白鬚長者半墜顴盧黶層頤瘦摺軃嗚呼老矣歲月既夥茂松清泉行歌笑坐逍遙天地一拙自荷孫世節貌陋容請題白頭儘是老便宜六十餘生天地私學舞固無長袖子出逰還有小車兒緑隂如水微吟處紫夾含風半暖時瘦影任君描寫去百年草木要相思王理之寫六十小像王生見我精神熟照寫今吾瘦于竹問年初及六十人饗世渾無半分福一味耽農百不便門前湖水漲低田飢來讀書不當飯靜裏安心惟信天風茆雨壁溪堂破貧賤生成今老大隱服還勞郡守遺私篇或辱尚書和草木當衰不復真紙間座上兩浮塵是非非是都休辨聊記明時無用人圖畫題杜原先生雨景老原作畫墨法熟紙上沈沈潑濃緑重林濕葉欲垂地合澗流淙似鳴玉廬山九疊翠不乾秋影平吞此長幅借看真怕雨拂靣要為時人洗雙目滕王珠簾正堪卷董家破屋不可宿出門一笑青天髙猶怪春泥汙吾足題趙松雪畫馬隅目晶熒耳竹批江南流落乘黃姿千金千里無人識笑看胡兒買去騎題畫青竹長竿白石磯江風吹雪鬢毛稀秋來尚怪鱸魚瘦若比吳民太較肥題蕉老去山農白髮饒深簾晴日坐無聊榮枯過眼無根柢戲寫庭前一樹蕉題畫人尋靜處深住屋向林中小營窗下數枚雛燕門前一箇流鶯題小景江山入吾興隨筆散清華峰影分斜日波容寫落霞惡橋通市迹喜樹隱人家此地如堪買分畦擬種瓜監定米南宫苕溪春曉圖敝籖榜米聊因展楮墨依微却難辨皴膚斷理慨塵畨渙迹漓蹤認餘前作上聲想從潘谷試煙華惜去曽聞用之淺況是澄心體玉疏好事何時不舒卷流傳人代多展轉物豈能同歲相衍請驗周宣告臘辭刻石恃存存尚鮮繼燭殘生九死後得見似人歡且勉或云標題少芾芾紹興條識朱猶湎君王法眼賞惟精此筆敢當當不㥏煙邪雨耶樹色溟洲兮渚兮水光泫眼中未足許清苕平峴衡沙或湘沔翠霓冉冉天蒼茫旗影迷空恍逰輦海嶽遺靈仙者流我欲招之愧辭謇題畫二首扶藜衍風日一路且看山黃鳥緑隂處白羊青草間關幽凝小步會喜破微顔怪被林僧見誰何能爾間山家自煙火杳杳離人羣岩樹落紅雨石窗生白雲朋從因偶過世事得新聞逐逐班樵牧幽蹤不欲分題畫卷寄華光祿尚古老仙心浩然他人溝渠我巨川積義積德非一日積書積金非一年竒編翻刻惠貧讀更製藥物疲癃痊髙雲茂木鬱望族數仭之牆千頃田毿毿白髮披兩肩鳯雛抱送荷自天功名染指知薄味山水載酒修間緣老夫相住縣百里蔑面未見惟通箋越繭十丈翻相聯索我放筆開風煙谷容山重頗有喻大山長谷惟其賢登堂一笑尚有日還對此卷鳴髙絃漁舟晚釣圖新豐酒波堪濯足塵土紅汙酒波緑粗豪飲客下馬來三觥五觥行促促何如並著春江船蒲茸紫立栁黃眠船頭對坐杯漫傳賣魚儘可供沽錢夕陽射眼拉柁轉江光貼天孤鳥逺題畫茆山看過又天平箇箇芙蓉插眼青雨骨雲臕無不好為誰邊畫得真成消暑桐隂宜野服倚雲山腳洗清泉一雙白鶴可為驥直借上天還下天樊節推十二馬歌樊侯卷子尺一慳誰能卷裏開天間應間有駿數十二生氣流溢鮫綃間首尾一匹魏公倡子雍一匹未敢望子明十匹汗且奔總不能超魏之上驊騮騄駬世豈無鹽車轣轆嗟已瘏我今自是相牛夫空倚精神來按圖圖中舉肥傳幹肉骨格全無臕擁玉尾絲不動委長雲飽腹日撑三斗粟圉人持控莫敢騎奉養知為驂乘姿嗚呼地用須真馬千里當教試蹄下感麟作經圖為彭撫公作嗚呼王迹熄兮伯烜爀名分不正禮義忒孔子憂道徒戚戚感麟不時出乃獲因假魯史尊周德書王紀元重人極撥亂反正筆任責筆筆削削區淑慝王道以之作繩墨君君臣臣父子得三綱九法一暴白天下懍然畏亂賊匪曰無位政斯繹匪曰空言用斯核千秋萬古垂世則由麟而作復麟畫言雖畫絶道載籍令人口誦心亦格為經為常國命脈安成大彭代是職兩賢以奏第一策調元補化奉明辟惟麟有趾仍有定子姓振振永厥澤題畫山水正兼秀時秋快登臨篁徑何森邃迷誤若難尋豁然重阿盡陽崖超石林虛亭敞危搆擇勝面遙岑地髙氣自爽神靜慮乃沈疏木泛清籟澄川開夕隂令我思合江浩蕩舒素心渺有萬里波目送雙飛禽題畫卷吳之為國水所涵有山平衍無巉巗我家多水少山處悵望翠微心所貪時能借墨補不足數紙連絡長畨粘峯巒重復間溪溆雜樹列布多楓柟或開大壑浸山足其椒半為浮雲含僧廬隱映逺木杪平圯道谷出水南東村西落互親友耕田鑿井同丁男便須芒屨與藤杖聽泉採藥我亦堪陽岡亭館誰擇勝雅許酒會并棊談嘗聞巴蜀天下險未可一往尋鳬蠶子長之興浩不淺感此老鬢霜鬖鬖聊因此圖識所見卧逰一生還自甘題吳少宰題許道寧秋山晴靄圖匏公題句真成畫説到江山妙有聲一箇道寧消不得老夫只作輞川平題孫君澤山水寄華光祿汝德衆山矗矗如排空左錯右互肝肺重嵐氛滃地似無足上有樹杪浮菁蔥兩崖擘鐵泉迸玉中見百丈垂長虹煙江沈沈納此㵼天影浩蕩吞孤篷君澤君澤具此胸我謂圭逺將無同髙堂突兀出竒觀巴蜀落眼何時通我家茅堂不稱是君家晝錦宜縣中因之卷贈報昨辱一軸百里吹長風古中靜學寫菊舊號鐵梅改為菊堂次張碧溪韻近因寫菊更新號所寓何妨扁菊堂水墨津梁初問道風霜蹊徑晚尋芳梅邊短杖都無夢紙上東籬亦可觴有酒有花皆樂事人間無日不重陽題畫用東城休字詩韻野人心幽迹亦幽短髮白照湖波秋賢才固不在散地吾道已付于滄洲手中自保一竿玉世上萬事如浮漚江湖既遠不足問歲月云往誰能留君不見長安得意者朝腰金暮圍玉名位豈肯卑微休題畫髙春暝色動北垞返輕舟古木辭羣葉微波映逺洲涼雲號一雁夕榜拂雙鷗酒散襟裾爽琴清徽玉秋因之寫髙致得似晉風流為匏菴臨秋山晴靄卷匏繫菴中春晡晡拂几試展秋山圖煙霏慘淡墨痕裡逺瀨百折沙縈紆巒容江色開浩蕩扁舟雁鶩人驚呼長安藥叟造此觀氣味自是營丘徒其人已化其迹在流世直欲千金沽絶無粉黛假顔色俗眼曽不留須臾菴中主翁誰賞識對我但道今難摹不應莞爾領翁意擬筆逺甚成嗟吁古人妙地學始見已信邯鄲非易趨朱繇道子固有説妄意自笑西家愚題春雲山色圖江上春晴啼竹鳩白雲狼籍未全收或教山好忽然去故要樹深終日留其意不知何物命老夫還悟此生浮與君浩蕩論胸次把筆因之作幻逰題畫髙躡千仭岡身超傲卑迹下俯見城郭雲霞乘履舄欲拉浮丘公相與話疇昔東南有飛鶴目眥入秋白題釣圖和韻白髮今吾即故吾此身滿地是江湖只饒酒債從人舉敢倚漁竿待價沽流水之間心自得浮雲以外夢俱無緑隂髙樹成箕踞此意憑誰作畫圖友人索雪圖誤寫蕉石故人書來索寫雪兩足楚瘡卧如折蕉蔭小簟竹颸涼即事便圖忘所説旁人笑我妄且迷我自于時乖更戾勸君索驥莫按圖長可度兮大可潔世間萬事多是非未必覆羮吾手捩題振衣千仭岡陽岡振新浴爽氣與秋通鶴氅照片雪鳯翎開太空乾坤兩長袖塵土一泠風熱惱下方路何人髙蹈同梅花道人臨東坡風篠東坡先生好逰戲壁上寫竹如寫字三竿兩竿裊風翠却有渭川千畝勢題詩執燭倩官奴白髮紅粧兩無忌不應誣我抱節君何嘗解舞腰肢媚先生調笑皆文章顧與節君生賁光千年故事白石在梅菴載翻新墨香捕風捉影老手健鳯駭鸞驚秋月涼我今拭目艮會堂沈氏堂名尚疑耘老亭中央今人古人不相見遺迹宛然人未亡題畫草房仍著薜蘿遮地拗林深獨一家只道春風吹不到門前依舊有梅花碧樹清溪春日長棋枰酒案好商量東風似與人爭座早送飛花占石牀緑隂如水逼人清隔葉黃鸝坐久鳴一箇樹根非八座白頭箕踞有誰爭徐氏雲山圖老夫發墨為白雲忽看一幛千氤氲徐卿新堂虛北壁誰謂不堪持贈君青山為母雲作子倒見青山落懷裡分明七十二芙蓉汞海卧秋扶不起滿堂雨氣颯欲流隔簾緑樹啼春鳩白雲在家親在眼不倚太行歌逺逰文湖州竹枝笑笑先生有遺竹翛然畫法妙兼書千竿水石秋容合一卷風雲墨色虛剪伐已逃漁具外收藏今保襪材餘他人敢奪王家物舊好重修君子居題畫黃鶴磯頭秋水落故人驀地相逢著十年短鬢話吳霜是非不假論城郭楚江萍實待誰嘗老矣吾儂思故鄉為王揮使畫牡丹王君四月方來蘇緑隂滿地花已無臺紅樓紫不可覔筆底春風尋老夫殷綿滴露看活色信手貌出西家姝坐中狂客未解事欲折不成空紙膚去年淮隂七尺雪凍地似恐花根枯此圖贈君日日賞一日須傾一百壺題畫嫩黃楊栁未藏鴉隔岸紅桃半著花開眼闌干接平楚夾洲亭館跂長沙悠悠魚泳知人樂故故鷗飛照鬢華如此風光真入畫自然吾亦愛吾家吳都閫幛帥府潭潭堂壁上白間少我一松幛寄將雪繭照眼光筆未成揮意先放徂徠縮地落此間古意蕭森立青仗清宵明月待開門白日風雲與摩蕩將軍仰面揮羽扇思靜神間兀相向老夫更活三百年歲歲逢人問無恙題吳瑞卿臨王叔明太白山圖我家太白圖太白於焉備山既得其髙林亦得其邃天童古佛宫盤盤奠坤位佛為山莊嚴山作佛布施擇勝啓道場佛子良多智千樓絡萬閣訝出毗盧技飛甍揭煙霞觚稜日星比金碧足輝映時復交嵐翠重峯與復嶺附綴喻肝肺雲去若撑天雲來若無地自天設此觀天下若無二松行二十里􅓚蓋碧相庇方池落天影何年萬工治神泉及樂石瑣細各具類兩溪貫其麓梁圯鎖三四逺近羣小山趨拱左右至如家有嚴尊為從許幼稚路入岐而一宛轉仍迤邐包錫走緇流騶騎或官吏芻蕘亦絡繹明滅見隔樹于時及髙秋衆葉霜所被青紅錯顔色巖谷更增賁按圖指歷歷如讀鈷鉧記引紙僅及尋顧有千里勢作者王子蒙品髙見超詣出入右丞筆緣蹤究其自想居此山中不以歲月計逰觀稔心目思到方位置乞我日卧遊不用襪緊繫我藏三十年吝客未輕示吳生學丹青不但許能事久已知此卷未敢言借視我既察其色一出厭所嗜初見目不收張口歎且悸締玩廢飲食十日得恣意然後敢舉毫舒素敬一試搰搰逮三月極擬加精緻便欲無我卷後輩豈可易但恐有豪奪亦有造化忌我自襲我卷子亦當自祕吳瑞卿染墨牡丹雨後風晴日杲杲趁此看花花更好澆紅要盡三百杯請客不須辭量小野僧栽花要客到急掃風軒破清曉知渠色相本來空未必真成被花惱吳生又與花傳神紙上生涯春不老青春展卷無時無姚家魏家何足道題畫層岑交亂雲歷歷映羣樹雲山互相依青白媚朝暮下有土著者靜居氣鬱聚修松蔭髙宇細草被紆路幽深疑世違時復通杖履鳴禽值客來語歇客還去天機發所樂漠然非人故夏圭山水為華尚古題罱魚罱魚復罱魚聊開聊闔魚逃逋江湖滿地事數罟老魚為計與利殊此圖此野親捲送因人而投知不虛況聞圭筆是名手其價要論千金沽於漁忘漁價何有於人忘物畫可無華君尚古真丈夫以義為利空錙銖堂中看畫且酌酒坐對慘淡消金壺左圖右史存鑑戒此堂不宜無此圖松隂清夢圖既醉二百杯坐蔭兩松樹神凝睫自交心冥氣斯聚超彼世網外悠悠尋太素生寓大夢宅何嘗限寐寤黑甜本無迹怪自我筆露傳之一千年亦可示夢具題畫髙山矗萬仭野木隨上天眇眇古招提更出羣木顛觚稜槩星漢窗闥雲霞鮮鐘魚有遺音下自泠風傳神仙詫拔宅方兹未茫然我但怪飛磴尚與世夤緣寫雨景四年坐雨厄今兹愁暵乾相將事春作田稚緑已漫耨草助其長纂纂沃以攢金房雖未實粒粒想在槃晚歸茅簷下返照尚闌干捉筆寫舊雨思痛乃轉歡羣木覺翠濕對之成暮寒題畫楚江秋淨水沄沄江上青山多白雲手把蘋花却惆悵無人作伴賽湘君畫松老夫慣與松傳神夾山倚澗將逼真青雲軋天見髙蓋蒼鱗裹煙呈古身我亦不知松在紙松亦不知吾戲耳吹燈照影蛟起舞直欲排空掉長尾待松千丈歲須干老夫何夀與作緣不如筆栽墨培出一笑何問人間大小年題邉笳十八拍圖蘆葉傳聲拍拍鳴畫圖傳拍態如生琰從三姓雍從卓自是人間父子情題釣圖誰寄扁舟號隱淪平沙淺瀨入秋蘋釣竿却是功名具渭水桐江古有人題畫虛亭不礙秋落葉直入座可人招不來幽事如何作題畫落日江光淡不流平頭舫子貼天逰癭尊酒盡三百斛大醉來題黃鶴樓我本前身鶴上仙人間罰住一千年玉笙塵夢頭如雪待得醒來海又田莊仲威家山圖圖固不盡意莫寄家山清家山在具區湖波如玉明兩峯合書屋芙蓉照簷楹笑語水月涼濯足魚龍驚盈盈隔浦人宛宛望蓬瀛久居不知勝借視子墨盲山水有真趣持歸心始平題畫寄楊提學應寧我隨草木生長洲索居自耻無朋儔于公辱知亦既久十年蔑面無時酬尋常開緘見諌議言語亦得通綢繆終然玉樹隔眼物碧雲明月心悠悠適來宦轍道桑梓老臂無翼從之逰仙人可望不可致聊以逺夢尋丹丘夢空人逺相憶在因寫江山消我憂寄公髙堂我偕拜一日素壁開清秋楊起東出觀陳氏舊藏張長史春草帖韓幹馬圖千年健在憑誰抹神骨依然肉尚多此馬于今不須問傷哉其奈主人何紙影依微墨色明顛翁氣骨尚峥嶸家家門户春風到此草從來不世情任月山紫馬霜蹄炯炯映白顛鳯頭宛宛騣一偏黃沙慘淡聳隅目所向萬里無風煙青絲絡頭未受牽一團紫雲凝不前此馬所見世上少神氣德力無不全子明水監到渥窪眼親識之手敢傳只愁奮迅裂卷去四座錯愕心茫然寫畫贈古景修誠齋古君子肥遁樂丘園古姓仍古心心古古道存簮組知束縳自畏及兒孫野興時小酌鳴琴侑匏尊或挾種樹書兀坐蒼松根齋中不尚畫青山待開門而我遺此幛無乃遼東豚把之但微笑嗒然無一言寫畫贈陳惟孝我昨尋虞山君出不在家我歸君來尋迹類鴻鴈差把酒牡丹後園林淨無花緑隂亦可愛茗碗浮新芽遲留越信宿談笑補嘆嗟莫易判風袂後會未可涯題畫長松落落不受暑鬢影釣絲俱渺然碧江千里未入眼飛過一鷗方可憐梅雪圖戲陳廷璧梅雪翁清而窮名階利窟誰與翁作引書林翰苑自許翁相通硬黃搰拓盤鼓雪絸習習摹尊鍾老年好古心獨少墨烏衫袖猶兒童自言書法即畫法雖不能畫頗知其理同雍分斯篆數投我聊博紙上青芙蓉得之欣然便卷去不待題識疾走飛秋蓬正如意不在酒在乎山水中風流欲擬歐陽公今朝雪落號北風凍指屈縮為蟄蟲翁來強要圖所號趁此梅清雪淡天為容傳神正須及此際吹火烘硯松枝紅亦云要詩寫雪空長句掃破寒雲重笑翁愛詩真怪事無乃齊人知瑟工興來為翁放手作珠光玉色開深冬圖成詩就雪未霽西湖剡曲略見依微蹤我不知翁在畫翁在詩詩中畫中亦各有此翁請翁請翁歸去問梅雪我詩與畫誰雌雄為越公重題舊作山水圖此畫寄松院墨澀筆潦草别來三十年衲子尚能保開卷漫發笑可感仍交抱正如故友明卒見含惞悼人生非金石年華豈常好白髮不奈事先此青山老當更三十年與物論夀考題詩報青山彼此託玄造學雲林小景燈下秋山影零亂況兼老眼鎮模糊筆蹤要是存蒼潤墨法還須入有無自我開簾看翡翠憑誰作釣拔珊瑚倪迂標致令人想步託邯鄲轉謬迂騎牛圖老夫自是騎牛漢一蓑一笠清江岸白髮生來六十年落日青山牛背看酷憐牛背穩如車社酒陶陶夜到家村中無虎豚犬閙平圯小徑饒桑麻也無漢書挂牛角聊挂一壺村醑薄南山白石不必歌功名富貴如豫何為郭總戎題長江萬里圖元戎大開寶繒堂紫錦薦几霞幅張手披牛腰之甲卷水墨迤邐蹤微茫我從魚腹弔往古灌口玉壘煙蒼涼青城雪山蔽虧處導江之岷不可望三水合流錦官當三娥九頂遞接翠樓觀縹眇天中央渝涪城髙宛相峙嘉陵跳江吹枕榜陳迹齒齒石作行風雲慘淡開瞿唐黃牛灔澦難舟航青天仰漏一線光峽窮江廣見漢陽黃鶴赤璧相低昂廬山五老天下觀順流漸見迎風檣大姑小姑交嫵媚何年爭嫁彭家郎三山九華連建康南都宫闕何煌煌大明定鼎龍虎合萬古鞏固皇圖昌真州潤州列兩廂金焦嶪嶻當喉吭直吞天派納海口有若萬邦來會王座中指點皆歷歷絞綃數丈萬里長老夫困頓今白首欲往逰之無裹糧徒然感慨在牖下捕影捉風消熱腸心搖搖兮悵倣徨佩有蘭兮襲瑤芳江兮漢兮不可度望美人兮天一方少陵東坡二豪者風流在在留文章英雄割據未暇論卧龍獨數人中強元戎元戎將之良此卷兼與韜鈴藏南征西伐或有事按圖索程猶取囊非惟供玩託深旨居安慮危心不忘嗚呼居安慮危心不忘松卷為德韞弟作老夫平生負直氣欲一發泄百不遂隱居只作木強人設仕亦為強項吏白頭突兀尚不平託之水墨見一二豪來寫松三百株一二長身拔于地只嫌紙短手局縮腕間風雨生蒼翠東園阿弟看落筆神驚眼駭走魑魅堂中宛宛開徂徠不知老兄作逰戲夜來明月奪江光滿卷飛蛟稱怪事今年大潦苦浸淫根柢自髙當不忌根柢自髙當不忌區區草木皆憔悴倪雲林畫愛此倪翁小筆竒淡煙疏墨百年姿中郎已矣虎賁在我自低頭人不知題畫江草青青江栁新一雙飛燕雨如塵輕舟短棹少間客翠幕紅樓多醉人王理之臨鳳頭驄宋家王孫趙仲穆畫馬盡形神亦足東崑王郎拓其本筆精殊覺驚人目紙間突兀擁肉山俗工紛紛手當縮此匹傳是鳯頭驄五花滿身雲簇簇請郎别圖唐舞馬逆胡教舞不肯服逆胡教舞不肯服大勝汚臣食其祿潤色舊臨倪雲林小景迂倪戲於畫簡到更清臞名家百餘祀所惜繼者無況有沖淡篇數語辨小圖吳人助清玩重價爭沽諸後雖有學人紛紛隨繁蕪崔子強我能依樣求胡盧墨澀不成運林慚澗與俱何敢希典刑虎賁實區區醜惡正欲裂捲去不須臾今夕秋燭下載見眼模糊妄意加潤色泥塗還附塗崔子豈不鑒愛及屋上烏題畫雪裏一樓髙萬竹樓中人與竹俱清默然天地憑闌處人不能言假鶴鳴題雜花卷子芳園爛漫百花枝白白紅紅各有時冶葉娼條均造化和風甘雨入華滋老夫觀物逍遙地小筆分春竊弄私日日不妨偷展卷擾人蜂蝶竟何知題畫三首詩思凝懷未易裁平臺一半夕陽開桃花小間松枝發碧嶂中分緑水來清暑茂林風日好兩翁談屑落髙間白雲故故沒行徑還絶世人來此山山徑蕭蕭落木疏小橋流水限林廬秋風黃葉少人迹雞犬不聞惟讀書雪景山水眼中飛雪作竒觀江山一夜皆玉換前岡坡陀帶復嶺小約凌兢連斷岸水邊疏栁似華髮忽有微風與飄散紺宫幾簇林影分白鷗一箇江光亂老漁蓑笠秪自苦冰拂凍鬚莖欲斷江空天逺迥幽蹤只有一竿聊作伴此時此景此誰領亦笑此漁從我玩圖成一嘯寒戰腕萬里江山在吾案五十匹馬圖沙樹歷歷沙草荒江上誰開芻牧場馬羣所聚凡五十飲秣而俯嘶而昂寐訛浴涉踶且驤或乳或駐或軋瘡三縱五橫不成行若驓若􅗬青紫黃烏騅赤兔照夜白連錢桃花鬬文章牝兮牡兮未可辨亦莫可識駑與良相骨相肉俱已矣老夫兩眼徒茫茫但愛各各無羈韁自縱自得肥而駫肥哉肥哉空老死未試何以知爾長我知馬亦待駕御人馬兩得氣始揚請看溝汗流血漿爭前欲逐左賢王追風掣電一般走五十之中當有強畫玉臺山圖答白沙先生陳公甫玉臺萬仭先生住出語直教天上驚還有遺音滿天下兒童箇箇解稱名題松卷寸悠悠至千丈歲月之後乃可望老夫一日春雨中手暖心間筆初放徂徠合抱三百株生捉龍蛇眠紙上培之以墨土何功根葉不驚神亦王傍人謂我奪造化畢宏偉偃仍相誑一舒一卷風雨生滿堂錯愕空相向還疑秋子打窗扉亦覺春花撲屏幛久無采録我何嗔自倚胸中意為匠題畫髙霞散雨發秋晴放目開懷臺上行一隊白鷗間不過也隨人去作逢迎倣雲林畫知迂的是荆關手聊復從迂寫素秋莫道西山無爽氣我于東野合低頭林墟壓葉吹髙帽沙水飛漚掠逺舟一箇小亭逍遣得儘將吾道付滄洲題畫三首眺逺纍登頓林梢拂雙鳬江長要天接雲懶欲風扶落日在溪山秀色浮眉鬚臺髙興亦超空歌徹清都流泉無停迹靜者臨其旁跳珠石觸起霏花衣滲涼傾聽入希聲載潄空膏粱嗒然與心契豈復嗟望洋題張翬畫張翁年紀如伏生讀書不及繪事精為圖亦自有古意長幅短幅求人爭老翁之筆隨年老墨潑綃上如帚掃橫皴六丁鑿龍門豎皴溜雨泥墻倒一峰塞天雲不流特立萬仭芙蓉秋石邊白猿亂跳澗木末紅泥髙見樓樓頭楊花吹碧瓦宛轉春江帶樓下煙波渺渺古渡長落日行人獨騎馬似圭似逺是非間人道濃枯復似關自成髙致那能到我莫臨摹覺手頑山水圖寄趙民部孟麟縈縈石磴渺林巒百折緣泉草蔓漫穿窈窕來憑柱杖可盤桓處藉闌干洗開山色雲生浪錬出秋容樹轉丹我約金焦逰未得先圖一紙寄人看題子昂重江疉嶂卷王孫無運開英雄聊寫江山藏畫中還從慘淡見舊物似有涕淚含孤忠長篇禹貢與作稿一圖萬里連提封張韓劉嶽果何功入關蕭相將無同王孫本號松雪翁能事錯忍營丘公丹青隱墨墨隱水其妙貴淡不數濃縈灘曲瀨導巴蜀沓巘長巒連華嵩空濛野馬軋雲日浩蕩碧縠吹秋風王孫隔此不可從水晶雙闕金芙蓉招之千年或一出黃鶴豈不思江東試晬歌題趙魏公畫楊花拋銀春滿盆乳㜷擊湯蘭氣溫沐珠澡璧試新晬翠羽掩風數門氍毺暖坐麒麟玉阿婆綺語髙堂祝緑弓彤管看探時一掘笑聲愚智卜君不見九齡九鶴夢先知天自降生天自竒清溪散步圖為徐文序作老去山翁空世情偶因溪好獨間行髙歌激物鳥忽語樂事會心人不爭露氣溢花沾濕好風瀾當日動搖明臨流愛濯無塵濯青布披巾況沒纓題畫我愛碧江淨輕舟點破秋西風捎鬢腳直得不梳頭采菱圖湖州秋水玉泠泠湖州女兒出采菱梭船蕩槳紅潑刺阿姊倡歌阿妹應隔溪冶郎騎馬過點鞭殺勒霜蹄挫桃源圖君不見姬周寬仁天下歸又不見嬴秦猛德天下離秦人避秦秦不知人既移家秦亦移移家去桃源住萬樹桃花塞行路楚人吹起咸陽炬何曽燒著桃源樹老翁尚記未焚書諸孫儘種無租地自衣自食自年年擾無官府似神仙一時落賺漁郎眼猶怪為圖與世傳朱澤民山水睢陽老人營丘徒意匠妙絶絶代無為留清氣在天地便就片紙開江湖長松落葉風細細幽構縈蘿倚江住壁虎書魚蕩水光老屋疏茅通雨氣老人不歸空北山芳杜春風應厚顔微官縛人萬事拙安得浮雲相往還宦海黃塵迷白髮雲壑風泉清入骨思家看畫方兀然叫落西窗子規月洛神卷煩馬蕭蕭駐西日桂旗冉冉曳靈風潛川密約殷勤記流水微辭宛轉通佩玉有聲山月小襪塵無迹浦雲空人間離合須臾事還似髙唐一夢中隋宫圖誰云玉樹無人續馬上還聞夜逰曲君王不自固苞桑却道雍州能破木楊花千里撲離宫富貴濃酣似夢中百隊蛾眉皆鬬月千林彩樹不驚風悲歡只在循環裏莫道征遼偶然耳鹿車載怨重於山人心未愜遼東死一聲桃李天下知皇后自將神器移漳南未顧鼠竊計太原已及龍飛時如何只醉揚州酒酒杯在前兵在後白練天教泄勇寃醉骨沈沈當速朽孤墳寂寞向雷塘秋螢星散已無光惟餘二十四橋月獨照逰魂歸洛陽題小筆山水春日春城未得還笑談因在酒杯間野人半夜思農事自起吹燈寫故山題夏景地靜林居無日影紫薇花落暑闌珊兩翁白髮棋爭後一箇黃鸝茶話間雨氣欲來泉脈動風颸略過樹隂間隔溪草閣尤涼淨更擬呼杯看鶴還題畫册後八十流年老態多目昏秪好卧雲蘿墨消古研能間在紙映明窗奈暖何觸物便須隨點染觀生還復費吟哦這般醜拙難拈出聊自家中遣睡魔寫畫寄仇東之茫茫湖海傳知次落落文章健羡間骯髒功名何物忌畸零天地一夫間人遐尚想梁間月地隔聊移紙上山欲問相逢老無日碧雲黃鶴自相關題馬圖和驄馬行韻玄雲漲體非花驄復知西産匪産東突圍破陳奔死命將軍假此誇竒功橫行絶塞何由致千金始為燕昭至房星不落冀北羣地用全收天下利奮迅時時迸銜鐵仰空長嘶紫韁裂朔風吹鬛尾梢雲曼纓拂地垂猩血羌奴手控不敢騎天生神物彼亦知今無伯樂空自老末路英雄向誰道題畫秋山骨稜層秋樹枝槎牙尚有霜餘葉點綴如春花緩騎亦足賞何須坐停車行行日將夕微吟酬物華青山本自媚天猶假裝飾白雲為鉛粉林嶺弄顔色西湖比西子坡語作戲劇老夫愛莫助圖畫開幻域墨迹黃應龍失去思陵勑嶽飛殺賊手詔東崑人來言有盜發子帑意非摸金手必是探禊黨不然尺一紙何足厭貪掌思陵灑此翰破术勑飛往當時君臣際天地相俯仰知任觀哲明眷注加溫奬功寵致忌殺忠義果足仗君心在遺墨一讀自炳朗矯害證逆檜淹天信欺罔此紙後不傳何以暴所枉錮子祕密藏何為世標榜天意流無方假盜理可想留吝恐違天水火事或倘物豈久戀人物亦有精爽使之一人傳所見目惟兩盜去轉相售售售萬目賞存未為子欣失未為子惝慰子不平懷詩與發浩蕩觀徐士亨所藏懷素自序真迹吳匏菴許摹寄速之藏真儻蕩人草書如易耳羲獻百世師擬步爭尺咫長驅並顛旭所至非易矣筆勢酒發之將腕兵其指潛鋒在渾淪藏力于纎靡恍恍遲速間神妙出生死心以禪觀通隨物得書旨風雲及虺蛇信筆變不止一筆備一變萬變萬象起固足稱草聖多括類書史史遷嘗自序此作良有以汗漫逾千言燦爛連數紙初紙記子美曽補龜玉毁山谷亦未見曽遭穆父鄙後人況肉眼狐鼠得疑似喪亂七百年天豈憗遺此今日復何日所遇亦天使未能尋文讀且以指畫几歎羡及末卷題識驚娓娓名銜十有六尚漏薛劉米西臺與祁國緒論甫先啓同叔相諾唯公卷特許紀此輩推名流逐逐到餘子非惟致贊頌流傳悉源委譬羣介輔賔傳命以成禮譬徴十朋龜信吉無餘擬季子肯拓致我詩系其尾南州肯勒石萬本播不已不然此紙者孤注安足倚題林和靖手帖用東坡韻我愛翁書得瘦硬雲腴濯盡西湖渌西臺少肉是真評坡云書比西臺差少肉數行清瑩含冰玉宛然風節溢其間此字此翁俱絶俗開緘見字即見翁五百年來如轉燭可憐人物兩相求落我掌中珠有足水邊孤墳我曽拜土冷煙荒骨難肉當時州吏歲勞問于今祀典誰登録翁固不能知我悲聊對湖山歌楚曲我歌湖山亦不知惟有春鳩呌深竹歸來把酒弔雙緘猶勝無錢對寒菊速張友山題和靖二帖老去知吟苦新篇忍重煩搔頭絲墜地點筆雨臨軒小簡完雙璧長城重五言逋仙當不死字字與招魂録余青陽廷心與鄭山子美手札國難倉惶細語箋危城落日大江邊干戈一膽公公同也生死涕淚千年尚簡篇家裡識縧如如奈也有婦波心抱印若無淵燒香洗手重新録颯覺英靈筆研前題華光祿汝德石延年古松詩曼卿號詩豪發竒索幽祕對語禽關樂生香花交樹翕然伊洛間妙絶稱者亟清放挾滑稽其風如晉靡馬逸遭躓墜云賴石學士狂調煙花館弗愧街司箠落考褫華袍坐嘯傲羣耻作詩喻罷進遺韻寓謔旨排闥就錢愚博飲略汝爾卒與劉潛醉囚巢鱉自擬止酒逮遵戒枯渴遂及死蒼筆留松篇心畫森規矩古以畫觀人無乃倒非是躐顔復涉栁亷隅攝神鬼獸柙怒虎兕武庫耀戟棨當時朱夫子不學九淵體道德百代師朱紫曷足訿曼卿賁在外紫陽衷則匪我今罔異同口舌吾過矣拙肘嘆莫學聊以指運几緣辭更髙諷謖謾松風起其人當不亡或在蓉城裏題楊鐵崖先生遺墨鐵崖山鐵道人戴鐵冠吹鐵笛鐵色一尺面鐵衣七尺身元精育此老鐵漢鐵肝鐵膽窮為義士達藎臣百銼不得折突兀而輪囷文章竒倔似生鐵戛然有聲驚鬼神小語補兩漢大語追先秦時流髙價購鐵語貴鐵不貴金與銀不從嵇鍛搰搰纍俗好不學許耕屑屑稱齊民天河借水洗鐵冠笑吹鐵笛騎玉麟而今觀化不在世好在天上參星辰惟餘此篇在故紙鐵筆不爛二千春文詞題史西村逰杭詩稿珠貝連篇一卷間只疑梱載古杭還候潮路逺肩輿重酬月歌長酒量慳自惜舊逰妨老病且從新句見湖山問天賖取明年健何必因人有厚顔題朱性甫詩稿四十精思成此稿吳鄉吟輩未堪儕揠苗豈是時能長啖蔗應知老漸佳雖止百篇諸體備不拘一律大方諧野航秋水空塵迹細屨春風有好懷公道未應無賞識文章安可使沈埋冠端感慨儀曹筆跋尾吹噓借舫齋已藉二君髙論在贅辭慚愧老夫偕讀盛仲規遺詩飯盤苜蓿漫闌干自信書生骨相寒遠落荒州悲燕幕老收微祿笑鮎竿一梳墜雪方歸國萬事浮雲又蓋棺燈下遺詩不堪讀讀來句句與風酸題狄秋林詩稿後久别殊驚各老蒼宦逰落得此詩囊風情逸朗駸駸晉辭氣清平咄咄唐秋雨晴邊挹巒秀春江濶處弄天光德人言在真堪羡鮑老郎當愧末場謝吳匏菴序拙稿且本荒荒語冗陳品題何足動朝紳光堪繼燭垂垂跋覆可從甕漠漠塵牽比及桓寧作我借推于謐信因人詠歌聊耳存閭巷自記堯民與舜民讀陶詩二首采菊見南山賦詩臨清流偶耳與物會微言適相酬浩蕩思惟表其心共天逰江不阻水逝天不礙雲浮後人涉雕斫七竅混沌愁掩卷三太息至山莫容丘元氣本無聲宣和偶宫徵渢渢合自然其音無惉懘流之天地間六代激綺靡遡觀刪餘什雅豈不在是後來庶有知韋柳實興起更後邈無人斯文止于此石田詩選卷八
