body:
  text: 石田詩選卷四明沈周撰宗族泛月辭并序家君以風痺兩年不良行今稍可扶掖出入七月望夕氣清天髙神情朗徹因合近局五七人泛舟奉遊于谷木川上水月浩然照人如畫乃烹鮮釃酒捧觴屢進復造此辭揚聲中流歌以佐之客亦宛轉齊口相和家君馴及微酣月午始返棹可謂樂矣其辭曰川之迥兮淡無風月初出兮露橫空泛樓船兮川上弄明月兮川中鼓蘭槳兮揚彼素波光出沒兮復見星河清歌激兮觴屢進夜未央兮歡樂多歡樂多兮百憂釋百憂釋兮除疢疾除疢疾兮安吾親忘嵗年兮遊無極七月望奉老母泛舟玩月沙溆生涼璧月秋老親看月子操舟雖無王守觀燈樂也類潘郎禊祀遊風動髙荷聞露注星明疏竹亂螢流酒波泛泛清光裡但願年年照白頭中秋感懷去嵗中秋月吾親正在堂今年親不見此月若無光淚眼渾迷霧衰毛半染霜東家共清夜依舊有華觴除夕歌示子姪去之嵗來之年一迎一送燈火邊迎新送舊大家事覺與老者偏無緣黃雞未號霜滿天一心百感惟愀然小兒自喜時節至催理靴服誇新鮮固知老者已異趣青春似因兒女妍青春懸老不多地白髮紅顔俱眼前去之嵗來之年譬如傳馬相絡繹又如車輪相回旋誰從箇裡饒不死咽氣苦苦修神仙我於所去已五十其來百嵗亦倘焉使我五十不為天使我百嵗不為延尚有大而去者與來者在我先後計萬不計千其間豪傑夢幻耳𡨕冥漠漠真堪憐惟有青竹數行墨待來追去各可傳勸兒必讀牀頭編莫惜買讀吾無錢男兒所立須及早老夫代爾耕春田古木羣烏示鴻兒羣烏小筆聊耳爾豈足貽謀為兒子汝今裝襲亦自好泛多題辭大夫士我家孝悌仍力田自此相傳逾百年門前大樹已合抱今有此鳥巢其顛人云烏來不易得他家豈無樹千尺北平乃見貓相乳江洲亦聞犬同食我慚何有於烏乎我自我兮烏自烏汝當力行為己事毋但區區重畫圖送巽女歸徐氏紅車緑幰及春明六禮周時汝好行銅鏡試粧花髻拙布衣隨嫁竹箱輕繁絲緩柱房中樂細鱠深杯堂上羮婦道從今須孝順戀家不必淚盈盈憶弟妹五人弟妹一胞親白髮于今剩兩人半夜鴈聲孤枕月起來愁坐不訾身拾遺紙感繼南手墨亂苴初拾得舊墨忍重披繼燭垂垂際蒙塵漠漠時楚王遺屣念原婦故簪悲掩卷山窗下潸然老淚滋德韞弟禁酒有作兼咎鴻兒此病都因痛飲中自憑斷飲作醫功便須真止從陶令也莫無多學次公醒坐暖宜東閣火酣眠煞忌北窗風重君猛省吾深喜安得聰明及阿鴻喜橒弟開館家庭人靜日遲遲檢束青襟漸有規小子方能識癡叔抗顔真去作人師牀頭把卷書魚走窗下開絃野鶴窺訓詔有餘仍自學知君况是少年時喜芾奎二姪延師教子俗習務淺鄙養子多昧教且云粗識姓便是學之要學豈止識字要在知人道人道重綱常文藝稍加膏愛子若不教護病不醫療往往嵗月後歷歷見狠傲孝悌莽無知禮義蔑循蹈辱父辱門第至此徒悔懊此過不在子在父長其暴能教始為愛教成自有效不可吝鞭撻不可恕幼少今年賀美事二姪改俗調令子從師儒詩書發蒙冒此舉足髙尚先緒喜可紹譬穀既歷舂白粲脫黃糙又譬金溷沙披汰金乃耀願言勿中畫進進有逺到徐甥子修童贅吳人多男效秦贅贅男與人如接樹抱他根本作春色為榮為枯信天賦小兒拜我下堂行雙丱垂疏繡襦袴惞惞何省傍人門離家苦動爺娘慮老夫為渠且莞爾兒債眼前寬一步失孫茫茫得失真誰使欲問惟應造物知六日流光人屬夢千金遺愛淚如絲重來尚結他生願老去難禁見在悲嗣續百年成底事藁苴空剩此篇詩抱孫幹且豐隆骨更竒白頭喜抱此孫兒十分事足惟些欠不及婆婆眼見時人日訪徐氏妹曠時思覿面引棹不多程未似鍾離逺便從人日行提㩦惟一榼迎拜有諸甥白髮團圞話春風繾綣情正月四日喜許氏女得甥汝寡無丁男托命惟一女活世真廢人盲瘖無乃是今年女有育正月利弧矢乃是四日生六日方聞喜得報訝其遲隔縣本非邇老夫笑滿面賀汝似得子他人視則甥在汝則子比緣情遂亡分慰眼併遺氏在我固稱彌因汝喜切已婦人曷持家嫠煢粗有恃身後饗粢盛其氣尚有以汝夫在地下不為敖氏鬼譬如委霜草今為春風起復如涸溝魚一夜漫春水只憂不曾生既生長易矣便須買書本教自孩提始成人無他圖讀書而已耳悼內結褵四十二星霜貧賤來歸貧賤亡秪剩辛勤在麻枲儘知慚愧纍糟粳駸駸馬齒偕誰老耿耿鰥睛覺夜長淺土不安緣借殯青山愁絶幾時藏正月十五日送三女歸史氏春王正月及佳期送汝登車甫結褵纍重忽輕心自喜愛深將别意還悲逞粧莫漫求珠翠善事須親到帚箕孝順由來宜婦道尊嫜况我舊相知哭母都房笑語處腸斷忽然空昨日今朝事天翻地覆中痛將雙眼血願染九泉紅我母知相憶時時魂夢通哭親不見堂上親遺我堂下身有身如枯桑不復知青春人皆依父母我是無依人感恩等天地徒然抱涓塵報養已不逮此身何用存欲死顧有托欲活無精神杲杲白日下冥冥與死鄰痛撫心肝腸崩裂不可紉示復兒言語不可茍謹之應免尤使聽人不厭容察實無浮當識寡為吉勿令輕起羞此聲心所發心要與聲酬十二月一日亡兒附主于祠悲傷未輟淚又及免喪期碌碌有窮日冥冥無盡時破家搘老力瘦骨裹空皮以汝附祖食幽魂安可知雜流雅士吟雅士居鄉黨平易以為德口惟無妄語貌有和樂色溫恭一座上四隅皆敬飭他日偶虛位囂囂衆狂忒如冠在人首寒暖初何益便去若無妨但覺儀觀失君子無異人無之無以式貧女吟貧女勿多怨怨多亂心思慕冨不知分厭貧不知時折荆聊約髮金叉同一施練布與錦段適暖同一宜貧者豈長貧時至會有期在時不在貧嫁德不嫁姿請看臼頭女終為王者妃溪翁參差榆栁逼門前不剪茅茨不斫椽嵗晏雞豚鄰社鼓秋深蝦蟹水鄉船會羞蓴菜量加糝嗔拗荷花誤結蓮昨日逢渠溪漲後别無言語只憂田牧童謠朝牧牛暮牧牛朝朝暮暮牛放收騎牛喫草抱牛睡牛若渡水我亦泅牛東信東西信西我弗強牛牛自由不勞不飢肥且長背肉秋來平似掌逢春耕田牛得力大凡要用先須養家中大哥氣力無一春築城夏鑿渠交秋又點征胸奴我為大哥鼓龍胡從軍詞闕屋資無告故人散草中五畝愁荒煙面盧骨立牙齒脫短褐曼胡菅屨穿逢人欲歌豪或在聲吞苦淚秋漣漣老人勿悲此世態富貴貧賤本相縣薄徒勉強狃勢物聚散茫茫雲霎然但願老人有錢復年少此輩明朝還拍肩贈老人淚滿雙頥雪滿顚一身憔悴自應憐座中誰似楊開府莫易逢人話少年屈老長帽西風滿面塵相逢憐老不憐貧三杯濁酒浮生事一曲悲歌萬感人螻蟻未知何處骨蜉蝣聊寄不訾身白頭對客無聊賴還説鶯花少日春地理師洛卜鑒瀍澗虛望知以楚地術有由來世好則往古之子悉心久自視曾楊似登臨啓顧瞻富貴隨許與山水若呈秀目力無違忤茍有禍福存願言無妄取白雲山樵歌白雲山在何處太和峯下紫翠堆邊是山中道人玉作斧慣向雲根斫琪樹束之三萬束凡火不能熂却使火龍水虎相煅煉黃婆鼎中七七始成齊小服百年飽大服飽千嵗長生之藥元酒味永不飢兮永不醉神仙洞裏觀棋去斧柯爛盡不歸來人間甲子須臾事贈接花叟打得旁枝手有神接他生氣一畨新自家無限真消息錯借春風與别人遇李生李生生北方膂力矜奰屭桑弓徑如鐵輕引左右臂短衣獵南山猛虎俱待斃官衢多騎劫一發嘗貫二含笑擔其囊輒補酒家費小飲三百杯味薄不足睡夜半挾金餅隔樓調鄰妓橫行長安中五陵誇結義秋暑滿溪閣解衣詫能事捶牀助談屑秉燭聽未既衆客不敢譁懾此河朔氣座無楊開府娓娓當誰為贈隱叟比比人稱馬少遊此生鄉里信沈浮東平格語善最樂闕老家風貧不憂白戰雪中詩敵手黑甜夢外酒扶頭子孫富貴曾無望只囑吾書仔細收贈史癡翁我昔聞癡翁已及三十年不知翁為人名癡胡其然癡本性不慧朦朣百不便今年闔閭城握手在市㕓角巾摺軟羅腰帶敝帛纒短屨草獵獵長袖雲翩翩溫慰未通語輒歌沈醉篇拉翁黃公罏買酒醉聖賢却杯不事飲莫與癡為緣我謂癡所發必恃酒為權無酒癡不成癡酒不可偏云癡豈假酒假酒癡不全我癡抱混沌七竅莫我穿若謂酒使我良馬亦俟鞭人以黠教我我自信癡蟬人以嗤我畫我畫師癡虔手探夾袋中出具置我前水墨乃從事慘淡開雲煙大幅及小幅紙影彌山川圖成贅言句草次亦及玄市上諸小兒驚駭謂之仙清虛結簪衲鶯花亦留連要去不掉頭急急箭脫弦無慕豪富門腳版如鐵堅此翁所以癡以故囊無錢於人有雌黃常在口角邊於人有孝義記注一大編此翁不癡者人焉得知焉吳人多癡呆翁豈吳人傳翁云我吳産此病知莫痊我生逮八旬落魄如風顚不知人所毁亦不求人憐種竹欲借地買書常賣田蓬蓬被白髮咄咄書青天我顚與翁癡癡顚相比肩約為老兄弟逍遙覔彭錢僧道老僧精舍沿街似離城一爐柏子送經聲間因纍少身俱懶老覺心空死亦輕蕉葉大宜秋雨淨竹梢底愛晚雲橫尋常見客先稱病只坐匡牀無送迎丹僧深目流光口帶髭梵書真訣鎮相隨茅山道士燒丹伴天竺先生授記師毛製㲲袍寒日著𩕳裝金碗食時持遊蹤又逐間雲去滄海重來未有期贈源上人苾芻聞香十年已嘗有寄緘烏有裏秪從人家誦卷軸千里何殊相晤語雲萍蹤迹不可呼眼外之人疑老矣今年秋暑我牀榻脾病困頓未能理黃昏短刺墮枕前不倩人扶攬衣起吹燈相照見瘦玉人與清詩正堪擬僧中此老古或有超然已覺今維此翻經石上月紛紛半是微哦細吟耳我持此癖七十年滿地江湖俟知己傳杯夜屋破蚊蚋且略無生談賦比杭州官府尚多賢當面參寥惜無與腳縢之下自有地不作窗蜂苦鑽紙斯文有契屬老境頻往頻來自伊始白頭接膝無百年人生嵗月如流水答僧求畫參方歸去草鞋穿老屋清齋省舊緣千里絶雲行腳債一單安月在家禪蕉留庭户因供字筍熟園林不賣錢何苦要儂粗水墨此心猶落妄塵邊和錤古田韻昨晚溪頭月色纎老僧相見且和南算春已及一百五問老今慙七十三桑户日長蠶足食竹堂風暖燕交談茶粗酒濁無清供竒石銅盤也自堪和僎公韻詩僧隨分住市搆且三間比屋地俱俗隔簾人自間道同潭性徹法化石頭頑吟思充行腳時時出世寰和嘉本初夜泊楓橋韻風流張繼憶當年一夜留題百世傳橋帶人家斜倚寺月籠沙水淡生煙火知漁子仍村外舟載詩僧又客邊我愧不能同此宿却因新韻偶聯篇趙頭陀山住忘入年衆慮攝一定氣味漸木石久久同心性面瘠疑飢成肌澤匪浣淨覆髮短及耳鬍槎黑紛徑邇來訪人寰迹若無塵境半跏就長衝目瞪神亦凝過旅詰何修百語罔有應中露詫莫偃尚見雪霜更動偶不知動靜至不覺靜譬觀鏡中影出入何害鏡施食信酒肉大啜蔑羡剩投貨略不顧千金等破甑謂仙人莫究云佛誰敢證塊然天地間造化莫命令題芭蕉贈僧山僧心與迹俱間未限居山及出山長對芭蕉間不過時留一偈葉中間方水雲過竹居翩然學仙子浮遊大江東落落三年間始喜一再逢皎皎衣白葛峩峩戴芙蓉造我修竹下自開牀頭甕叶笑歌杯酌次揚聲動泠風勸我事至道玄默與天通欲學知不易衰顔無故紅明朝返笙鶴無方追往蹤方道士還冶城僧順嘗有言惠不在天上但行即須到此氣何勇壯水雲黃冠流詩酒發清曠十年落東海故國隔西望亦云自不歸要去誰我障配順足有餘天地納豪放今日金昌亭風緊秋葉蕩留亦無不從去亦無所悵吸我白玉鍾仰面月相向酣歌一掉首雲鸞渺仙仗全真道人碧色襴衫雪色鬚山林城市迹何拘標清自認身如鶴步捷人疑舄是鳬挂搭煙霞詩夾袋浮遊雲水藥葫蘆長生脣舌誇能事不敢輕傳恐涉誣還俗尼婆夷本欠佛因緣無奈心香起業煙衆散珠林還火宅官收寶地作民廛菩提舊念慈雲滅歡喜佳期好月圓清淨池中生愛水從今都長並頭蓮寶林褧師八十定裏何曾記嵗華萬緣空是夀生涯千峯健步無笻竹一鉢加餐有飯麻心似青蓮藏般若眼將秋月照楞伽問師歷臘今多少不欲通人道喫茶黃道士醉死汝師緣醉死汝死亦師如墳借糟丘築碑將酒德書足跳跌後跛面漲疸時虛化去不留影吾詩真寫渠西山老僧老抱清齋太瘦生雪眉霜鬢使人驚遊僧久住同衣食畜鶴長隨識性情土􅀈逼牀身暖活紙窗烘日眼晶明此心應與山俱靜不是深山養不成寄金白菴白草茨菴白葛衣白頭懶剃雪根稀子孫登録俱天上獨掃青山待客歸一箇蒲團一老身蓮心清淨不知塵更將蓮舌話生滅點斷冥冥過世人題僧化緣疏忙忙展枕逐雞棲洗面忙忙雞又啼傀儡不知提處假髑髏方信活時迷身如革鞠無多氣墳認饅頭却是泥儘積萬金難買命依然一箇死闍黎雨中訪白菴金公雨戶無人應客撾自遮明眼把楞伽嵗年漫度不知臘天地無方何問家鴨腳樹髙生茗果虎鬚蒲久發仙花一畨相見一難得莫怪趙州頻喚茶尋僧不遇幽蹊漫石水縱橫逺見孤雲與塔平特抱琴來僧已出欲因山佇鶴先行交鳴野鳥嘲風暖亂發林花趂雨晴墻壁淋漓題墨遍詩成懶得更留名燒丹道人真不能全道強名東鉛西汞詫煎烹癡人夢被黃金惑浮世忙因白日生敝屨市㕓雙草健破冠塵土一瓜橫欺心玩弄神仙術欺到死時心始平石田詩選卷四
