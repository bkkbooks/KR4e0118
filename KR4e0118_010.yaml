body:
  text: 石田詩選巻十明沈周撰咏物喻席組織文章七尺身庚庚烟縷碧菅新放開儘自有安地巻動如何又信人舍者相争昧容德管生因割墮偏塵只隨野老高眠穩紙帳藜牀且任貧雕牙杖頭歌象齒截玉三寸强刻劃老彭精不爽垂手僂背顱頂光笑顔半破脣吻張墜胷有乳長兩囊握之久矣溜而黃杖頭兀置竿戲較彼井觀殊失常蔣生贈我意則良假其久視祝夀昌一步一舉無敢忘與鏗相生八百霜登山臨水吾何妨燈花小草引炎莖來依三尺檠芳菲媚長夜煨燼剰孤榮煤在容占喜書臨借發明自家膏馥在渾不藉春生綿花蘤含紫附簇雪藴碧鈴深小草存衣被長人誰此心咏簾誰放春雲下曲瓊一重薄隔萬重情珠光蕩日春如夢瑣影通風笑有聲外面令人倍惆悵裡邊容眼自分明知無縁分難輕入敢與楊花燕子争混堂混堂鳴板日初紅懐垢人人向此中君子欲修除祓事小夫翻習裸裎風未能潔己嗟先亂亦復隨波惜衆同慚德應多汗難濯不容便論水無功魚􅼣經烟緯雨碧玲瓏碌碌微軀逐釣翁蝦蟹有緘容括納鯤鯨無計可牢籠初心未許蔑心得不佞何慚祝姓同骨格自知君子器一時落賺小為功石鼎惟爾宜烹我服從渾然玉斵謝金鎔廣唇呿哆寧無合枵腹彭亨自有容味在何妨人染指餗存還媿母尸饔老夫飽飯需茶次笑㸔其間水火攻白燕和袁海潛韻素姿驚眼舊全非百姓尋常識者稀向月似㸔雙練去開簾疑放一鷴歸知飡雪液通僊骨解剪霓綃作舞衣定是阿嬌釵上玉郤來金屋化雙飛螢火閃閃熒熒無定居隨風星散滿郊墟空名何補昏黃際末照聊承腐爛餘隂類濫明如火冷小流乗隙怪窓虗自憐老眼模糊甚縱著囊盛已廢書人影身外觀身託我成我初生日汝同生謂無亦有終無實假有如無强有名夜壁漫隨燈慘淡曉窓偏屬鏡分明算來惟與鰥夫稱老去猶堪作伴行破焦翻手青青覆手黃也隨人事作炎凉臨闌黙黙低頭月滿眼蕭蕭敗興霜舞袖郎當官妓老田衣顛倒醉僧狂明年㸔受春風寵醉墨重題展賀章楊花二首撲面吹衣雪㸃晴亂紛紛地亞夫營借風為力終無頼與水何縁却託生㸔雀啅金新蘂破愛蜂撩玉小團輕踏謌女子空連臂喚不歸來信薄情恃何顔色漫狂顛雖取花名未敢憐寒士衣裳思挾纊相公簾幕欲漫天吹嘘不起春泥上撩亂無端老鬢邊一種當門小兒子傍風因日弄輕圓詠磨盤盤軋軋更重重功用宜人天下從兩象合來分動静一心存處得中庸兼収瑣屑才無棄不擇麄粱德有容莫道頑身老難運運時還解饗千鍾詠苧頭餅檾萌方長折作餌糈相仍香劑圓從範青膏軟出蒸女工虗鄭縞士宴奪唐綾我有傷生感臨餐獨不勝送門神抱關憔悴兩疲兵衆欲麾之我漫榮檢爾功名惟故紙傍誰門户有長情㦸悲雨迹銷殘畫鍪頼蟲絲戀絶纓莫向新郎訴恩怨明年今夜自分明詠錢五首箇許微軀萬事任似泉流動利源深平章市物無偏價泛濫兒童有愛心一飽莫充輸白粟五財同用愧黃金可憐别號為賕賂多少英雄就此沈匾匾團團銅作胎能貧能富亦神哉有堪使鬼原非謬無任呼兄亦不來緫爾苞苴莫漫臭終然撲滿要遭搥寒儒也辦生涯地四壁春苔緑萬枚輕形薄質具隂陽乏足能行乏翅翔聚散本由冥數定有無何著老夫忙一緡牽慾人人逐四字編年代代詳昨日賣文留短陌免教愚虜誚空囊存亡未了復亡存慾火難燒此利根生化有涯真子母圓方為象小乾坤指揮悉聽何須耳患難能排豈藉言自笑白頭窮措大不妨明月夜開門三老雖誇濟世才亦能為福亦為災舉枚慧眼觀窮逹具片虚心攝去來數减至三無足陌銖輕惟五尚稱財祇除義士并廉吏萬貫填門不易開大樗材氣俱偏性亦偏偶乗雨露覺喬然參天無象鸞凰逺借日為隂燕雀便只好沉溝終作斷不應當路久妨賢蹶之可宥曽非楮且把功名付爨煙盆水映日圓影上簷可愛而賦盆漪陽采合晶熒圓見簷牙倒影明剛就一圈包太極類從六觀究無生照來虗室心光現印入空梁月相成且信茅茨藏白璧尚期知者論連城雪鶴何年白鶴遼東去雪影翩翩喚不歸少保畫圖殘粉在令威城郭故人非瑤臺夜色迷丹頂珠樹春寒失縞衣塵海别來三萬日碧雲迢逓憶高飛雜咏書牀屏譬筭一百年三萬六千日人莫筭其夜數亦與日一日夜循大環吾身處環中日作夜以息補作在息功致息乃有牀有牀息有位休休一奠枕夢見無懐氏長安桃李花長安桃李花下有萬人行人人各有役一人牽一情孜孜彼因利汲汲此為名相逢不相通飛塵暗春城白日夜還曉青春歇復榮黑髪倐皓首絶迹迨無生少年吟氣血駕少年作事躁鮮謀任情毎敗度惘惘無省修歲月自推移礱世若一磨與人礱氣血和平始寡過人智發多歴禽性馴久籠甫及造就時乃知歲月功枕頭曲少女重青鬢膏掠不停手臨鏡時再三呼人問妍醜西家有寡妻日日待白首門前有垂楊門前有垂楊枝葉何靡靡飄花欲及地忽復因風起搖蕩少婦心天涯念遊子愁多肌肉消不敢臨流水風吹枝上花風吹枝上花嫣然發春紅吹落忽在地利害同一風妾初託君愛謂妾如花容容在愛先弛不能保其終妾願化為金亦願化為石堅久保君心貞固保君德百年在恩愛莫以妾顔色暗紡詞貧家紡婦夜妨紗無油㸃火暗搖車紡多手熟不勞力眼雖不見手明白車搖搖兮夜迢迢今夜不作無明朝來圖織布且換米早粥在鍋渾舍喜冨家燒蠟滿堂紅彈絲調竹喧春風紡車嘈嘈只隔壁苦樂兩聲何不同扊扅歌折扊扅搤伏雌是妾與君相别時鳳為炰桂為炊君方宴樂妾正悲百里奚知不知昭君怨和沈工侍韻分入深宫無出時單于今日見蛾眉干戈信仗蛾眉息甘讓他人買畫師仕女圖魫薄窓虛日映樓杏花風蕩玉簾鈎手擎粧盒偷微笑紅脚蛛絲在上頭棄婦吟白頭吟後我重吟海水何如我恨深外面笙歌裏邊淚一家恩怨兩人心雙鴛沙暖春全透孤雁霜寒月半沈毁却鸞釵休認火不知長舌解銷金思逺露下芳草歇寒氣薄重幃幽處心獨驚行念君子衣君子别旣久嗣音亦已稀愁來不成織空對流黃機揮淚如泉水明燭無光輝有所思人生何以悲悲在生别離音塵無通日相見當何時夜風吹林柯誤君來庭墀逹旦耿未寐因之有所思薄命妾婦人原附人以貎結君子願言百年内相生復相死宛宛梁間燕雙雙同一壘一朝顧新歡分飛别離此新歡如新花比妾真可憐君本不棄妾自無長少年盒子㑹辭有序南京舊院有色業俱優者或二十三十姓結為手帕姊妹毎上節以春檠巧具殽核相賽名盒子㑹凡得竒品為勝輸者罰酒酌勝者中有所私亦來挾金助㑹厭厭夜飲彌月而止席間設燈張樂各出其技能賦此以識京城樂事也平樂燈宵閙如沸燈火烘春笑聲内盒奩來徃鬬芳鄰手帕綢繆通姊妹東家西家百絡盛粧殽釘核春滿檠豹胎間挾鰉氷脆烏攬分攙椰玉生不論多同較竒有品裏輸無例陪酒呈絲逞竹㑹心歡襃鈔禆金走情友閧堂一月自春風酒香人語百花中一般桃李三千户亦有愁人隔墻住鄉有富子費盡至行乞賦此以戒暴殄不守先業者蒼毛盧面走䞭䞭破練秋風裹凍鶉今日泥塗眼前事少年謌舞夢中人口餐未卜墦無祭户税猶存柘已薪寄與富兒休暴殄儉如良藥可醫貧迎新送舊曲鼉鼓擊龍笛吹阿婆接寶新人來新人來舊人去迎新送舊門前路門前路有曲直門前樹有短長傍人未説新人彊新人繡羅鬱金香舊人練布秋風凉初將生死託末路受盡糟糠還下堂下堂畏踏來時路啼鳥飛花撩斷腸鳥啼怪道呼姑惡花飛怪道似郎狂寄語新人保恩愛三年五年當見郎棄婦辭棄婦下堂去六親盡彷徨棄婦無所棄棄之家不祥憶初來嫁時惟家以為慶叶搰搰理亂絲為君事流黃札札把長線為君補衣裳雖勞不敢辭雖工不敢揚竭力奉君歡羣小亦莫容叶君心豈不諒背憎由舌長黃金亦銷鑠禮義安足防去去出君門落日照大荒輻脱難復行絃絶難更張事乖理當去但念未分明叶割皮以為紙瀝血以為漿前書柏舟篇後書緑衣章進君期為悟視聽付茫茫復書於太空願助日月光萬古麗元氣上下流無方倘或淪君心他時省糟糠王明妃妾顔美如花正可事和親宫中勝花者留為君側人君王欲偃武賤妾豈惜身揚揚雙蛾眉萬里掃胡塵將軍嘆白髪翹首空麒麟功當賞畫師重在畫不真諷久客宛丘擊鼓滯歸人酒盞花枝日日新千里鹽資方責楚十年繒筭未収秦關臨落月鷄催夢路逆西風馬避塵鄉信悠悠不堪寄深閨愁絶雁聲春北邙行北邙山下哭聲苦洛陽城中沸歌舞昨日歌舞城中人今日凄凉山下土山下土無今古白狐寒嘯髑髏烟青燐夜灼蓬科雨英雄異代不知名高封大樹如掌平䘮車轔轔日不絶後人來葬前人穴後來葬者還更多可憐歌舞何日歇長干行與郎同在長干住自小相逢不相忌郎騎竹馬到儂家當著爹娘與郎戲不道如今却嫁郎葡萄錦被合懽牀處郎不久郎作客去年五月下三湘三湘一去無消息蛺蝶雙飛烟草碧春夢依稀蘭渚東覺來愁殺石尤風將進酒君不見人生百年駒過隙何况人生不滿百又不見來世不可待徃世不可追百年三萬六千日日日爛醉君何辭天公那得私人物頭上不可掃白髪所以知章眼落井底花太白手捉江中月金蓮畫炬飛碧烟趙女起舞踏四筵主人勸客連夜飲似恐明朝非少年新豐酒槽滴紅露十千一斗亦有數為君典郤紫綺裘不惜更脫珊瑚鈎門前楊花如水流入來愁人風滿樓將進酒開君愁煑石歌君不見太山之磷可液飲符陵之砂可粒食天與道人作芻豢故有五母及八石雲根初截如截肪大拳小拳皆餱糧湘以𤣥水漬天漿火中三伏芙蓉香青山落庖厨謫星泣鍋釡道人饑腹如漏天五色一補齊天年道人之術許我傳我為道人開石田三五七言君不來來何時三年一書札萬里獨相思瑤芳滿把憑誰寄明月傷情只自知樹下獨坐梳嬾只被髪逍遙惟任真清朝坐茂樹好鳥鳴芳春樂意偶關物天機難語人將詩欲描冩腐爛不能神過都廷襄新居春曉春郊作伴行新居新酒故人迎弱雲妬日雨作意細柳偃墻風與情田畷分岐來宅逺漁濂合水逼厨清閉門教子無他事市不聞喧書有聲自慰辭有序余躋於老境涉憂歴患日弗能堪乃為辭歌以自慰命為自慰辭復繪清逸之圖系書之掲壁間對之則悠然之懐頓然而生不自知其溺世慮中也念曜輪之迅邁若駕余而同馳省孩提之猶昨尋衰醜之䀜斯憫㣲生之有限樂何少而多悲䘮亡疢疾沓憂虞之藂己奚氣血之堪持世汶汶而曷超時冉冉而莫追事徃徃而革變不常理瞢瞢而吉凶難必吉自吝而變凶凶自悔而化吉禍福循環得得失失惟吾人者迨老無少迨死無還不如草木之有消息獨優得於一氣之間凖亭毒之無私何偏頗於義而錮頑紛不齊之不可以度絜又玩夀夭而倒跖顔無乃匿智窅冥使人不得窺其姦已乎哉撟廣可以開隘發笑可以破患引壺觴以杼懐寄嘯咏於高閒或跂石而孤坐或振策以清般鳥飛鳴而媵余盼芳條之可攀悠然臨水暢然登山信造物之逆順更惘惘而長嘆人影愛欲揮杯勸其情有倡隨無違起居地尚保死生期明月成三處清波化百時冥然通契誼曽莫假言辭詠醉翁牀酒後要息嬾假牀其製新安排醉鄉具康濟老夫身兼坐尚似倚半眠尤可人山公不解此倒載馬蹄塵石田詩選巻十
