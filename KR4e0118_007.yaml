body:
  text: 石田詩選巻七明沈周撰投贈寄答附贈徐遵誨和劉邦彦韻四首祖宗原自有髙勲少小豪雄藐冠軍竹裏行厨青玉案酒邉官妓茜紅裙洛陽紙貴三都出夔府沙平八陣分頭白歸来惟感慨却慚多病負眀君不徒説劍與談兵况是文章動兩京屢欲上書勤漢室時教捫舌易齊城帆檣逺雁江開楚衾枕清猿路入荆落落長遊半天下不知歸計㡬時成細雨春帆破曉開更添新酒事深盃他鄉夢寐鴻于陸故國詩篇鳯有臺白髮不歸花亦笑青山急去鳥仍催公侯復始君須記李廣原非是死灰斷蓬逐逐未能休搔首西風又莫秋曲折舊袍存蜀繡蕭條空室去吳鈎虚名落枕邯鄲夢濁酒澆胷磊磈愁莫謂尋常種𤓰者東陵曽是舊封侯因病不預纂修之徴用呈館中諸公纂局冠裳濟濟然白頭多病後諸賢聖功大滿先皇紀庶政分參列國編老頴何能出毛遂後堂今合譲彭宣夜来夢秉江淹筆猶在鸞停鵠􅀈邊寄沈工侍時暘烏紗兀兀鬢蒼浪物表逍遥嵗月長林壑清虚流笑語雲霞縹渺入衣裳新開元圃長春地舊是丹丘不死鄉還却朝廷有餘禄閒慿詩酒傲人忙董良富舟溺有贈君從古潤来飄風簸舟楫長年易波浪船底翻落葉君時至濡首衣裳亦厭浥故人多附遺種種寓沉篋拆書欲尋讀紙糜悶膠摺瓶罍作顛倒餘瀝水相浹州潤名不祥於君有沾濕叶三日始獲見驚定語尚讋呼酒澆惡懐累觴迨稠疊出門多畏途後進宜慎渉謝李宗淵見訪中路有阻斯文乆矣熟芳名書到還知鄭重情風雨妬人三日惡江湖負子一舟横聞来無見新翻案興盡而回古有行筋力未衰扶可拜荆溪展報已非生戲友人尋訪不出兩山不見雲遮眼一犬獨鳴花遶隣敢去揮毫題午字悔將握髮望時人牆匡寂寂髙槐雨門巷青青細草春知子南還猶有興扁舟斜日弄芳蘋喜施知州煥伯致政乞身章上笑顔開未信吴人果自獃孫冕怕教差致事陶潜真要賦歸来松杉野寺滕滕杖蔬果隣家草草杯山水常年舊遊伴髙吟清嘯有追陪和沈文甫儀賔所寄清虚堂韻詩湖南有洲金作沙國賓翼翼開新衙草堂疊嶂都尉晝名園爛錦楊妃花不矜富貴念貧賤珠唾逺落寒翁家白頭老拙後生鄙語言可惡還如鴉如何泛愛使我悚其意過借其辭葩知因宗誼漫好好痛癢豈藉他搔爬我家豚犬皆碌碌懲彼不學胷徒撾尊翁有是子有是健羨不足還成嗟天南引睇數千里飛鳥滅沒空雲霞寄夏大理季爵鐘鼎白髮外山林遂遲暮任懐道屈伸玩世雲去住乆視天地間百歳在跬歩文章亦夀物垂後永無度眀州山水佳逍遙得真寓清川入漁釣髙屋䕃嘉樹可望不可即瞻戀存寐寤寄祝惟楨容徳乆契濶南雲如逺人每懐依孝友獨恨失比隣子弟詩書澤桑麻門户春樂哉無一慮健在有雙親恐禄未充養歸来耕有莘贈黄撝之相逢野寺及春殘各各蒼顔説見難嵗月易流嗟物變功名已過覺心寛梨花月枕詩通夢楊栁風杯酒起瀾想得金陵山水地自知行樂勝為官薛堯卿場中巻短䇿長莫録被枉黜崢嶸老氣軼長虹傲睨三千鵠士中豈爾門監知李廣慿誰榜帖為司空徘徊鵬鳯風斯下漫衍魚龍紙易窮把鏡時時照鬚鬢怕教愁雪㸃青銅寄别李知州走幣飛箋百里情白頭扶病亦須行江湖借石安鴻漸鐘鼔當筵愧鹿鳴薄海春風動韋布滿堂華月照簮纓扁舟莫怪從宵邁念在庭闈告不成宿城西懐冷菴水宿其如夜思何霜風拂鬢影皤皤語喧盃酒商船近人映樓臺市火多川上㣲波揺缺月城頭髙樹掛眀河新篇在稿思君教無那無眠只漫哦九日小酌席上贈張碧溪人生重相知正在氣誼同蹤跡苦遼邈千里念竒逢今日登髙日有酒無菊叢有無不在物斯人吾眼中撫杯叙綢繆攬鬚感霜蓬嗟哉南海濶息老垂天鵬叶亢志墮迂逺末路迷英雄兩耳醉發熱浩蕩傾心胷懐䇿六十年不肯委無庸憂時切空言嫉邪改欣容不平首民政次第及兵戎萬理酌得失萬事區私公四座寂不譁但聴聲鳴鐘白衣照山林竊比廊廟功誰能述成編藏於山之空後人知子雲其道亦不窮勸君再飲酒長嘯延天風速楊君謙石田記山中有白石廣衍得數畝堅瘠不可耕無用實類某朋從從加稱遂為石田叟稱者非譽辭我亦甘其受楊子許為記其言食已乆徃徃人家見篇篇燦星斗一見一熱中意子獨我負札劍表心許何况曽出口得非以陋物不足辱録取碑有紀封禪鼔有示獵狩於此逆觀文或可假石夀子文侔漢史其傳信無朽脫使不多作難保嵗月後恃子猶洪鐘應隨大小扣不應似生吝吝生虧所厚吾石能作言將以子歸咎不聞詩所載草木備羣醜不信石終遺不遭㸃金手遑遑日翹佇拜嘉亦當有寄錢允言雖是經年别尋常見好詩湖南與湖北相望即相思楊栁青霞館芙蓉碧玉池乾坤知佚老㣲詠間清巵寄桑通判驅馳一倅厭為州歸就髙閒未白頭竹箧理詩春草亂槽牀聽酒夜泉流農桑舊課今家事山水清談昔宦遊因愛兩湖風月好近時知買木蘭舟奉寄大冢宰三原王公喜見温公載相時衷心如日鬢如絲謙辭髙爵身稱老優免常朝帝曰私瞰鬼樓臺無地起質神章疏有天知酌量氣化人瞻斗平凖安危國倚蓍富貴焜煌看玉帶功名登載託金彛超賢拔俊休遺力扶植昇平此是基戲人短視朱子阿堵中光晦視昏沈秖坐醉翁短初非五色淫只消理肝木未須刮箆金睇逺野常霧瞻晴天乆隂逢人昧真面而從言語尋欲比亢倉子誤名觀世音其疾止眊焉豈廢聾與瘖體具聊乖用譬如不調琴一向甘懵懂青白非所任把巻睫著字具服倒捉衿對酒妄告止既灧徒拒斟出門皆通衢長迷蒼耳林平生絶騎馬惴惴在臨深尚有能為者千首日細吟我知子不晦其眀在諸心懐張允成表弟歉嵗逋租力莫償一家十口趂流亡小兒膽大輕官事老者年衰重故鄉落蘀西風何處迹啼螿寒雨㡬逥腸封書欲寄愁難達空倚江干數雁行文宗儒在告功名大慾淵取之無一足朝廷曷忌吝賢達豈盡禄投林先機鳥清晝託昏宿親知唁早計風雨顧茆屋關門待白髮嵗月在松竹逍遥風塵表昨夢破榮辱尚有舊藏書坐課諸子讀金陵約史眀古不至仙舟望不到元都近信虚傳過太湖如此江山空舊約可勝風雨有長途燈前白髮棊聲在地上碧桃花事無春已䦨珊人尚逺幽禽何苦喚提壺賀劉徳賢冠帶富貴侵人五十三烏紗頭上忽巖巖館甥上夀裝新帶鄉友通書署散銜諠竹滿堂鶯宛宛飛花撲酒燕喃喃嗟予白髮巾都折燕賀深盃到老饞贈范希敏膂力衰来背槖駝只於隣並嬾經過算年已覺同生少畏死頻嗟去日多蜾蠃螟蛉假親戚烏鳶螻蟻後干戈于今丁役都無累輭飽三盃或自歌贈都良玉鄉里同生夀及耆少年筆硯復同師丹山碧水行歌地春煖秋凉醉飽時樂在太平須要饗事於分外莫求知放舟今日西谿上不問衰强比白髭慰人受侮先生無喜亦無嗔黙黙熈熈滿抱春已辦恕心何忤物儘能虚已自容人卧慿髙枕欺江雨醉把深盃納世塵向晚不知花在地開門一笑墮頭巾謝庭新秀詠芝祝西厓先生生子南岳昭竒産眀時迹亦超地成靈宿孕天與福何儌名重芻蕘識貞非草木妖文敷華蓋殿柄用紫宸朝衍玉家承慶髙霞代作標仁支㸔禪續和氣屬薫陶徴桂思燕竇如蓂應帝堯按圖他日事祝願且歌謡奉寄王冢宰萬事浮雲在目前先生拂袖似神仙餘畱後禄宜諸子分付髙年屬老天亦有邵窩容說講公退歸設講西園曽無范契盡還田公以子買田千畝盡令贖去滿腔樂地春如海元愷中間第一賢聞楊君謙致政賦此以致健羨十五首當場拂袖便南行一著孤髙更覺清初擬熱官移教授思量猶自累瓢聲春官司署儘能閒猶道勞形與病關身在早朝霜馬上青青殘夢是吳山江南㣲雨杏花春一箇漁舟載病身莫信歸来示無用釣竿斜日弄絲綸功名出處異於人染指初頭便乞身人自誚渠渠自足了官歸奉黒頭親神武髙冠掛急流老人之事少年謀江南四百八十寺處處磨碑待記遊到手功名賦子虛深山長谷覔安居讀書已足功名事更讀人間未讀書文章的作大家傳萬變風雲筆有權要覔大山藏小史東華香土斷無縁茫茫仕隠不同風進退惟人自折衷雁宕村前梅雨裏低頭畦菜是英雄秋空歸鶴楚雲髙白晳青山白苧袍多少玉堂金馬客待抽身得已霜毛乞閒不與少年宜領得天恩又較遲忙要著書容補世君王㑹有詔行時新製銀盃興亦豪判將榮辱付陶陶春風觀樹軒前酒不醉元都觀裏桃都門祖帳百花飛多見龍鍾賦式㣲較取栁條千萬折不曽送一少年歸臨岐冠蓋酒淋漓巻軸通朝滿贈詩當是别翻常案子千人描畫一人歸寤在鐘鳴漏盡前恩波特縱五湖船君王自要成㢘退陳乞原非例引年碧山勾引歩如飛少日知閒古亦稀只有馮良年頗似又非曽惱督郵歸寄王尚文大參逢人毎毎問康寧地逺何由一寄聲仕已無心聊翫世棲遲有宅尚依京栁邊細水閒臨鶴花下深盃獨送鶯似此逍遥知不老百年詩酒是長生與王優髙歌宛轉送新聲腔愛頻移酒漫傾著水遊絲風趠起過牆花影月扶行正須陶寫當吾老更為慇懃柰爾情可惜相逢牡丹後栁邊聊倩答鶯聲喜吳吉甫及第吉甫吉甫羇孤子乾坤浮生漫無止丱髫饑渇誰與謀黄金陵前哭親死破褐猶知裹父書借讀空山月中字江邉古寺夜摸碑心記舌翻朝若水聰眀過人道豈窮天將與泰先之否甲子髙科談笑間亦有神人開夢語當今天子聖且眀賢俊乘時思崛起摶風希鳥天九萬試足神駒日千里老翁患難窮茍活且頓煩憂為君喜君不見人間貧賤富貴基范相蘇卿乃如此贈沈以節粉奩塵滿硯池枯且欵清談事酒壺好客諸侯何處有通財知已近時無芭蕉夜雪䦨新興蛺蝶春風巻舊圖念我平生釣竿手扁舟特為寫江湖蜀道兵興聞徐遵誨徃尋舊業烽火西川萬里餘扁舟此别意何如衰遲自可加餐飯離亂無由數寄書江上羇愁衣帶緩鏡中勲業鬢毛疎秋来無那多風雨遥憶成都舊草廬贈海上劉將軍少年儒將有髙名說劍談經四座傾乆處幕賓能草檄舊隨童子盡知兵月連夜火沙邊􅕤潮挾秋笳海上城聞說逺人歸聖化欲銷金甲事春耕奉和陶菴世父留題有竹别業韻六首舊宅西来無一里别成農屋傍長川真堪習静如方外雖可為家尚客邊賃地旋添栽秫壟鑿池新滀漚麻泉北窻最愛虞山色也似香爐生紫烟散髮休休依灌木洗心黙黙對清川一春富貴山花裏終日笙歌野鳥邉聊可幽居除風雨還勞長者訪林泉畱題尚在庭前竹淡墨淋漓帶碧烟糲飯麄衣常自足猶勝杜甫客西川老妻課佛清齋裏㓜女鳴機夜火邊㡬樹凉雲散髙葉一溪眀月瀉寒泉寂寥草座無人伴自起添香看篆烟人愛吾廬吾亦愛秋原風物帶晴川蘭甘幽約宜階下竹助清虚要水邊只好䕃茅同背郭何須蓄石慕平泉苦吟自覺多新病華髪時籠煮藥烟比屋千竿見髙竹當門一曲抱清川鷗羣浩蕩飛江表䑕輩縱横到枕邉弱有添丁堪應户勤無阿對可知泉春来有喜將于耜自作朝雲與暮烟鶴毛鹿迹長交路荇葉蘋花亦滿川炙背毎臨簷日底曲肱時卧樹隂邉一區緑草半區荳屋上青山屋下泉如此風光貧亦樂不嫌幽僻少人烟慰吳水部徳徴䘮子水部先生哭仲兒深情未盡六篇詩涕洟苦苦成何益魂氣茫茫無不之滄海沉珠家失寳崐山借玉手書碑蘭芽在眼春仍好老力栽培發有時和徐伯仁抱膝偶成韻皂弄仙居未易尋惟聞抱膝有長吟人遐杜曲天仍近徑捷終南地不深閒漫安排種𤓰事老徒激切佩蘭心秋凉春暖悠然處風滿髙懐月滿襟羊亡已後不須尋妙語時時對酒吟江海浮沉鷗迹逺山林漂渺鳯巢深天違功用金誰礪道合行藏玉汝心千里相思各南北一春風雨入離襟聞謝閣老休致過蘇遥寄五十懸車事異常符階綸閣迥天光千秋國是黄金鑑一夜鄉心緑野堂漫賦祁招惟自止舊圖負扆敢云忘拔風後起梧桐樹四海還瞻老鳯凰鶻打雉贈陶將軍猿臂將軍臂黄鶻小隊蒐原笳鼔急驅叢迫薄草木驚野雉衝人馬前突漆眸側睇奮鈎脫控拳捩翅筋力遒雉欲逋飛膽先落犀爪攫顱如就縛看人喝采和千聲將軍厭鶻自摘生刳心剔肝錦毛破五色花袍腥血涴題號耕樂良家無外慕躬耕修隠徳庚庚東西畝宜禾更宜麥迹勞不自悔志靜乃云適茨茅荆溪滸清幽多水石西挹銅官秀右滙太湖碧林春鳥雀鳴鄰並戒作息和風拂田穉蕊蕊行復粒兒孫候歸来竹户燈火夕引觴漫沾醉偃息就北壁所得還自賀不敢忘帝力宜閒丘壑年来寄隠踪安眠飽食養龍鍾日由僮僕知生事家信兒孫理户傭題句園林選脩竹盼柯庭院愛孤松白頭多少忘歸客雪佩霜珂老未慵靜處坐對南山日自長且將一静掃浮忙身安嬾出誰能遣門設常關亦不妨秋水止潭心共静寒梅隔屋鼻參香未知乍暖初凉候可有閒踪下草堂鈍齋髙懐已足見平生利器如何假鈍名事不争先譲人做心無著急信天成夔憐躑躅寧忘歩鼈跛蹣跚亦有程如此遲遲吾自得青松看取雪中榮宜閒黄塵不是海特地為人深浮世有窮日勞生無止心從容一樽酒消散五絃琴會得其中趣悠悠萬慮沈且閒十載飛塵雙足黄誰知屋裏有滄浪靜時覺得忙時錯一日還如兩日長行遇好山須命酒坐因芳樹便移牀白頭短杖南塘路我欲来談華子忘遺齋風雲已外違髙翮草莽之中寄賤名江海固非長徃地乾坤聊寄不訾生烏羅禮廢人將老白醴恭衰我自平菜本𤓰苖雖瑣瑣栽培於物尚多情蝸殻為史廷直題不知小隠計如何蠻觸無争所樂多身外乾坤等虚殻窟中風月是行窩長牋舊稿詩黏壁癡筆新圖墨滿螺想得盤旋似盤谷白雲春夢有仙婆廷直有姬號白雲道人自寛縛齋如斗白茅茨安僅容身小不卑瞰鬼樓臺隣舎得藏蝸天地自家宜門前塵海一簾隔座上山圖萬里思居漏老夫求不媿與君談道有来期守莊十角黄牛五母雞知君舊業在雙溪寄人詩簡秋裁竹教子書燈夜照藜四畔無争田井井百夫戮力黍萋萋却憐杜甫頻移宅才住東村又瀼西拙齋靜者齋居惟抱拙機心機事笑人忙譲他好手誇修鳯顧世多岐敢問羊逕草不除門自僻林巢可掇鳥相忘老予亦是無能者築圃何妨住隔牆逸菴逸迹離城市分居雁鶩沙屋中人嬾散門外樹横斜名漏山公啟鄉當虞仲家梳頭下白雪把釣著烏紗風信北窻取月從東海賖交僧㑹櫻笋兒子托桑麻醉坐自横管春遊或命車鸕鷀安野竹蛺蝶選林花觀我還觀物其生豈有涯竹窻有竹之家亦有窻無人領竹竹難降凉櫺却暑風千挺碧扇推秋月一雙夢入籟聲方倚枕酒參葉色漫開缸知君神觀清於玉獨自翛然詩滿腔月航兩頭簫鼔遊眀月溯此清光拉柁開信我船中都載却從何水上又浮来南飛烏鵲驚鳴榜旁躍魚龍觸洗杯敗興笑他千里雪有人空去復空回聴竹城市豈堪聞瀟湘寄耳根此君如有語静者在髙軒靈玉自成韻清風不是諠心通正如洗眀月滿秋園可菊東籬不可桃與李只可秋来有菊枝要我將詩收爛漫勸君澆酒放淋漓平生金玉期成汝滿把芳香欲寄誰九日簮華白頭上風流何减少年時愛鶴平生結好惟鷗鳥彼此能閒兩不猜白日一沙秋夢穏碧江千里雪痕開慿誰作色因髙舉信我忘機復下来人欲相尋舊盟處釣竿新水夕陽臺夢鶴聴鶴仙人騎鶴去後人思鶴已㝠㝠九臯音響尚在夢百世子孫還姓丁露枕觸心秋欲警月軒滋淚夜初醒周公誰謂吾不復瘦影依稀風滿庭聴玉竹謂青琅玕其體本虚静風来假之鳴因聲乃生聴琮琤復琳琅環佩滿三徑㝠心齋中士聲耳兩相競縁聲知風端縁風知竹病要知竹有音不待風命令簫竽發天和中律雅而正心耕問心何可耕其地方寸耳何足展東作所劐當何似我試忖度之固非沮溺比曽莫事於鐵秉兹靈虚耜搰搰駕仁義役役闢詩禮多譲豈失段不舎亦猶仕積乆驗其成孝悌是穈芑象賢各穎秀無復有糠粃生生世所業子孫孫而子奢哉譲田者所得安敢擬醉雲長醉無醒日有似雲冥迷正頼無心公爛倒同如泥雲醉兩相忘渾渾抱天倪世上不飲者不能與物齊只可自怡悦勿諭劉伶妻市隠莫言嘉遯獨終南即此城中住亦甘浩蕩闕門心自静滑稽翫世估仍堪壺公溷世無人識周令移文好自慚酷愛林泉圖上見生嫌官府酒邉談經車過馬常無數掃地焚香日載三市脯不都供座客户傭還喜走丁男簷頭沐髮風初到樓角攤書月半含蝸壁雨深留篆看燕巢春暖忌僮探時来卜肆聽論易偶見隣家問養蠶為報山公休薦達只今雙鬢已毿毿湖南湖南盡是君家物今代風流賀季真青草扁舟落吾手白鷗萬里屬何人玻瓈倒見波心月翡翠平開雨裏春我唱竹枝三十首眀朝相約伴垂綸橋東橋東未與東橋異問訊何勞錦里翁剪取竹竿漁具足撥開荷葉酒船通獨臨秋水人揺月漫送清歌樹引風常笑西隣憂不足白頭心事竟誰同聽泉若人居城市以耳求聴泉泉不在城中山中乃涓涓終日未忘聴豈在耳根邉若以實境求此泉隔天淵要知泉在心心逺地則偏所謂希聲者無聴亦泠然守溪愛是雙溪故居好百年遺澤與人俱保雌大覺耼翁勝改姓直嫌栁子愚舊有一隈魚十頃新招六逸竹千株買書教子非無益菱角雞頭總入租西園為園多半是遊嬉傍宅西偏事事宜鯈尾趂花溪宛轉鶯聲隔葉樹參差地循五畝横分畛路遶三义曲作籬滿面夕陽人已醉還歌飛蓋舊遊詩樂野近習農功逺市譁一莊沙水别為家牆凹因避隣居竹圃熟多分路客𤓰白日簾櫳又新燕緑隂門户儘慈鴉我當數過非生者酒滿牀頭不待賖月谿月為大家物何獨此谿有千谿一谿月同光無薄厚惟是谿上人雅與月相偶君於此谿外他月能識否逍遥見在境此月隨所取叶低頭弄清華白璧落吾手尚呼酒酹之谿月我三友清谿小隠結廬城郭逺靜勝此谿邉鷗鷺分家住烟波入簟眠釣魚償酒劵賣藕補傭錢只隔斜陽岸經遊須倩船春江愛殺春江日夜流有人結屋住江頭門前釣石臨黄鶴牀下魚波洗白鷗未識何年變春酒且將吾道付滄洲天光月色溶溶地更好憑虚著小樓松谷幽尋仙地漫托隠飽啖神苓差勝葷樹老與人千嵗得山空無物兩崖分靜知夜半傳清籟虚愛春深納白雲掃却鳴騶不容迹日長惟有鶴為羣西川二首移家忽要離川東自信何須問卜翁七水大都如屋下一山小半入城中沙鮮近市柈多蛤海氣通村井或虹有片閒心無所作畫圖詩律兩争工西川風物新家處一畝之居半畝苔慮怕市喧忙避去便宜山近特移来芙蓉曲渚秋風動雁鶩長波夕照開我亦曽尋偏記得隔林髙有古書臺竹鶴為道士作道人種竹復養鶴鶴可看家竹䕶壇仙驥徃来天上下玉枝消息日平安風前掃葉碧雲亂月下鳴秋白露寒物外閒縁消不盡墮毛裁氅籜裁冠野鶴為地師作野鶴自得相白衣𤣥作裳竦身週宇宙舉首見圓方赤縣非凡地丹丘不死鄉人間好山水嵗月與誰長茶坡為劉長憲世熈作使君嗜茶如嗜酒渇肺沃須斛二斗官清無錢致團鳯有力自栽春五畝輕雷震地抽緑芽行歌試采香盈手世間口腹多累人日給時需喜家有還道通靈可入仙非惟却病仍資夀籠烟紗帽躬執㸑活火何堪托輿走題詩戲問滋味餘得似王濛及人否香谷惟蘭生谷中谷香自蘭生如鄉處君子遂稱君子鄉經云香界者因香界亦香願言固根柢雨露發天芳勿隨茅所化嵗乆安其常尚古此心何慕慕先賢不與時流作世縁天地忘機推華子詩書有道閱堯年深衣大帶人如玉喬樹髙雲宅似仙聞說虛堂閒素壁一圖太極日長懸題吳子潤育齋巻落地為男子思以成厥徳蒙象古有訓作善固可則念生敢忘養務學必求益詩書在長勤仁義服無斁欲造君子地涵濡匪朝夕雨至無槁苖藥至無留疾舉措先所存終身蔑差忒古山人事有動靜青山無古今髙秋落手板雅調合吾琴風雨付外物煙霞凝道心茫茫天壌内仁者是知音雪樵題金山僧惠鎧大江一箇黄金山大雪漫山變白玉山中琪樹斫作薪塞破寒寮十萬束屋中凍衲四大縮燒之不能溫手足却燒十日化為水開門一笑春江緑竹菴為毛太守題卓立曽知抱節君百年根柢渭川分羣居族屬不易地美質子孫皆有文移榻清臨冰簟月積書凉䕶玉籖雲揺環振珮琳琅處未許人間俗耳聞空舟為寳林寺僧題齋舫曽閒六一翁僧居臨水與舟同指舟為屋身浮世假屋名舟心太空就地掃雲天影上開門見月浪痕中我来把筆閒題壁白髮泠然兩鬢風曉窻為眀上人賦一個山窻漏幻塵櫺櫺白映紙痕新豈無夜半聞鐘者猶有天眀做夢人自闇闇中勞摸索到堂堂處弄精神我今更與作轉語推去關来總任真菜菴嗜淡原非食肉侯圃翁種此托珍羞霜根下筯兼糜爛雨葉堆盤薦齒柔買去固多求益者拔来應少為人謀世間至味君何識三九常充日不憂梅菴僧號老僧開箇嵗寒坊百樹梅花萬玉行色落空門空是色香成妙果妙聞香人無入處雲遮路夜不開窻月到牀他日大方參了義碎中求核也須忙南洲為華中天題湖水中央地可農龜蒙遊處有遺踪沙坪接畛田千畝玉溆通橋路㡬重凭雨䦨干閙荷葉跨波亭館夾芙蓉開門便有陽光入曝背觀書好過冬東滄卜居東住鳯麟洲四面玻璃覺屋浮日出不知天在水海空還借地為州鯨風拂釣珊瑚檻蜃月開簾翡翠樓聞與尊翁紀年嵗石堂曽下㡬莖籌謝答謝項郎中文祥寄筍脯浙雨溢山藪竹萌密無地土人饕頓頓腸胃當厭飫吾蘓少其祖數竿破俗藝有茁重兒孫豈敢屑盤筯知味聊耳耳僅免煮簀茹愛我愛日翁脯腊富裹寄蒸爚得火候法熟野衲治新鮮色莫黯纂纂玉縷脆烘日不過熯著鹽未多漬甞之清可珍喫棒元脩避余生本骨立滋瘦忘所忌客佳稍出供薦茗聊三四還笑湖州饞不管傷㓜稚聞君苦痰疾日食不妨嗜醫氏曽有說性可消膈滯能分固知羨推食感念至答眀公送椿芽山僧藜藿腸采拾窮野味靈芽漆園種新摘帶雨氣鹽蒸嫰緑愁日曝㣲紺瘁裹紙聊搤許珍重不多遺仍傳所食法且囑要精試兼烹必雙井水亦惠山二及云性益夀甫與昌陽比香甘流齒頬食過發吁嚱山僧苦薄相折此八千計本昧吾儒言方長仁者忌夢謝人授鹿角膠記莫全篇寤而足此毛龍頂上紅茸茁三尺珊瑚長仙蘖根貫神𩕳不可折扣中五音發清越農皇笑以金刀截骨解支分寸成節湘以𤣥水桑火爇七日鼎中緘鬼血天精地髓轉作闕補我玉堂温不熱試之匕許膏吻舌酥飴停調氣馥烈便爾小活亦大耋更三千年等一瞥謝程篁墩贈龍尾硯篁墩品硯歙居右雅稱先生翰墨手先生與硯俱歙産眉子羅紋誇富有櫝中種種自懐玉能割一愛到石叟自嫌隅處小有病臨出摩挲要難授我云先生豈無藥庸賁一銘如砭灸囅然捉筆從背書石上煌煌麗星斗頭巾折角與人傳此硯因銘名亦乆尚憐龍尾是奇材東坡何以嘲牛後謝宋承奉惠夀木鄙夫今年逾七旬無一用世人嫌嗔讀書不成愚固在耕田無收家益貧小兒造化苦翫弄浩蕩自謂無懐民何愁白髪不相放生死已譬晝夜循花前笑口㡬迴酒松下無言終古塵也憐狗馬有帷蓋安少一木藏吾身堂堂七尺我自玉烏鳶螻螘誰敢親青城古杉一千嵗天將為我留輪囷宋公借力翦寄逺鯨波萬里来猶神質如金石堅可珍其文糾紐膩且勻霞肪暈紫香觸手舁入草堂驚四隣自公好施發天性豈以菲薄當其仁鹿皮蒼璧殊未稱短篇聊訴吾為人謝孫世節惠藜杖孫子憫老蹇惠杖若無杖其輕猶握烟且喜不壓掌七尺多臃腫論重僅銖兩促節數三十還復有一長敢以照書燃獨任探梅徃暑雨地沮洳出逺歩堪强非惟借便健顛躓有所㐲何以謝記存小簡附拙響葛惟善嘗托人求虎跑泉詩附贈潘谷墨銅雀硯墨既不至硯亦云碎因謝此慚愧髙懐記項斯開緘空感十年私墨亡潘谷烟澌外硯破銅臺瓦裂時馬徳未忘千里惠虎泉終補一篇詩何當握手吴門笑共付浮沈與不知謝友人定正小詩數字手拆朱批笑滿腮㸔加簣土即崔巍妙辭信自我傳去後日安知子定来王儉云後世誰知子定吾文秋樹暎星疎采出夜江容月逺波開古人髙誼相成處風字千年重釣臺和計常熟惟中虞山雅集縣事頗清暇山椒成雅遊羣彦畢追隨君子信徽猷林搆級石登沿澗俯清流燕賞属邦君名勝况古州連峯横秀野重湖映清秋環列周郭郛棊錯衍田疇騁目念逺人鴻迹限南陬貴賤何忘分華篇承逺投宛宛粲白雪髙妙誠寡酬想當豪吟際鮮颷激岑樓繼火延落景憑欄攀斗牛興懐恥不及烟浪空長洲雨中過野翁荘訪彦清施先生不遇書此以寄野翁新築此山荘石子迴階引石梁滿地濕雲封夀塢隔牆髙樹比僧坊掃苔容我来題璧刻竹煩君補和章信與輞川風致合老須裴迪共壺觴與施北野小叙僧寓分曠屢年嵗造次臨客途驀然對面疑熟視各驚呼招邀叙僧寓草具聊市沽伸情發謬語紀興復小圖人生類雪鴻踪跡不可拘惜會仍惜别蕭然俱白鬚謝計桃源惠孔雀斃于途以尾至珍禽籠萬里未見意先叨飲啄違塵目文章剰俊毫重須論馬首輕敢喻鵞毛餘采賢郎得留形上繡袍答汪竹坡暑中問疾跬歩蓬門出未能秋来病骨轉崚嶒儘多年紀夀自足無好兒孫福不應藥物殘生隨楚老菜饘終日類齋僧惡懐酷暑何排遣逺水孤舟藉友朋送嵗歌謝宗道士鼔板打漁鼔唱道情説生說死説功名唱道情打漁鼔說神說仙説今古仙家自有山中樂凡家自有世間憂年頭年尾憂不休今夜又當年尾頭唱要髙鼔要急主勸賓酬忘拜揖蠟花爍爍白璧光酒波濯濯青袍濕客莫言辭主須醉多情送年恐不及年送去還復来漁鼔聲中白髪催白髪不可變莫放掌中盃鼔砰逄盃絡繹不知東方之既白舊年已盡客亦散門前又接新年客新年别唱賀新郎送舊迎新漁鼔忙送别送袁徳淳還太平閶門送别當新暑緑波芳草如南浦袁侯玉雪照離尊言貌温恭心獨古誰道今時無古人眼中之人仲山甫天球河圖東序物置之市肆豈其所太平作縣草創初務在民安心獨苦誠格山川及鬼神愛存父母無官府况於朋友急為義援我親䘮離淺土臨岐感激一何深黙黙捫心淚如雨與張東海别順便南安路朱旛刺史舟相逢驚白髮未到說黄州細雨傳盃落浮雲傍席流臨岐更揮翰不復有離憂别友青天一眀月白髮兩扁舟各舟載一月遂生離别愁眀月解隨人人去月不留豈月管送行今古長悠悠道路東復西行人㡬時休一月亦多忙千方相應酬舉手謝眀月浩歌過吳洲送程宫諭因乆雨為言者濫及去位車馬出春眀雨中人獨行人從今日去雨是㡬時晴靜閣一杯酒亂聞千樹鶯故山堪註易天意就先生送韓克賛兩月衾裯厭乆眠荷君惠問毎牀前頻煩藥物酬多病鄭重舟航動老年落木門牆秋水宅亂山城郭夕陽船扶笻起送迢迢目攬結餘情更小篇送程少詹赴召奉玦當春雨春風又賜環行藏吾道重寵辱此心閒六月鶱鵬息三年去鳯還宫詹循故秩陛棘認先班求舊從人望相懽動聖顔拜知髯拂地舞應口呼山撫已文章在重修袞闕間送都元敬赴史西村家塾黄溪雪後爛生光童冠迎船青佩長客子能行秘書監東家好是鄭公鄉春帷開講禽魚動夜觀鳴絃水月蒼賓主閒時還倡和吳江滿地緑新章和文太僕宗儒留别韻人生一離合中奈嵗月邁青春與白髮秖好増咤喟君子務乆要迹曠心匪懈請喻江中水澹泊味長在兹辰風雨横来鷁鈍莫快童子認舊徳殷勤㓗塵廨雨亦通人情收脚漸㣲洒顧我有老母將筐復加拜展燭話夙昔勝與生客對佐酒無兼味情留日須載雲天㸔君逺林壑信我晦清懽滿在眼萬事不須嘅别李昭秋深四日江村雨阻得行舟不得行燒燭添多夜窻語似天教雨作人情送都元敬赴試新科拔隠淪蓬藋不勝春經術必用世山林還有人九苞看舉鳯三浪促潜鱗仙桂凡千樹扳花要認真和天全翁留别錢氏祖席謝傅其如不起何畫船詩酒晏遊多人家兩岸聞簫鼔魚鳥中流識笑歌細雨沾衣縈舊纜春風入面醒㣲酡夕陽更好東歸路草樹迢迢擁幔坡送逺行行矣去君側去去那復畱㑹面諒已難徘徊滋隠憂五里臨清川十里陟崇丘轉盼路何迥馳心同水流朔風白日暮瘏馬局逺歩思君隔浮雲豈知我中露流景不我與客鬢已非故酌彼青兕觥聊以慰末路送諸立夫歸錢塘昔年記買臨安船来與泉石修清縁劉郎史伯及吾弟一船四客如登仙諸君作我南道主湖山笑引肩輿前談詩酌酒夜不輟吻焦目澁無安眠别来人事等雲變舊遊一夢驚三年劉郎化鶴招不得吾弟掩玉仍黄泉感懐夙昔有零淚掩巻怕㸔登臨篇殷勤對話雜悲喜買酒取醉愁無錢空齋停火照寒䑕古木翳寺號饑鳶眀朝何苦又分手拂衣長路開風煙朱顔白髮倐忽事人生離合真堪憐送周桐村白髮烏紗將八十文章談笑見揚雄風流不减三年别未許尊前稱阿翁㸔到梅花十萬株清吟一月住姑蘇城中屏障都題遍施與吳人百斛珠送汪廷器重遊遼陽三韓亘東北其地次海隅勢位何崇髙沙漠蓁莽俱盤鬱千萬山望有醫巫閭山海相交際烽塵稱畏途汪君江南産好遊司馬徒走馬日千里寳鞭揚珊瑚風霜切貂裘酒薄不足呼腰下秋水劍復繫玉轆轤海鵰落長雲檿桑戲强弧於此顧有樂結納多文儒黄金日繞身大餅擲歌姝歌姝且不惜巨萬酬邉需磊落見襟抱中可開江湖一别倐十年玉雪猶偉軀言復尋舊遨逕去難色無笑我裹足人牖下秖白鬚分手各有贈贈我錦氍毺我亦聊菲薄短篇侑雙壺用清虚堂韻送匏菴少宰服闋還京三年袍幞違風沙歸家讀禮如退衙長髯已聞數莖白瞳眎眀察無纎花鄉人廿載曠接見老少瞻拜常填家怡然不煩亦不拒正猶茂木容羣鴉朝廷眷注特虚要匪直鑒藻兼辭葩要儀百辟重徳度如鬱須酒渇乃茶騑騑四牡不可緩我亦殷勤當執撾與君一别絶聊頼蟣蝨頗學嵇康爬衰人載見恐無日差免握手成吁嗟時勤相憶但搔首仰睇天上空雲霞送張廷儀楊梅墮地連日雨江上喚舟舟不来黄帽唱歌今撥棹青天白日眼俱開送蘓安道赴祝冬官惟貞館江程何悠悠汎汎江上舟載彼圖與書言徃海上遊東海有君子孝友天徳優好爵弗乆縻屺岵重逺遊歸来夀春酒酒影照白頭怡怡家庭間和氣聞逺州之子固惞從芝蘭味相投匪特自假益尚應童䝉求春風動花栁絃誦溪堂幽可睇不可即含情渺長洲送薛堯卿漫遊言登泰山謁孔林而迤邐求仙海上堯卿掉頭狂且忙結束東遊如子長擬將足跡試天下三月已自儲餱糧出門長嘯振林木蒯􅚆短劍秋風凉臨岐調我老不及登髙健歩如飛翔岱宗未到已在眼齊魯指㸃青㣲茫書生浩氣乆憤激要倚日觀攀扶桑秦鐫漢刻多漫漶且莫苦苦求其章東封何有許功徳文武未必能張皇惜哉君行差較晚燼後灑淚悲靈光是年闕里災素王有道自六籍固是不死之仙鄉羽人丹丘何足問勿以汗漫窮荒唐丈夫汲汲在事業白髮須㬰成老蒼無人薦達自陳列朝廷求賢正無方頗聞北事近擾擾毛錐未抵丈八鎗邊頭合有班定逺天下豈無張子房山東李白恃必用莫自兩生追所亡不然歸来且髙卧共喫飽飯歌陶唐送周文襄公乃孫廷器以畫像驗塑還吉水土田亘江東揆賦億兆計其多由寸入所在敢遺地太祖太宗時稽斂或未備偫收信長屬饕公餕私費習乆遂玩刑忘身殉于利逋迨八百萬空牘勞記註嵗餉常不及日究常不治文襄應簡命妥濟受斯寄公知法禦患法疏患乃致誨盗在慢藏覂駕在失御盡斥宿漁手令民必躬輸升斗舉在公庾儲復官涖登積充舊典罔耗有攸裕所羨亦不訾陳因年相次户庸及公需凡百資其出于時民樂生朝廷無顧慮斡轉一時機掃蕩滋深弊如器之阽傾援拯暇不遽革茹謝苛猛振蠱匪斂聚公薨五十年遺政已莫據後繼亦多賢措設各有異遡惠不可誣于乆乃有祀廟貌欲追惟嵗月蔑省記公姓攜繪影按之求肖似外肖衷未然有愧六二比才局負心胸仁義具肝肺智諝周聰眀力量發意氣不然是非間耳耳茅三四我喻操鏝工斯得謂能事工答毋深求神般不載世我聞發咨嗟時哉則殊勢秋風振江介白露草木瘁遊子思故鄉懐圖渺西騖徃矣不可留欲贈言莫既丘侯休致浮雲滿眼使君行山水無煇日未晴眀日相思何處是甘棠樹下獨聞鶯江山正有漫漫雪行客應無緩緩期越水吳山一千里輕舟歸去似来時送吳朝陽都閫之任淛司桃花春水古城濠僧寓遙煩降節旄雙鬢相逢慚我老十年不見覺官髙新篇爛漫牛腰巻舊酒淋漓獅子袍南國諠呼迎閫制千兵夾道擁弓刀送錢士𢎞㑹試春闈指日忙忙去躡凍開途嵗尚餘拂面風塵寒送酒臨關霜月曉催車牓頭要著渇睡漢闕下當知行秘書五十功名休謂晩老成還聴首傳臚送劉國賓劉郎面玉争荷花少年經市果滿車金張許史不敢倩鳯皇合徳賔王家平歩為仙五雲裏甲第藏春天尺只笙謌催醉金叵羅七十紫鴛扶不起冶遊昨日過江東細馬紅粧山水美家人要問山水處生綃搨取蘇杭去送朱性甫遊西湖西湖我先遊君去落我後落後為生人先遊託故舊從君未到時説與亦疑謬當以湖洗眼口亦要湖嗽不嗽詩不清一洗目不瞀此湖有大量先後皆納受固不為君薄亦不為我厚有客有船載有酒有歌侑雨晴無不好濃淡兩争秀落日映四山清波照紅袖此特衆樂耳君宜出其右尋我舊題處佳句多脱漏正自要君拾一一不可宥想見南屏秋倚爾兩肩瘦人多詩亦多各各備妍陋湖在詩亦在各各千萬夀日日人去來詩能作將候如敔止柷始禪續而迭奏君吟未必盡山水詩苑囿君行報山水我老尚堪又送吳惟謙守叙州雲司轉階例不卑藩參臬副皆所宜君今出守古僰國過峡萬里天之涯衆為君憂君獨喜負利要自盤根施我知作郡得專政豈是唯唯因人為叙封况聞廣九邑其民既逺雜以夷鑿牙穿耳固頑獷撫之恩信當懐来詩書更欲變咮離文翁之任非君誰茘支初紅五馬到江山亦為人増奇山谷老人有筍賦讀賦食筍君還知苦而有味可喻大歴難作事惟其時送王抑夫作縣陳畱幷柬許倅施煥伯與君桑梓隂相望母黨况為兄弟行我之老母姊君母少日拜姨今未忘兩家昆季昔數人君我聊存屬餘長羨君讀書事長勤落手新文合時様學資浩蕩徳華腴外度舒徐中倜儻我慚白髮血氣衰君喜青雲年力壯北京初還受銅墨風雪充途神轉王挈家便欲沿牒去河上敲氷進官舫田園豈是容易别自是縣中官署曠惟民不可日無教有爵相擔畏人譲北来隨地見饑饉未必陳留獨無恙不徒口慰要心存莫以繭絲先保障亦聞陳許間未逺爾有膚菴可醻倡故人所在即故鄉天涯詩酒生佳况嗟予廢置秖牖下枕書昬眠眼脂漲升沈由来自有時已信老懐齊得䘮尚期諸輩各努力要在致君堯舜上送朱武選調常徳别駕次李西崖學士韻恩華浩蕩縱長遊一牒南從楚國投世事未能容我料風波不足使人愁漫消惠飯須佳句先說潮陽尚逺舟廊廟江湖俱宦達天涯持酒看雲流送夏徳樹告疾歸台州尊翁舊著堂堂節令子連章倔彊名欲激宰公言過直因忘富貴去偏輕素知眼淚撰不出豈是髭鬚拂得成擬古數篇㸔反覆極於所學見平生和林郡侯送王敬止赴任瓊州韻休云寵辱逓相催信自先生直不回怖鱷莫憑瀧吏說蒸羊好待相公来乾坤是處皆容物小大無官不適才早晚春風即吹到海瓊花發必先梅送王敬止謫瓊州流行坎止世途中萬事由天天自公失馬未能知禍福辨烏何必在雌雄賜環擬望厓山月用楫當歸漲海風白髮一杯分袂酒相迎還許送時翁送山隂秦復正謁華光禄瞰荘賢主得佳賔百里清川映緑蘋酒榼詩囊塵外物山光水色眼中人石池俯雨魚苗暖畫閣開簾燕子春此地持盃如見憶髙篇儗寄蠟封新送梁道夫還瓊州瓊島迢迢候老翁深懐秖博兩宵同片帆南浦草仍雨斗酒長亭花又風話俗燈前南海近思親夢裏北堂空情知此别難書問止到衡陽已斷鴻傷悼送葬附挽張東海只合畱君白玉堂天教醉墨賁南荒衰毛送老歸来短遺草隨年化後長㡬欲扁舟訴離别竟成清淚作存亡因尋舊寄聞鵑帖人物傷心墮渺茫病中挽周桐村藥物兼旬兀病身輓輀獨後北邙塵江湖隔眼燈前淚生死通心夢裏人古誼髙懐留健羨遒文細字憶精神他時容展孤墳拜風雨桐村宿草春悼隣叟八旬筋力在舉止後生然灌稻畦煙裏撥蔬園雪邉生無息肩日死有到頭年尚囑諸孫輩成家莫嬾田挽沈東林廷佐烏紗天與老為容白髮知因病未籠西序有櫕俄殯雨東林無樹不悲風酒邊傴僂思遺象詩裏推敲失此翁獨剰吾家舊題竹一般瀟洒月眀中挽范老雙目㝠㝠與氣沉有何牽掛子孫心解驂誰補無從淚就布聊為不足衾破屋秋風茅把盡孤墳落日水聲深老奴封土辭歸後安得松楸作樹林悼張靜之黄門先皇深寵死難忘魂識還依玉案傍滄海莫知歸有鳥白雲誰謂去無鄉念終在子天終吝世自存詩人自亡憶得西湖觴咏地豈勝清淚月㣲茫挽嘉定翟孝子允髙烈火見者畏不謀天下同伊人燔廬菑負母走熖中臨難切至情全愛出至窮天人斯通昭尋熄從返風金軀茲銷化孝聞不可終可耻及泉誓尚爾歌融融挽沈眀徳二首青袍落魄衆堪憐每每科場譲少年原憲長貧還有病淵眀一火竟無㕓小篇絶筆畱孤邸半紙虛名付冷氊魂憶西湖是歸路梅花月色尚依然貧圖斗禄老仍驅以醉為生以醉殂地下酒壚那復有人間詩鬼不能無千年未信歸遼鳥三匝空憐繞樹雛寄我詩篇成故物毎因開讀便長吁哭文温州宗儒向来作郡夢非祥逺大功名夀未遑造化小兒俄栁肘乾坤遺愛有桐鄉丈夫氣節存人表老友肝腸剰淚行還信天公著餘福當家分付寡辭郎挽程宫詹髙官博學何辭諻頃疾長殂可悼嗟君子不知蠅有惡惡矢也蠅惡出昌邑王傳小人安信玉無瑕聖眀浩浩湯除網睽極茫茫鬼載車歸把遺文殉深葬看從地下發光華登小雅堂哭史眀古築臺髙住似神仙恰好堂成及已年歌哭於斯人忽耳死生無度事茫然青山底處尋遺史白雪從今付絶絃此夜獨登惟見月清光依舊石䦨前哭劉邦彦二首五十年来托故知秖酬兩會便長辭湖山好在無人物風雨空令有涕洟松下骨埋宗長鍤梅邉魂和老逋詩瓣香在手身違病月落斜窻起坐時天教行樂住杭州今日湖船似舊不桃怪劉郎来不再詩憐杜甫死方休風流山水仍紅拂富貴壺觴到白頭最是竹東聽雨夜而今空有夢追遊挽璋公璋老性靈澈參扣不伺版學苦行亦堅心舒語還簡昻昻如喬松秀色照人眼八旬尚健歩有杖倩人撰俄傳疾不出不意竟絶饌徃顧問云何示别作微潸答曰生我寓死為生所限限極我何畱何惜復何戁舉手道謝謝言下仍發莞所究亦超然世迹空一剗旋踵即溘然急若丸走阪此老今已無千輩莫一揀重来但虚堂寒影照燈􅊦門前挱欏樹風葉何反反挽方道士用東坡清虚堂韻學仙不就如炊沙紫府著爾無閒衙長生苦苦累唇舌六十瞥眼風中花江湖漂萍本無蔕一囊書畫東西家虚談火龍配水虎豈見白蝠如烏雅惟於飲酒詫真趣終身落魄猶蘓葩醉魔作祟病已劇酒莫下咽惟需茶長途昨夜忽觀化訃至空使吾胷撾皮囊敗壊秋草裏青山劍穴從誰爬碧雲黄鶴渺何許矯首西睇令人嗟我今隨生亦隨死努力加飯辭飡霞悲溺少小出閭右生長紈袴中珂馬越阡陌溢目揚光風青紫恃富取豈信詩書功調笑隣家姬琉璃為酒鍾黄金一朝盡雲衢付㝠鴻勲名悲故鏡白髮紛秋蓬凄凉西華子落魄東郭翁天寒城濠隈失足探蛟龍沉沉泥中居層冰相蔽䝉家人不得覔尸出沍方融輿歸經舊里見者歎窮通窮通不必歎富貴少令終傷阿同阿同年十四蓬垢身短小小心効力多過失比衆少每事解人意指使不顛倒以有成人姿私怪通慧早今年忽患痘頭面見稍稍週身漸稠密匝肉無空道色白漿不成識者謂難保愴惶十三朝焦黒如火燎我時去城中牽念夢屡造同亦盼我歸毎問輒悵懊此意要面别亦自知死兆我歸不見同洒淚傷其夭老者正需人何以堪懐抱今與㝠頑處愈自覺同好誤呼尚疑存轉顧驚悄悄送汝瘞東郊細雨滴青草蕭蕭東海竹挽吳汝輝蕭蕭東海竹鬱鬱西山松壤地兩隔越生植莫能同顔色各相昧音聲或通風精神自㝠合宛宛無西東青松一朝催此竹抱孤窮以竹書感慨寄去淚亦從聞陳白沙先生訃生知秖藉兩詩酬死惜曽無半面由坦坦徳從周道徃𡨕冥心與葛天遊講論語托門人録封禪書違使者求萬里白沙何處是獨臨殘月水西樓堯夫情性林宗行薄世之師天吝之此老不亡名自在斯文欲鑄我何為天長嶺海無從涕地老臺山有道碑擬把瓣香身莫達紼前空寄助勞辭讀吳文定公御祭文徳望文章稱科甲官階夀考更兼之嗚呼今日延陵墓不愧當年有道碑天子重傷麟䘮魯吳人私幸鳯生岐白頭野老宜先死翻向秋風泣所知挽徐母馬氏徐家阿母多慈訓懿徳何慙白石刋針眼未漫衣上線膽膏猶膩手中丸秋隂月掩都房橘香木霜凋古畹蘭澱紫山頭埋玉地賢郎陟著淚汍瀾送許貞𦵏蒿歌引徃紼言出郭南門我来臨其窆衰草凄寒原情至時掩泣痛惋不能言百年合有死惜此英妙魂我昔有女蘿附此長松根託生相因依綢繆在東崑長松一朝折修蔓絶攀援煢煢委中道有身安用存挽如公如老身無著將来典醉鄉號他酒布袋是箇臭皮囊積禍必自發為生安可量長眠當不醒殊莫悟存亡挽周原已醫判扁舟只近問棲遲玉樹驚非舊見時别後正憂如許瘦訃来已盡此生期世多不學畨膺夀天莫容官定有兒頭白老親雖健在封榮那塞䘮眀悲挽東禪信公匝頂霜根七十强笑訶訶地佛心腸掀翻趙老茶公案踏破林仙酒道場屋掩雲蘿秋榻净經殘松月夜窻凉我来借宿今無主還擬呼之在醉鄉哭金懷用表兄奔波那覺病但見吐車茵一頓可缺食百年無到人何膏起其死有淚出於親聽雨秋堂夜煢煢剰老身近哭孟光死傷多病有因不堪衰族裏頓失老成人生氣不借穀㝠羞空薦蘋橋頭思健步已負野梅春處世多存厚眼前誰似君老年兄弟行一淚死生分故宅迷秋水新阡擁暮雲勒碑吾自任未敢謝無文南畝墊秋水憂懐縈老窮勞生百不足到死一成空身脆如殘葉病来加朔風昨宵談笑是暫落夢魂中栁孺人夫坐事身家俱籍入後放歸再造男兒事區區属婦人時當初渉難産入亦俱身心絶寒灰後恩回朽木春嗣禋牲豆㓗復奪鵲巢新豈謂闕無政猶聞與亂臣栁門存一脈蔗境脫千辛今已不可作潜光在翠珉哭表兄金以賔追及伯氏懷用秋日哭兄猶涕洟窮冬哭弟又漣洏年時大小皆于邁我輩存亡豈可期昨者笑談今屬夢門人編録幸存詩吟踪最憶東橋路青布長巾短杖藜悼劉協中先參負文豪喜子紹前志總角弄古辭綽有髙逺致雲敷及泉湧思銳不可摯落筆驚鄉達翔聲聳朝士聰眀累多病冉冉精神敝玉芝折孤莖吳嶽失靈氣前後千萬年浮生秖暫寄廣大班馬程發軔聊小試奇才固難生生則天復忌遺章可償夀尚爾不朽恃初怪語不祥徃徃寓感喟色慘花當萎鳴悲鳥将逝茫茫修短數豈亦容人意不應老鈍夫顧為英俊淚挽吳元玉去年憔悴見京城猶自題詩送我行多酒未能無疾病一郎何竟了功名秖今孝義存人口更後聲光重墓銘走拜無因致雙淚千峯落日大江横挽屈處誠善寫竹可菴不可作崑山為之荒將謂青琅玕一夜遭折傷其影落屏障千家畱墨光墨以託竹命人短竹自長魂當附竹存未分人琴亡我来弔風雨秋盡堂空凉含情賦清篇因之招鳯凰挽虎丘簡書記詩折病中身苦吟終損神青山見在世白髮過頭人花落三泉雨雲荒萬頃春惟餘石上竹消瘦似清真哭眀古回雪中過鸎湖有感不復見安道歸哉空雪湖低雲接清淚逺浪激長吁骯骯老博士崢崢偉丈夫朝廷虚購玉滄海實遺珠雄辯常翻口衰痕未滿鬚斯人竟㣲疾我輩强孱軀一邑人皆愕三年夢已殊其子夢人謂汝父六十少二當死妙篇畱膾炙還與不亡俱挽陳育菴不見先生系所思交游何地覔襟期坐来忽化身無病傳是成仙我亦疑剥啄藥瓢偷鶴嘴緘縢詩草付蛛絲遙吟舊寄皆珠貝只恐能飛物亦奇挽劉芝田老倦長遊雪滿顛澄江歸理舊芝田侯門裹足無名刺野店扶頭有酒錢捫虱正談天下事逢蛇忽忌夢中年孤兒為問他時計猶指牀頭捭闔篇和哭母詩淚以洩心液中亦寓邪正媚婦及䜛臣霑巾禍斯興錢子痛慈親崩衷血隨迸哀極衍餘音悠悠偶成詠仍須血為書留之示子姓經故人墓故人於此墓石亂水潺潺忙盡剰白骨閒来投碧山雨崩封未厚地瘠樹猶慳可柰牛羊篴聞之淚一潸挽韋大年孝義更文章山林隠徳光青春賢者短白髮鄙夫長無後心不死有琴人併亡潤州如少潤玉樹殞新霜挽黄節婦守節難保孤難守節要節完保孤要孤安完節堅心肝保孤慎饑寒啼饑號寒白屋破死心灰肝清泪酸黄家之婦李家姜鳯鸞之偶天團圞鳯一死鸞乃單鳯有鸑養于鸞鸑今有文成五色鸞今瞑目已蓋棺地下見鳯不愧亦不怍手呈髙節十丈青琅玕石田詩選巻七
