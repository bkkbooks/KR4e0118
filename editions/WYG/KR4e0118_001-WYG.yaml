body:
  text: 石田詩選巻一明沈周撰天文𢎞治改元元旦遇雨元旦未及春東風意先蘇風來繼零雨和潤物皆濡助我新天子沛澤彌九區河流亦傳清天與聖徳符賢俊日拔庸治道務精圖堯舜不異人政化無兩途我衰在畎畝感激舞蹈俱告戒各努力勤耕備公租黍穰多充禽淵靜無驚魚上下信影響餘生幸于于雪作二首經春十日忽作雪如此紛然門且關瞥見豪華成白屋錯加粉飾累青山侵凌廣野容無地零亂髙空落自閒兀坐搔頭何遣撥梅花寒勒未開顔春雪公然沮春雨莫能為潤秪漫漫撒鹽差是殊無味執玉徒觀不辟寒滿地蕭條悲烏雀何人徙倚愛闌干凍皴手足鬚俱折擁被㣲吟强自寛二月三十日雨中此雨送殘月隂雲隱有雷草雖宜濕長花亦要晴開溝漫魚争上泥深馬忌來春山只隔眼應待我銜杯三月一日喜晴小步用士𢎞韻雨春情况悶中諳一日初晴月已三半濕半開花解笑相呼相喚鳥交談閒行聊樂將誰伴獨咏而歸也自堪更有餘懐成漫酌好風吹面小軒南嘲雨雨澤之所至千里為其方其落萬萬注河沙數微茫方中髙低田多少落不當髙者少莫潤低者多乃殃雖有利物名功過不相償落之徒勞勞所怨亦穰穰何如一輪月分影不可量一處有一月一月散千光只譬一州城萬人住中央一人一觴酒一月照一觴一觴吸一月人醉月無傷月自行中天不驚亦不忙房杜昔為相垂紳坐廟堂天下屬黙化熈哉稱有唐安石似道輩瑣才事更張聚斂以為政戕民隳宋綱君子與小人於焉觀否臧我方坐雨厄斐然成此章風雨中戲三郎園櫻盡落風風雨雨未開晴憂病憂田白髪生聞道西園尤作惡小僮歡喜拾殘櫻雨悶乆雨連隂結青天安在哉大由雲所子浩及水為災羣葉無情盡么花借濕開寂然泥淖地苦憶舊人來雨夜自遣需霽寥寥坐夜長呼童轉燭更添香澄懐有物嫌詩在聾耳無聞併雨忘頭上青天終自出人間白屋暫相當眀朝補漏吾還得手把黄茅作向陽五月十五夜見月映樹有作圎月出樹東隔㸔被樹罣羣葉相䝉茂光采還透射玉盤雖隱映其魄自整暇脫樹漸自髙萬里大明奓了了太極圏誰向虚空畫坐深已當頭其樹勢斯下小人蔽君子暫爾何足訝樹月亦偶當微吟聊譬借中秋湖中翫月愛是中秋月滿湖儘貪佳賞亦須㬰固知萬古有此月但恐百年無老夫鴻鴈長波空眼眦魚龍清影亂眉鬚人間樂地因人得莫少詩篇及酒壺錢士𢎞以東坡船邀汎月病阻因答東坡新船髙似屋兩舷開䆫三十六昨乘缺月汎昆湖今汎楊湖月方足老夫不及困河魚到月足時人欠福莫能扶憊踏髙筵馬不進兮人累俗翠盤露酒白玉香一飲之縁惜難卜月從水上憶車公還能入户尋幽獨枕前只作卧逰人亦有清華爛雙目髙吟不寐待囘船輸却醉鄉詩可贖暑中冩雪圖六月添衣喚僮子自畫雪圖茅屋裡玉花出筆飛上樹惨澹隂山無乃是老生放筆還自笑顛倒炎凉聊戲爾門前有客來借㸔滿眼黄塵汗如雨松庭對雪三白觸眼喜欲顛天王繼統新改年豈天厭惡下土濁以此雪之同皎然光照眀堂納祥瑞一平天下知其權疾而蒙藏能過厚卑而令髙如進賢先時上帑寶珠玉今恣四野開瓊田何須聚斂自委積過而不拾貪夫悛先時豺虎横食人空山忍饑今可憐威能挾天已闒茸勢可炙手還􅠠蜷老夫忍凍亦慣事草廬安抱牛衣眠庭前孤松有喜色要與老夫相作縁冬日冬日晴可愛温如君子人即之不覺熱黙生懐抱春執巻南榮下吾目亦滋神何嫌炙背徒負以獻吾君臘月二十八日立春得雨病起漫言小閣櫺䆫風自推手添香炷撥爐􅁅殘年送病詩中去淑氣將春雨裏囘午案待甞新茁韭陽檐思訪欲開梅歲功代謝忙如許似與衰翁逓老來憫日雜言日既去日復來來如赴去如頽來是誰約去是誰推一來一去彼此自禪續無與我與何故使我心驚猜似乎少年有根是汝拔老醜無種是汝栽百年所筭三萬六千日自我而數指作枚我今行年已七十歴日二萬五千枚所該百而去七大大半又復使我心驚獃雖欲不驚獃猛見霜絲雪縷垂兩腮何况人生不滿百疾烏捷兎又如此而相催我思天地靈長之氣十二萬九千六百年然後運窮刼盡蕩而為􅁅吾人亦謂參三才胡乃其氣短索不得相追陪凖天地而言人眇塵海之一埃嘅歲月之玩人同古今而一雷我無長繩繫日住亦無長戈揮日囘亦不知學仙能乆視亦不知託佛能輪廻而今而後去之日付一盃來之日付一盃不憂罄其缾恥其罍春暖秋凉山邉水隈訪黄菊尋白梅秋月自與吾慮净春雲自與吾懷開晝逰之地吾蓬萊夕息之處吾夜臺以殤視我吾老大以彭視我吾嬰孩信夀夭吾何以外請享此見在不樂胡為哉苦雨寄城中諸友二首一陣接一陣一朝連一朝官仍追舊賦天又没新苗白日不相照浮雲那得消君休問饑飽且㸔沈郎腰新雨似舊雨今年即去年只愁沈垕土或喜夢青天頓頓黄虀甕家家白鷺田惟應五穀地改納水衡錢秋雨偶書雲暗湖村水漫沙秋堂蕭颯類僧家聦明比舊堂堂减老嬾隨年數數加風扇未愁蕉破葉雨房偏恐稻傷花坐深兀兀多資睡强欲開書候日華中秋賞月與浦汝正諸君同賦少時不辯中秋月視與常時無各别老來偏與月相戀戀月還應戀佳節老人能得㡬中秋信是流光不可畱古今換人不換月舊月新人風馬牛壺中有酒且為樂盃廵到手莫推却月圓還似故人圓故人散去如月落眼中漸覺少故人乘月夜遊誰我嗔髙歌太白問月句自詫白髪欺青春青春白髪固不及豪捲酒波連月吸老夫老及六十年更問中秋賖四十星墮惟己酉十月五日立冬始鷄後涉黎眀寤者稍稍起有星流西北而從東南止其大如車輪蓬然曳長尾撒星更抛熖遺落相蘂蘂其光白中黄燭地以晝比行旅盡驚仆吠犬鳴鶩雉墮地如砲聲引響乆未已牀闥皆簸撼約聞三百里七月嘗示異不意復有此瞥過視莫諦墮處曷究擬至地當有化其形當何似其墮當何曜其罸當何理竊謂經與緯墮一天缺紀無乃金火餘其氣互合耳餘衍固非正謫罸自有㫖菑祥付茫茫不敢扣太史對春雨春雨父母情惠物侔愛子潤被發華妍長養助欣喜庭垂存腐蕉土渥芽伊始齋心臨散絲清虚及䆫几自愴槁颯姿均榮固無理中秋無月歌老年於世百無與待盡光隂而已耳佳時令節或難忘有酒還隨大家喜一時過去少一時打筭百年能得幾滿前童丱倐突弁少者如斯老何恃去年中秋月在城白璧團團酒波裏今年中秋月在家買酒邀賔走兒子雲漫天黒月失色老子之興殊敗矣老子非月能萬古暫借一光何足鄙中秋失月不中秋人固無聊月當恥常時有月我無酒有酒呼月今不起有無無有兩難謀要是天公忌全美世途茫茫寓萬事顚之倒之亦如此眼中屠販却封侯意外詩書多餓死便從一月觀萬變何敢容心必其理感深坐乆欲添衣風急秋髙月如水溧陽道中遇雨浮雲接地日無光足力衰遲道路長都是小兒能疾走這塲風雨却誰當有竹庄賞月爛擁銀盤草屋東白頭相賞兩三翁青天不老人自老明月正中秋亦中怪底有娥因藥誤謀諸無婦恐尊空百年各願身强健此夜年年此燕同八月十七夜待月候月月不出引醪兼話長栁黄延返照苧白應新凉惡璧沉海氣待珠開夜光我罍猶未恥願早賁林堂時令元日今日之日一年始三百六十年之終雲物昭囘天杲杲風光澹蕩氣融融商量栁色緑少許爛漫梅花白大同無事此杯椒栢酒老夫不覺笑顔紅四日過有竹荘春早拏舟聞鵲鳴病餘勉强竹荘行開年數日匆匆易向老逢人徃徃生隂隴瘦姿松抱冷雪洲芳意草知晴稍通酒􅊦聊乘興亦漫詩篇度野情人日喜晴今辰謂人生風日佳可喜七居陽之正宜云造物始占晴協陽吉其兆比君子霧雨忌為隂小人象斯擬君子履於祥歲事無不舉小人道用晦顧有菑害倚東臯動春風强健供耒耜持以告吾人毋憂徃時否七日樹介千松凛凛清霜㦸萬竹森森白玉殳無數小兒相怪問老夫搔首但邾婁元夕席上贈冷菴憲副二首石湖樂事漫呉臺茅屋今宵也一囘上客門前探節到小兒城裏買燈來生香竹葉迎春熟活色蓮花映火開粧㸃太平須要此百年常覆掌中盃堂帶春星月滿臺勸君且飲一千囘休言美酒消愁得亦被華燈送老來急管繁弦聲乍合千門萬户夜齊開明年佳節依然在分付春光駐此盃春晴出遊天宇及軒霽品物各華研清般約同儕絡醑仍擊鮮展酌臨芳樹鳴琴參笑言促羽酬良辰迅光不長延請㸔劉伶墳酹之莫達泉閒居四時吟白日可形指青春蔑迹尋不應有開花還復有鳴禽何物衰颯翁樂意亦充襟浩然不能遏登臨動謠吟謠吟侑杯酌花鳥同山林一暢太和氣載鼓康衢音捫心自有㑹求知非在今赫暑薫永日衆皆苦煩酷林廬頼溪次茅茨非厦屋門前䕃重栁簷後鬱深竹無風氣蕭爽汗瀋免浹肉尚可加白葛喜謝裸裎俗晝静茶𤓰餘攤書教孫讀既倦還偃息夢寐亦清淑秋凉我所愛人情與時宜因念康節言還眷康樂嬉杖屨足濟勝出門隨所之舉睇達遐邇山水陳髙卑洞庭吹白波落木不可持我特覧眀鏡因之悲素絲素絲不復𤣥物變咸有時亟欲學神仙早憫氣血衰羡彼南山色青青無老期砉砉風木號靡靡霜草白敝褐氣不温坐擁簷間日大兒輸租還升斗告既畢區區氓庶勤萬一答帝力簷陽歴飛晷倐忽燈火夕光下目尚見展茲編年冊其迹類歲功乘除無紀極非徒遣永漏亦足知徃昔上已即興春暘麗廣野和風汎冠裳庶物争敷暢葱葱媚時光縁溪盥清流俯見鬚眉蒼假祓聊復耳所適茲晨良握蘭襲清芬偶羽接飛觴沂水不可即道逺徒徬徨春歸曲今朝三月三十日問春果是明朝歸春歸當向何處去春亦不言花亂飛東家蝴蝶已無賴强逐遊絲揚落暉青樓粉暗女子嫁朱門鳥啼賔客稀春一去萬事非臨岐更把一杯酒愁見墻頭梅子肥端午漫書丁酉周也渾衰憊奔波已不便親淹䃈上殯食仰水中田借貸煩親戚饑寒罪歲年低頭搔白鬢雪涕在青編憂患今如此聦眀不及前私情吾自訟公急衆誰憐凋瘵應傷骨劬勞不息肩趨文棄田稚隨例劾庸錢違奪虚吾日號呼徹上天誅求家百世政令月三遷簡靜髙眀度更張小諒權鳥安求茂木魚樂奔深淵流剽如為釁搔驚孰任愆申商疑實際卓魯似徒傳青艾誰攻病紅葵他自妍深居思俊徳分賛仗諸賢莫以威嚴恃須知憂樂懸厭兒求角黍與俗話蒲鞭積雨殊滂矣浮雲亦黯然致嬰門限外此意向誰宣端午小酌親朋滿座笑開眉雲澹風輕節物宜淺酌未忘非好酒老懐聊樂為乘時堂瓶爛漫葵枝倚奴髻鬅鬙艾葉垂見享太平身七十餘年能補㡬篇詩六月望夕作十年六月十五望昏時月出當巽向初從地中已遭蝕妖蟇大吞魄俱䘮輾空漸髙已半露黒氣輪光兩相盪其色昏昏赤如血熒惑紅芒近仍抗老夫茫茫不識占但稱怪事驚還悵未聞官府行䕶典太史豈遺還弗諒不食而食天自愆人未容知未容讓不如買酒洗此月一洗千年永無恙立秋夜坐霜毛隨葉落搔首忽心驚節物其如我乾坤聊且生誰家無月色何樹不秋聲好在清哦地戛然庭鶴鳴秋暑夜坐星河垂地夜闌珊坐乆幽懐百事關畏老欲逃如鏡裏苦塵難脫限人間一亭多竹還妨月二水宜家又欠山世好茫茫誰是足秪除心迹自髙閒秋夜白屋衡門擁墮樵秋懐落落夜寥寥人間篋笥悲紈扇天上樓臺款玉簫竹實未生岐鳯老樵書不展塞鴻遙青春雖在潘郎鬢只恐愁多亦易凋九日無菊今日九月九無菊且飲酒明年九月九有菊亦飲酒有花還問酒有無有酒不論花無有好花難開好時節好酒難逢好親友一盃兩盃長在手六印何消金握斗三盃五盃不離口萬事莫談瓶且守瓶云罄矣我即休載欲謀之已無婦天應私我身獨在天不全人花乃後遲之眀日興還存紫蕋青苞得開否倘㸔爛漫即重陽借酒東墻惱隣叟九日値雨無菊重陽薄酒且沾脣歲患雖煩節物新昨日未知今日雨流年不恕老年人籬花欠事無黄菊江草多愁漫白蘋何待齊山始酬醉小孫須辦拾頭巾和呉匏菴續滿城風雨近重陽之作滿城風雨近重陽寂寂寥寥破草堂彭澤花枝待晴把雲安麯米帶生嘗梳頭髪應吾年白潤屋金從别姓黄慚與潘郎續遺句沈郎瘦不似潘郎丁巳除夜數日匆匆歲告終温存惟有此宵同安知媚術先求竈未信空文必送窮詩巻可留還自夀釣竿無恙任為翁茅堂已與年俱舊簾幙沈沈不動風與韓克瞻蘇安道守歲杪歲樂合并留戀甫及除不可負竒遇請勿歌歸與天地一逆旅所在皆吾廬各念年歲改忽忽不我儲相守戒毋寐徹夜亦須臾四序流且既其程惟僅餘丑鷄苦無情督曙聲喔如隔隣促沽酒一一圍地壚傳盃相彼此廵次不可虚林静風㓕響雨迹良漸疎俯仰百年内㡬人今夕俱人情與節物攬筆吾當書守歲歲行殊碌碌來往類𤓰期越日成新舊關情有仳離畫儺俱散後白叟不眠時孤注一年計同人此夜私五窮無術遣百拙信天為舉酒鷄鳴際聊申繾綣辭送歲詞白粉作白糰今夜送歲用千年萬年例千家萬家共歲去還自來送者徒鄭重初謂人送歲終反被歲送人於一歲間過眼㡬悲痛送歲人不知處歲若處夢我有同室人今年室已空秋日早興髙齋梧栝凉意好但是雨聲妨晏眠一心黙黙百感内萬事悠悠孤枕邊鷄鳴犬吠物有為晝短夜長天上偏起來盥櫛了無作賴此牀頭秋水篇立春日試筆雪屋蕭然折竹間畏風門户鎭須關鄉推老大悲年逝人誚迂疎喜事閒土銼撥􅁅燒凍芋雲簷補屨織新菅深居終日無聊賴或為兒嬉一解顔除夜五十三廻送歲除世情初熟鬢應疎事能容忍終無悔心絶安排便自如立券毎賖扶病藥作緘因借養生書親羮坐雪肥鮮少索畫人來喜饋魚病餘待旦衾鐵凌衰颯無眠展轉頻鷄餘千慮枕霜下五更人夢緒不可續䆫光渾未眞兩童牀脚底􅋜睡怕教晨除夜留客客㑹合時須有酒歲乘除際可無詩乾坤假我為逆旅日月玩人猶小兒黄屢相尋柰新厯白都不剰笑殘髭浮生踪迹任流止見面儘强空爾思留客守歲歌請君勿思家相將守除歲誰家守歲同故人惟我與君開此例作詩送歲君有篇買酒餪歲我有錢莫嫌苦與歲畱連惜是眀朝已隔年本戀歲華還戀客亦惜眀年又南北歲來歲去自無窮客去客來頭漸白白頭無春風且暎燈花紅燈花落處天拂曙君起云歸歲亦去歸家馬蹄急如飛家人闌門誶不歸元日四首物華初煥發鄙抱亦生春開歲始今日杖鄉無㡬人蟻醅浮甕冽鷄彩暎門新笑進三分盞聊娯八十親賀旦亦隨俗筋衰拜莫便鬢毛關燕次厯紀曠生年地氣通荄早晴光入户妍小孫㸔滿抱不待衆人憐野俗誇占候年芳比昨强值人春立早加閏歲行長話緒及農切盃廵次客忙援時從少飲獨後感流光頻頻逢獻歲健日憶兒童有母敢稱老無年不願豐堂光静宜北風氣暖知東萬擾來吾慮悠悠致静忠元日用長字韻年來隱計自為長簮笏何如書滿堂入眼晴雲占歲氣照門春日動江光傳椒老子騰騰醉騎竹兒童故故狂車馬東華雖富貴貧窮吾亦愛吾鄉初春畨暖畨寒似小兒嫩春天氣作嬌癡預先辦酒等花發醉到花飛亦霎時㣲黄冉冉桞生姿數日春晴陟有私新水一陂他自暖跳魚何故却先知燈夕燈火長街閧小兒龍鍾老子亦隨嬉小兒作閧渾無度老子貪嬉固有時滿眼杯盤人盡醉大家簫鼓夜何其金吾不禁銷金事莫為春城筭酒資秋夜獨坐萬事縈思獨坐中爐香深處性靈空藥如效世黄金賤年莫瞞人白髪公疎竹畫䆫因借月墮樵驚屋偶乘風且來拂簟尋髙卧夢境浮生一笑同秋宵秋宵殊為老人長展轉衾裯夜氣凉夢到衰年隨血少事尋聞感累心忙慿凌殘月空梁䑕干聒西風破壁螿强把清吟訴無賴亦堪延緩及䆫光廿五夜戀歲與歲别在邇五日即告終三百六十日漫過已匆匆餘此知莫畱頃忽迅飄風譬若盃酒䦨客散堂欲空强爾拉老兵徘徊乏歡悰把筆搆短篇燈前擁衰翁衰翁類歲事微吟搔鬢蓬七月十五日城中晚歸晚郭歸舟急若何市塵猶恐累漁蓑到家覺得曽風雨兩樹芭蕉破葉多十月二十八日早自城囘短日促解䌫起程霜鬢蓬岸姿㣲雨潤人影淡波通一鳥没虚碧數楓留晚紅指家渾不逺村過更橋東八月一日病中即事旬時惟有藥追陪斷不思拈舊酒盃慮静爐香宜夜坐眼酸書巻怯朝開江蘋白應松鱸出庭草紅催朔鴈來老去苦驚時節換壯心那復傲寒􅁅石田詩選巻一
