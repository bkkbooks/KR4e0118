body:
  text: 石田詩選䟦夫詩志之形於聲者也志與辭兼至而後可以言詩矣志未至焉則不足以駕御其言辭辭未至焉則不足以抒冩其志意楚騷尚矣唐杜子美所以凌駕百氏者其志則愛君其辭則忠告志與辭俱至也後世詩人學杜者不少不立其志而徒攻其辭吾未見其能杜也石田先生逸民也古之逸民如易所謂不事王侯髙尚其志而先生則不然身在田野乃心罔不在廟堂雖曰遯世無悶而憂時憫俗之志未嘗去諸方寸也耳之所聞目之所見凡有感於中則必動於志而形於辭故其為杜不必篇倣句儗而杜固在也以是先生之詩一出而騷人詞客袖手拱服矣光禄署丞華公汝徳尚古而右文暇日取先生之詩㧞其尤者門分類别合古今諸作得若干首共為十巻題曰石田詩選繡梓以傳以鈇嘗辱知於先生俾贅言於巻尾嗟夫先生之詩辭志兼得固無可去取焉者殆若製裘然光禄公之所選者皆狐之腋雉之頭而羔羊之皮不足為罕矣而愚也尚欲以狗尾續之邪𢎞治甲子十月慈谿後學張鈇書
