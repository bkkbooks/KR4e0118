body:
  text: 石田詩選巻九明沈周撰花竹草木附古梅折枝歌搰蛟不肯居西湖穹窿山中潛作都千年雜與草木處土膏沁骨蒼皮麄雪中攣拳凍欲死老腊又仗春風穌今年苦遭斤斧厄左股割落從樵夫幽靈暗泣天亦黑十斛清淚含明珠抱材肯受爨下辱失勢豈分溝中汚韓湘直費百金買何啻網著青珊瑚挑回市上駭衆目兒女争㸔來喧呼還疑神物有變化白日閉户防逃逋金繩兩道鎖紐壯禁止更揷碧玉壺主人尚恐莫長守請我冩作流芳圖高堂雪壁照清影此屋此圖何可無竹堂寺與李敬敷楊啓同觀梅竹堂梅花一千樹晴雪塞門無入處秋官黃門兩詩客珂馬西來為花駐老翁携酒亦偶同花不留人人自住滿身毛骨沁氷影嚼蕋含香各搜句吉祥牡丹清本欠定惠海棠幽亦未只憑坡口詫繁華似恐同花不同趣酒酣塗紙作橫斜筆下珠光濕春露只愁此紙捲春去明日重來花在地慶雲牡丹三月十日天半晴慶雲菴裡㸔春行陶娘李娘俱寂寞䑕姑照眼真傾城老僧却在色界住静笑山花惱客情靚粧倚露粉汗濕醉肉隔紗紅暈明吉祥將落舊有恨急借紙面圖其生明朝携酒正恐謝亦怕敲門僧厭迎石軸花山行見石軸黃榮大而華一花合羣英逕可半尺奢團團綴末幹兀兀無傍椏或如罥綵踘或如撑秋𤓰爛漫山谷間仙人唾餘霞性不利羊食其生天所賖躑躅本山榴又以紅見誇且致是非間未暇披金沙誰能别為名美如洛陽花感兹在隱約把玩令人嗟姿容牡丹比但未収姚家蓬蓽困遺賢荆布裹貞娃取酒載酹之下山西日斜慶雲菴月下觀杏花杏花初開紅滿城我眠僧房聞雨聲侵朝急起㸔晴艶對房兩株令眼明還宜夜坐了餘興静免蜂蝶來紛争嫣然紅粉本冨貴更借月餘添妍清青蘋流水未足擬金蓮影度雙娉婷庭空月悄花不語但覺風過微香生老僧㸔慣不為意却愛小紙燕脂縈高齋素壁可長有不由零落愁人情都氏賞花太平天子𢎞新治國艶隨年亦爛開心裏紫檀藏密印朶頭紅玉露重臺酒嫌未劇劖詩賞花怕難齊著鼓催我與東家同六十白頭能此幾銜盃九日無菊賞芙蓉芙蓉九日爛尊前籬脚黃花苦未全素謂及時畨落後本開遲者却當先紅粧風露秋無價白髪年光醉有縁今許滿頭還亂揷齊山笑口不須偏妙智菴牡丹我來借㸔冨貴叢僧房認是賃宅中去年㸔過今又到花若遲我含春風毿毿白髪雖不稱未許花前無我儂慈恩在前妙智後今古樂事將無同古花己見古人醉今花還對今人紅一觴一咏雅而樂何用羯鼓敲逄逄冠裳顛倒揷花舞强以筋力追兒童莫教錯認白太傅自是頽然田舍翁新栽牡丹開遲有作爛漫東隣醉牡丹也持盃酒待花㸔却疑有為偏教慢亦料終開底作難貴介莫遊知地僻美人初聘怯家寒我無羯鼓相催發祗撚吟髭日凭闌次天全翁雪湖賞梅十二詠台垣賜老荷君王山上籃輿湖上航如此湖山晝遊地梅花開遍客還鄉少在城中多在鄉尋梅猶抵候朝忙新詩似與梅相約詩到成時梅恰香不是春愁鶴髪翁風流人物義熈中遙知觴味清遊處小筆湖山似欠儂重巒疊疊水灣灣雪舫尋春醉未還因省玉堂為客夜如今不似夢中山緑尊沽酒出春城春日尋梅湖上行聞道衝風又衝雪旁人不識醉翁情一代文章百代名鼎司綸閣已忘情近來熟理農桑計似謫江南作稼卿湖上尋詩舟去穩尊前賞雪酒行遲優㳺正是居東日自遣春風人不知梅撲玉缸春酒開雪湖山水重徘徊風流舊屬林君復人道先生是載來泛雪呉航勝月槎深深盃色照銀沙寒梅鍾得平生愛重是江南第一花玉樹瑤山畫裡㸔乾坤不似酒壺寛醉來草聖三千紙漫使人驚索幼安清遊不放酒盃空雪共梅花落酒中玉帶朱衣有仙骨畫船更在水晶宫黃帽歸舟且莫催雪山留客好銜盃梅花况是堪題咏今夜春城判不回賞玉樓春牡丹白頭盃酒重臨軒喜見名花又一畨春粉膩霞微著暈露紅漸玉淡生痕酷憐似醉還饒笑儘是多情尚欠言老者相㸔聊見在逺謀何暇為兒孫瓶梅銅瓶倚玉枝髹几獨㸔時折柳多何惜臨窓少不宜斷根聊活計勺水小恩私省得溪橋外追尋老步遲題牡丹圖東家牡丹不論葉西家桑柘不論花花前把酒酹紅玉一滴誰沾桑葉緑隔墻羯鼓春逄逄人散酒闌花亦空采桑養蠶百筐滿子子孫孫衣著暖明年賃地過東墻拔却牡丹多種桑㸔花吟勸陳世則酒花下一壺酒人與花酬酢樹上百枝花花對人婥妁昨日顔色正新鮮今朝少覺不如昨人若無花人不樂花若無人花寂寞㸔花不是乆逺事人生如花亦難託去年花下㸔花人今年已漸隨花落花且開酒且酌催花鼓板撾芍藥醉他三萬六千觴我與花神作要約梅花二首莫嫌踪迹發寒窮南國生涯論首功道體不彰存白賁心仁有造屬黃中隔烟如夢微微月臨水無言脉脉風高尚難招我難逺為君頻過小橋東寂寂疎林滿地苔自知溪逕不容媒沈郎太瘦亦復耳范叔一寒如此哉漫有心膓竟何與本無顔色不須猜老夫氣味頗同致歲晚相逢笑口開東闌牡丹為好事者掘去荒庭粗整石闌干始買花栽得牡丹冨貴同心有人愛繁華移手别家㸔烟根已撥苔猶破雨坎空存土未漫笑撫老懐無所惜固知留到子孫難西園栽花西圃栽花愧老人花枝不似老人身老身雖被花枝笑自有兒孫㸔好春二十日見菊刺眼新黃見曉枝衆皆争早獨何遲晚成霜下真能奈静寄籬根不自卑聊補一年秋淡薄追嫌九日事參差老夫謝酒縁多病醒咏還如落帽時玉蘭貞蘤無妖艶白賁幽除前杪枝愛兀贅叢玉天匠鐫清馥揚逺風標度逸於仙我生具素懐眼謝桃李妍指酒通微辭願言修净縁栽玉蘭玉蓮小朶天香樹紫石闌前帶雨栽自笑老人無料量要將年紀待花開客遺山柿紿為玉蘭戲而賦此有遺玉蘭栽云花備清馥戒僮植深土殷勤養根玉秋霜己脱葉挺挺條肄秃識者曰山柿盗名餌公慾舉世好相欺牖耳多塗目余性易信人指馬不知鹿憑闌祗發笑罪遺亦何足謂信止豚魚未始及草木庭前有疎竹庭前有疎竹楚楚青玉株長身何森竦貫直無曲迂雅净合吾志還愛格清癯不似松與栝蓬鬱多髯鬚風起月作影心耳為之虚十年存保䕶逺意託笙竽物脆時莫待蒼黟根葉殊老朽不足截何以承吹嘘薙草行除草本難盡根子互生成請觀耰鋤後私得雨露情庭除日夕間衆緑復交盈蘭蕙皆滅迹蕭艾欣得朋中為蚊蚋居蛇蟒亦横行濕積地道敏氣惡暑熱蒸陷足罥衣裾賔階苦趨迎毎被客嘲誚愛物實沽名不察僮奴嬾亦柰易發生朝來奮一薙頓令心目清聊快頃蹔間未保終絶萌因以悟小人難去類相縈匪特去云難尚有怨誹并從兹謝庭草甡甡漫爾榮青草吟青草年年多白髪日日少青草催白髪似恐人不老髪落白有盡草生青不了我是樂天人梳頭對青草憫禾薄禾今兹計狼狽尚栖畝借問胡為爾先時已罹咎五月風雨大潢潦卑莫受田穉俯就沒濁浪扼其首排濯潏蕩間性命存亦茍天日赫赫出水熱烹羣醜一日色已變三日虀在臼我時徃撈觀覬活從中剖心存根已撥欲棄難懈手欲拯卒何及愴食内若疚掘土窒滲塍倩車仰隣佑督戽靡日夜救死豈容久併力役老少足絸筋亦糾水面青鍼芒稍出九死後氣力與生意委頓類産婦一一補傷爛行行十八九過時强經營安望如常茂事多於悔禍始畸終變偶七月尋遭風弱本被抝揉折處氣當沮虗房但含滫間或見成穗秃稭卧敗箒何能畢公租亦莫彀饑口對此發長咨細雨浹昏酉枵腹不堪鼓併欲歌止酒割稻我家低田水没肚五男割稻凍慄股勞勞似共雨争奪稻芽漸向鎌頭吐蓬蓬纂纂綴青針稻既生芽禾應腐腐餘割得尚歡喜計利當存十之五小家伶仃止夫婦稻爛水深無力取口中之食眼中飽忍見穗頭沈着土波間粒粒付魚雁一年生計空辛苦但憂两口不聊生未暇徴租慮官府老翁坐對沈龜哭婆亦號咷向空釡雲昏月墨忘關門隔壁咆哮一聲虎白茅顧氏種荔核成樹有感人傳顧家園近有閩荔栽始聞漫竦企果否两莫裁閩呉地殊懸此物胡來哉彼此氣各偏炎寒亦難諧淮南不宜橘冀北不宜梅物固産不通性與土相乖耳目自為仇予懐日徘徊問訊昨走奴已遣仍慮紿及返有所挾么枝葉蓑蓑葉次綴小蕾含黃未曽開事固有變理執常哂呉獃兼能述所致妄瘞核偶荄今本已拱把森然暢條枚去歲實垂成隤落惜玫瑰根氣恐未充加培如保孩紫苞已在眼香甘早流腮老夫喟有此南氣其北來先從草木見造化有脴胎厥初限荒服難與玉食偕漸虞道里近有以滋味媒置堠當未免又見飛塵灰題蕉贈僧山僧心與迹俱閒未限居山及出山長對芭蕉閒不過時留一偈葉中間病中折菊為供憂懐判與菊無私柰此籬根爛漫枝彊借陶瓶應秋事因將病眼洗寒姿夢中笑口簮花伴枕上清齋止酒詩小閣紙簾岑寂地藥烟零亂鬢絲垂杏花半抱春寒薄染煙一梢斜露曲墻邊東家小女貪粧裹聽買新花破曉眠病起詠菊試步庭中雨迹晴籬花黃白似相迎病腰徙倚秋分瘦老眼朦朧晚借明南國金夫空倚富東家玉女自含貞一年一度期追慰今怪山盃欠此情詠齋中黃菊宛宛黃金盃虗器莫挹酒造化為鼓鑄賦色應西㬋漙漙朝露浥宛宛秋苞剖深翫不盡愛欲折還惜手氣屬蕭颯中遲暮以為候病夫蕭颯人意味相昵厚顧非兒女花貞固知所負吾齋空四座命作歲寒友草堂前梅桃今春相續試花春色今年賁古臺東風續續見桃梅穠華莫惜三盃賞寂寞原非一日培我有好懐隨物遣花於老眼盡情開人生最似紅芳迹白鬢蕭然感緑苔七星檜海虞七星檜宜為羣木冠列生老子宫與邑作竒觀廣墀氣蕭森入門凛欲汗乆信天地成沃知雨露灌傳植從蕭梁其説我恐漫驗斗形叵全七既斃其半三株實聊存難執歲月筭各各具一異形容匪詞翰西體裂多槁豁然敞三判東體活亦裂筋骸互續斷北者蜷而秃袖破舞脱腕葉亦不暇葉榦亦不暇榦左文皮索綯孤蕝頂留繖槎折象齒蹺癭决鬼目爛疏越復叢穴骳骩仍軒岸蛟攣及婗跛努力不得竄矛長及劒短接戰驚楚漢如此紛怪駭耼君不能按知遭幾雷厄還屢兵火難生死付冥然造物反被玩君子重貞固頑醜小人讕縁高坐吹簫我欲呼鶴鸛從根覔埋丹澆泉覬紅燦長生就其䕃永作婆娑伴谿樹雨來谿樹好翡翠散明珠若若萬葉動蕭蕭羣響俱微風送餘瀝返照妬深濡浩蕩恩波足惟憐爨下枯呉元玉邀賞牡丹分韻百朶香雲怕急飛未曽來賞判遲歸臨軒要約從先定折簡頻煩恐後違藥玉酒船羣客送黃金筵直主人揮添燈不道成深夜起㸔紅粧覺露微塊菴陳太常南軒牡丹清卿南軒春有光㸃綴萬緑留紅芳臨軒撩亂難比數楊家肉屏當面張南都根本元氣壯此花盛得當推王天於清高補冨貴人與草木争文章春盤厭筯酒飫口簮纓盍座中飛觴畧無絲竹聒清論澹有風日含新粧嗟予潦倒似傖父布袍也拂春風香白鷗本是世外物參鸞附鵠來翺翔两年歎惜俱作客自家一株烟草荒平章徃事不須較在在有華皆洛陽主人勸客莫辭醉更言此㑹非尋常為華置像保長在人間風雨當無傷生色海棠粉合臙脂作曉粧冨於顔色吝於香東風不肯全分付相對梅華各斷腸和陳玉汝大理乞竹韻僮子才通醉日書長身早見載專車葉留宿雨鸞翎濕鞭走新泥蠖節舒下馬題詩添過客借風清暑便隣居夜來半舫齋中月壁影蕭蕭水墨虗畫梧竹畫了梧枝又竹枝緑隂如水墨淋漓信人捲去糊窓壁雨雨風風總不如題牡丹名牌新樣紫牙刋露重烟深正好㸔却怪錦雲低亞樹帶風扶上玉闌干荷華燕花供姢姢侑玉巵紅粧文字两相宜分香客座須風細傾蓋林亭要日遲仙子新開壺裏宅佳人舊雪手中絲便應此㑹同桃李酒政頻教罰後詩梨花瑩白姿容謝粉鉛不教酒洗自嬋娟日華暖抱溶溶雪月影凉生淡淡煙深鎖春愁歸院後静思曉夢凭䦨邊那堪掃地東風惡抹摋清明又一年落花五十首冨逞穠華滿樹春香飄瓣落樹還貧紅芳旣蜕僊成道緑葉初隂子養仁偶補燕巢泥薦寵别修蜂蜜水資神年年為爾添惆悵獨是娥眉未嫁人飄飄蕩蕩復悠悠樹底追尋到樹頭趙武泥塗知辱雨秦宫脂粉惜隨流癡情戀酒粘紅袖急意穿簾泊玉鈎欲拾殘芳擣為藥傷春難療箇中愁玉勒銀罌已倦遊東飛西落使人愁急攙春去先辭樹嬾被風扶强上樓魚沫欨恩殘粉在蛛絲牽愛小紅留色香久在沈迷界懴悔誰能倩比丘是誰揉碎錦雲堆著地難扶氣力頽懊惱夜生聽雨枕沈浮朝入送春盃梢傍小剰鶯還掠風背差遲鴂又催瞥眼興亡供一笑竟因何落竟何開十二街頭散冶遊滿街紅紫亂春愁知時去去留難得誤色空空念罷休朝掃尚嫌奴作賤晚歸還有馬堪憂何人早起醻憐惜孤負新粧倚翠樓夕陽無頼小橋西春事闌珊意亦迷錦里門前谿好浣黃陵廟裏鳥還啼焚追螺甲教香史煎帶牛酥囑膳㜎萬寶千鈿直可惜歸來直欲滿筐攜一園桃李只須臾白白朱朱徹樹無亭怪草𤣥加舊白牎嫌㸃易亂新朱無方漂泊關遊子如此衰殘類老夫來歲重開還自好小篇聊復記榮枯供送春愁上客眉亂紛紛地竚多時擬招緑妾難成些戲比紅兒煞要詩臨水東風撩短鬢惹空晴日共遊絲還隨蛺蝶追尋去墻角公然隱半枝昨日繁華煥眼新今朝瞥眼又成陳深關羊户無來客漫藉周亭有醉人露涕烟洟傷故物蝸涎蟻迹弔殘春門墻蹊逕俱寥落丞相知時却不嗔賣叟籃空雨滿城鏖芳戰艶共縱橫挽留不住春無力送去還來風有情莫論漫山便陸續仍憐㸃地亦輕盈白頭花吏閒頻埽紅粉佳人緊著驚斷送韶光入雨聲羣芳何力與愁争鹿銜御苑非佳兆馬進天閑借美名時不可為傷薄命事因無頼到輕生堪憐堪笑知多少直得吟翁老費情東園重過悵徘徊白亂紅紛似剪裁昨日不知今日異開時便有落時催留連空樹渾無賴牽惹閒愁却悔來固蔕長生信三朶又非仙頂莫栽培再四追尋何處邊石闌干外竹簾前青蟲夾墮容相頼黃鳥兼飛得可憐移昨夜燈修故事剰今朝雨泣餘妍摧殘悵感年年慣將謂今年劇去年馬追紅雨倦遊回春事闌珊意已灰生怕漸多頻掃地酷憐將盡數銜盃莽無留戀墻頭過私有徘徊扇底來老去罣牽宜絶物白頭自笑此心孩抛叢脱當亂如摯縂借鸞膠不可黏梨雪沍䃈人病酒絮風撩面妾窺簾千林如約垂垂盡一片相先漸漸添欲託丹青著遺愛頓無情思筆難拈處處春光花滿烟忽隨春去使凄然風前敗興休當立窓下關愁且背眠放怨出宫誰戀主抱香投井死同縁夕陽寂寞江南北吹滿西興舊渡船樂遊園裏覔芳菲朶莫能全作片飛開日未閒如已謝見時無幾惜多違香猶鬱土亡妻葬淚不成粧棄婦歸正是使人追憶地况來惹鬢復沾衣花欲延春奈子規聲聲催到緑隂時遲來杜牧惟逢葉深信秋娘空折枝悲濺淚邊何忽忽悶低頭處共垂垂淹留墻脚䔍黃甚蝶已無情螘有私分香人散只空臺紅粉三千首不回惡刼信於今日盡癡心疑有别家開節推繫樹馬知過工部移舟燕蹴來忍見愁悰敗塗地閉門無語只書灰風誅雨刮太傷神徙倚詩篇咏斬新紅淚洩寃啼短命黃金希術鑄長春空虚村落今烏有嘆惜山林迨赤貧凖擬明年大家酒重㸔還醉舊遊人千樹何曽剰半株芳魂惆悵與時殂層層疊疊根頭有寂寂寥寥葉底無騷亂又當春結局流亡真要我為圖超空獨讓沾泥句著想留懐自覺輸泊紫漂紅没住生傷心那止洛陽城美人天逺無家别逐客春深盡族行汝去安能不思汝卿輕還復可憐卿要申遣撥須憑酒醉裏忘愁且一程朝來桃李只空園作麽傷殘問不言漁楫再尋非舊路酒家難認是空村悲歌夜帳虞兮淚醉侮烟江白也魂知道下塲如此惡早先立取厭風旛繁華消息寄芳叢翫弄遊人轉眼空萬物死生寧離土一塲恩怨本同風株連曉樹成愁緑波及烟江有倖紅我問老僧求㸃斷數聲啼鳥夕陽中笻枝來效小温存片片猶沾宿雨痕路不分明愁喚夢酒無聊頼怕臨軒風萍靡靡餘流水烟草萋萋感故園尚有斷香殘粉在何人剪紙一招魂供送春愁上客眉暖風晴日黨遊絲擬招緑妾還成些戲比紅兒煞要詩鈿盒檢粧餘故靨膽瓶和水棄殘枝紛争亂競須臾静似了東窓一局棋閙亂東風又一場出墻桃李苦顛狂不堪小大從于邁無柰郎當舞更長紐綴莫容鍼線巧糞除徒費帚箕忙倦遊尚作尋芳夢酒欠敲門惱漫郎嬋娟殂落不須悲李妺桃娘已有兒人散酒闌春亦去紅銷緑長物無私文章土苴遭衰刼錦繡閭閻惜賤時空記少年簮舞處飄零今已鬢如絲盛時忽忽到衰時一一芳枝變醜枝感舊最關前度客愴亡休唱後庭詞春如不謝春無度天使長開天亦私莫怪流連三十咏老夫傷處少人知憔悴黎明出漢宫新愁都向别離叢青山有地埋香質紅淚何心泣曉風絃管不堪歌舞盡繁華真較綺羅空天涯春色悲公子玉勒金丸幾處同百五光隂瞬息中夜來無樹不驚風踏歌女子思楊白進酒才人賦雨紅金水送香波共渺玉堦㸔影月俱空當時深院還重鎖今出墻頭西復東陣陣紛飛㸔不真霎時芳樹减精神黃金莫鑄長生蔕紅淚空啼短命春草土茍存流寓迹陌頭終化冶遊塵大家准備明年酒慚愧重㸔是老人擾擾紛紛縱復橫那堪薄薄更輕輕沾泥寥老無狂相留物坡翁有過名東坡三咏落梅云留連一物吾過矣送雨送春長夀寺飛來飛去洛陽城莫將風雨埋寃殺造化從來要忌盈似雨紛然落處晴飄紅泊紫莫聊生美人天逺無家别逐客春深盡族行去是何因趂忙蝶問難為説假啼鶯悶思遣撥容酣枕短夢茫茫又不明春歸莫怪嬾開門及至開門緑滿園漁楫再尋非舊路酒家難問是空村悲歌夜帳虞兮淚醉侮烟江白也魂委地於今却惆悵早無人立厭風旛芳華别我漫匆匆已信難留留亦空萬物死生寧離土一塲恩怨本同風株連曉樹成愁緑波及烟江有倖紅漠漠香魂無㸃斷數聲啼鳥夕陽中笻枝侵曉啄芳痕借爾庭階亦暫存路不分明愁喚夢酒無聊頼怕臨軒隨風肯去從新嫁棄樹難留絶故恩惆悵斷香餘粉在何人翦紙一招魂賣叟籃空雨滿城鏖芳戰豔寂無聲白頭苑吏閒陪掃紅粉閨人驀著驚莫論漫山便麄俗還憐㸃地亦輕盈亂紛紛處無憑據一局殘碁不算贏十分顔色儘堪誇只奈風情不戀家慣把無常玩成敗别因容易惜繁華兩姫先殞傷呉隊孫武斬呉王二隊長千艶叢埋怨漢斜消遣一枝閒柱杖小池新錦㸔跳蛙香車寶馬少追陪紅白紛紛又一廻昨日不知今日異開時便有落時催只從箇裏觀生㓕再轉年頭証去來老子與渠忘未得殘紅収入掌中盃玉蕋霞苞六附全一時分散合無縁風前敗興休當立窓下關愁且背眠田氏義亡同五百田横死五百義士皆投海而死唐宫怨放及三千無人相喚江南北吹滿西興舊渡船落柄開權既屬春少容遲緩亦誰嗔酷憎好事敗塗地若被閒愁殢殺人細數只堪滋眼纈仰吹時欲墮頭巾不應捫虱窮簷者薦坐公然有錦茵錦粧林館綉池臺徹底從頭今在哉斷酒不堪詩並廢嬾遊祗把病相推節推繫樹馬驚去工部移舟燕蹴來爛漫愁踪何地著謝承惟有一庭苔打失園林富與榮羣芳力莫與時争將春託命春何在恃色傾城色早傾物不可長知墮幻勢因無頼到輕生閒窓戲把丹青筆描冩人間懊惱情千林紅褪已如摰一片初飛漸漸添梨雪沍堦人病酒絮風撩面妾窺簾併傷鳥起餘芳盡汎愛鰷争晚浪粘可奈去年生㓕相今年公案又重拈昨日才聞叫子規又㸔青子緑隂時秋娘勸早今方信杜牧來時已較遲脱當不歸魂冉冉濺枝空有淚垂垂淹留墻角嫣黃甚暴殄芳菲罪阿誰芳樹清尊興已闌抛堦滚地又成團帶烟窓扇櫺斜透夾雨簷溝瓦半漫老衲目皮閒作觀小娃裙􅙳戲承歡無端打破繁華夢擁被傷春卧不安樂遊園裏眼俱空只在今朝事不同錯道海棠依舊日生憎楝子下稍風圬人鏝上泥柔粉桑婦筐中緑映紅便認未開如已謝一般情况寂寥中為爾徘徊何處邊赤闌干外碧簷前亂飛萬㸃紅無度閒過一鶯黃可憐觀裏又來劉禹錫江南重見李龜年送春把酒追無及留取銀燈補後縁東風刮刮劇情吹萬玉園林孑不遺席捲橫収西楚貨國亡空愴後庭詞拂紅回去思前度搔白㸔來惜少時莫怪留連五十咏老夫傷處少人知岳王墳上樹岳王墳上樹武侯廟前柏在墳生南枝在廟根如石不訶無翦伐不朽非培殖冥冥草木者何以通人德二公鬰忠義天地為拍塞天地無發付一夜化兩植風雲發長噫雷雨作怒擊一不忘北兵一不忘曹賊英靈尚凛凛死有斡生力其生雖不辰其死有遺直嗟哉背逆徒未死氣先息諳諳蔑蘖餘茍有亦荆棘掛蘭厚土賦草木去土曷恃生貞叢縣孤荄由天匪培成願學無根槎不作糞壤英令人仰高潔絶地自欣榮矯矯凌空仙碧帶侑紫瓊誰能䙝佩纕靈纍空復情德馨不可挹夐含風露清君子務超世淺俗訕釣名區區荆棘輩下視莽縱橫墻下野菊墻根野菊自爛漫新黃瑣碎無人憐幽芳不揚抱隱德僻地蕭條宜養賢聊因盃酒少慰藉三嗅三歎秋風前道上春草春草本無愁有愁因我生千里隨我逺始自出門行一步長一苗根從心上縈酒澆根不爛詩遣苗復榮何如閉門坐愁草兩忘情南山有高樹南山有高樹衆鳥投其枝樹莫有號召鳥集各如期密雨謝沾濕赫日與蔽虧搆架亦冝巢哺育久于兹一旦疾風作根柢不能持衆鳥蔑依恃分飛更他之他之復高樹罔念舊息時老夫感樹鳥再三謌附離石湖書院老樹范公亭東㸔古樹有身莫可限尺度只憑長大不長長邊老婪酣遺醜肚一榦朽盡皮肉空一榦輪囷葉麄蔽盤根到處走虬蛇風雨不驚知得地坐根納䕃且移時静玩氣機成感寓人生安得如此頑不死不用常在世王理之君子林王子愛竹迺祖風个个對屋居城中居然便號君子林以多為稱少未通方其樹藝心廣大十个便與千个同小人固多君子少聚此十輩道足充願言取直取虚已取節不改固爾窮王子復能手冩竹筆下夭矯㸔游龍洛陽家家貌司馬片紙未見容荆公請常事此勿改業桃李何足塗春紅蒔菊合瓦團團縳小盆烟叢分蒔遶秋軒先教辯葉方知種更慮澆泉太漬根寒送餘甘歸藥籠晚投薄分與柴門開花解向天涯笑遊子何時憶故園山茶辭惟兹古株以孤立兮垕土敏樹根器固謐兮燁如渥若枝葉孔翕兮奕緑團欒朱榮爛兮歲寒雪霰芳斯發兮衆植搖落倮孑孑兮顧彼華滋裒然襲衣兮君子有常小人中非兮外縝内貞羌有此淑行兮材倨不振知受命兮物曲尚利工弗然兮繇棄而完遂生樂天兮敬以為圖賢足友予兮山空無人聊與爾居兮雪蕉王維偶冩雪中蕉一種清寒尚未消前度風流思舊觀後人影響見新標殘黃潦倒漫詩跡破緑離披折扇杓今日䝉翁同鹿夢曉窓呵筆費辭招詠庭前桂庭前有芳桂聳立自孤生時當風露凄顧發黃金榮翹處羣植閙悠悠揚德馨衆穢豈不忌氣禀莫相能鳥獸感燕爾燕何巧黠作巢違故常懸贅兩桷間憑虗絶依傍何啻幕上危不託枅與杗他壘皆有據負固恃安藏爾尚務速成致敗無忖量銜泥互雌雄一日千廻翔塗塗苦相附疏漬易剥瓤頃暫二墮落力勞業荒唐觜吻苦啄唼累日不成亡衆壘既舉雛飛鳴能頡頏見善不悛改愚營故倀倀大拙類蝜􅀈小智逞蜣螂愐爾殆有為示險在堂皇凡是肯構者鍳求道則昌拓之平易基衛之仁義墻順之勿改作緩之勿率忙允作堅久計子孫有餘慶物異理則協情激申蕪章新燕今年見新燕猶似去年見主人頭髪白轉多只有烏衣不曽變年去年來來不差分明記得主人家柴門大開風滿屋飛出飛入隨楊花君不見相國門前車馬塞一朝去相車馬寂車馬寂草萋萋燕子還來梁上栖題鶯賣詩賣酒醉春城破盡青衫白髪生四海固無知我者錯教啼殺樹頭鶯縱禽秦雲越樹路悠悠鎖掣金籠百怨休中有能言緑衣鳥還呼萬歲一回頭鬬雞兩勢當塲備縱擒自家勇敢果誰臨勝時固有昻然氣挫者都無礪乃心毛錦紛披泥迹汚冠英潦倒血痕深老夫罷與人争席戲倚閒窓㸔鬬禽對鵞與薛堯卿聨句鶂鶂來前除兀立照日影舒翼軃明翎周引吭延修頸唼喋類啑藻睥睨憶窺杏先生嘗為賀氏作杏花鵞故云章憲馴蔑比隣惱逸靡淮堧警定額高贅疣周頦領低垂癭廣掌跱何壯寛脰食莫哽章憲蹣跚步徐徐蹀躞舞挺挺慙羲面發熱周笑毅齒欲冷持遺意彌厚出哇志亦併章憲容貎甚閒暇標格極秀整彘肩羞腯肥周鶴骨輸瘦㾪老饕思屬厭大嚼知雋永章憲汙邪歲苦墊豢汝媿千頃周西山有虎行西山人家傍山住唱歌采茶山上去下山日落仍唱歌路黑林深無虎慮今年虎多令人憂遶山搏人茶不収墻東小女膏血流村南老翁空髑髏官司射虎差弓手自隱山家索鷄酒明朝入城去報官虎畏相公今避走又西山有虎動成羣小兒夜啼争撞門衆中最猛説白額當晝磨牙當道蹲腥風衝人行不得行人出門便愁食青天白日奈爾何老夫却愁隂類多虎來成化十一年九月譌言虎至争慌惚我謂虎至豈水鄉况少蕩翳與林樾前村漸報咥老翁西村少年撲見骨未昏家家栅猪犬四隣緩急莫相越昨聞隣子説果見夜聞噭哮竦毛髪起從壁孔稍窺覘恰有微月暎屋缺翻烏駭雀不安樹偃草落葉悲風發闊行卓尾自破來意搏不得怒氣勃聳軀哆吻首闖地瞋目耽耽兩盃凸侵朝出門迹宛在濕泥載途五爪没口中且言尚驚怕轉首四顧疑衝突嗚呼猛獸猛不知平郊獨行無乃忽人稠地局勢無比衆眼不甘留突兀其中豈無馮婦者攘臂敢前何不蹷彎弧倘有裵將軍老命須臾應弦殁不如徙惡南山深安我民心汝安窟杏花燕子杏花初破處新燕正來時紅雨裡飛去烏衣濕不知送歸燕送歸燕送歸燕秋社今年又一遍明年春社是來時隔不半年仍復見送歸燕送歸燕似把人家作郵傳來時不是慕冨貴去日曽非棄貧賤口喃喃尾涎涎意與主人相眷戀對語殷勤楊柳樓雙飛再四梧桐院樓中院中有賔客主人日日開高宴酒杯去手易肺肝酒杯在手革顔面若將燕子比人情燕子年年情不變絡緯絡緯復絡緯辛勤鳴露蟲音聲作能事終久不成功食蟶海户求鮮食填筐管族繁杴泥深詣窟縁殻暗尋門撱玉容生擿凝酥怯過燔著薑相打合漬酒與温存角聳蠻娃髻纑纏拙婦魂味饕人口腹菑累爾兒孫比類憐吹呴含津憶吐吞庭霜委故蜕沙雨没虚痕薦爽山盃後休將蠣蛤論題鳳圖真鳳眼未見丹青徒假威千年希世出九仞自天飛堂上忽屏幛人間空是非良工勿輕易五色慎毛衣玉泉觀魚石池本清冽映日更明透畜魚不得藏巨細百尾湊在水若空遊一一見肥瘦又若在鏡中鱗鬛無差謬旅徃還旅來人餌口即就洋洋得其所何如浴沂秀深契濠上觀肯襲如棠陋心賞失歸途昏雲黯孤岫器用王將軍樓船歌江南古來傳綺語江南畫船如屋裡將軍緫衛在江北百乘高車馬千里五牙富貴地非宜雲海行窩出新理揚川駊騀十丈蓮飛艣擘空如迸矢兩頭簫鼓沸中流兩岸行人㸔如市中間紗幕開暑風左邊設圖右邊史將軍受用通南北坐泛西湖與杭比還須笑咏載老夫収取風流追郭李製騣披巾一首苦暑欲露頂不謹見客恧輕巾思緝騣求工適良俶沈慮揆之久載難遜未熟豈以庶帽儗角屋系有幅重謂高士飭方作手三沐引縷鍼肖梭轉指徃來續一轉一成締玲瓏萬目屬勻勻布烟華眇眇絢霧縠工云費心思微酒不能贖積功月尚半使我百鴟覆著之若無巾了了頂顱秃塵漏風颸入凉得敬亦足珍収戒童奴常畏爪瀋觸未效郭漫墊敢就陶䙝漉傍詫長仙標孤坐暎修竹陸翁贈簫杖一笻紫竹歲寒條十節中通亦當簫使我弄秋唇有頼累翁歸夜手無聊星含古竅聲猶滑霞漬長莖色未消老甚出遊今得力坐吹明月廣陵橋覧鏡辭匣中青銅小圓月比月長明又不缺朝朝照我六十年初自丱時今白髪一朝見面一朝親老少妍媸認得真病來半月不開匣開匣頓然成别人脂膠兩眼匡失肉頥褶垂垂顴骨簇傍人雖道言笑是箇裏故吾何可贖鏡神謂我瘦勿驚爾形尚在天有情休文减帶固本相撫鏡始覺吾心平烏藤杖謌烏皮襞積竹約然瘦骨挺玉修且堅流求怪藤老不死翦送海外誰夤縁洪濤躍過十萬里滑似龍鬛疑沾涎憊翁杖之尚溜手扶持頗認兒孫賢傍人笑為數促節百有二十期吾年明朝策雪入梅去桃竹不敢争其權石田詩選巻九
